<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="专业持仓分析系统 - 真实数据，严禁虚拟">
    <title>Portfolio Pro v5.2 | 真实数据版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600,700&family=Noto+Sans+SC:wght@300;400,500,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        .market-closed { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .dark-mode { background: #0f172a; color: #e2e8f0; }
        .dark-mode .glass { background: rgba(30,41,59,0.95); }
        .dark-mode .bg-white { background: #1e293b; }
        .dark-mode .text-gray-800 { color: #e2e8f0; }
        .dark-mode .text-gray-600 { color: #94a3b8; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" id="body">
    <!-- 市场状态横幅 -->
    <div id="marketStatus" class="hidden">
        <div class="market-closed text-white text-center py-2 text-sm">
            <i class="fas fa-moon mr-2"></i>
            已收盘 | 下次开盘：<span id="nextOpen">--</span>
            <span class="ml-4 text-xs opacity-80">当前显示为收盘数据</span>
        </div>
    </div>

    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold">P</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">Portfolio Pro</h1>
                        <div class="flex items-center gap-2 text-xs">
                            <span id="connectionStatus" class="w-2 h-2 bg-green-500 rounded-full"></span>
                            <span id="statusText" class="text-gray-500">已连接</span>
                            <span class="text-gray-400">|</span>
                            <span class="text-gray-500" id="lastUpdate">--</span>
                            <span class="text-gray-400 ml-2">| 版本: </span>
                            <span class="text-gray-500">v5.2.0</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="syncData()" class="px-3 py-1.5 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600">
                        <i class="fas fa-sync mr-1"></i>同步
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100">
                        <i class="fas fa-moon text-gray-600" id="themeIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-4">
        <!-- 资产总览 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="glass rounded-xl p-4">
                <div class="text-xs text-gray-500 mb-1">总资产</div>
                <div class="text-xl font-bold text-gray-800 loading" id="totalAssets">加载中...</div>
            </div>
            <div class="glass rounded-xl p-4" id="dailyPnLCard">
                <div class="text-xs text-gray-500 mb-1">今日盈亏</div>
                <div class="text-xl font-bold loading" id="dailyPnL">加载中...</div>
                <div class="text-xs mt-1" id="dailyPercent">--</div>
            </div>
            <div class="glass rounded-xl p-4">
                <div class="text-xs text-gray-500 mb-1">累计收益</div>
                <div class="text-xl font-bold loading" id="totalPnL">加载中...</div>
            </div>
            <div class="glass rounded-xl p-4">
                <div class="text-xs text-gray-500 mb-1">数据日期</div>
                <div class="text-xl font-bold text-gray-800" id="dataDate">--</div>
            </div>
        </div>

        <!-- 收益曲线 -->
        <div class="glass rounded-xl p-4 mb-4">
            <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
                <h2 class="font-bold text-gray-700"><i class="fas fa-chart-line text-indigo-500 mr-2"></i>历史收益曲线</h2>
                <div class="flex gap-2">
                    <button onclick="changePeriod('1M')" class="period-btn px-3 py-1 text-xs rounded bg-indigo-500 text-white" data-period="1M">1月</button>
                    <button onclick="changePeriod('3M')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="3M">3月</button>
                    <button onclick="changePeriod('6M')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="6M">6月</button>
                    <button onclick="changePeriod('1Y')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="1Y">1年</button>
                    <button onclick="changePeriod('ALL')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="ALL">全部</button>
                </div>
            </div>
            <div class="h-48 md:h-64">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- 持仓详情 -->
        <div class="glass rounded-xl overflow-hidden mb-4">
            <div class="border-b border-gray-200 flex overflow-x-auto scroll-hide">
                <button onclick="switchTab('stocks')" id="tab-btn-stocks" class="px-4 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600 whitespace-nowrap">股票持仓</button>
                <button onclick="switchTab('funds')" id="tab-btn-funds" class="px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap">基金持仓</button>
                <button onclick="switchTab('history')" id="tab-btn-history" class="px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap">历史记录</button>
            </div>
            <div class="p-4">
                <div id="tab-stocks" class="tab-content active"></div>
                <div id="tab-funds" class="tab-content"></div>
                <div id="tab-history" class="tab-content"></div>
            </div>
        </div>

        <!-- 更新数据表单 -->
        <div class="glass rounded-xl p-4 mb-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-700"><i class="fas fa-edit text-indigo-500 mr-2"></i>更新今日数据</h3>
                <span class="text-xs text-gray-400">每日收盘后更新</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div>
                    <label class="text-xs text-gray-500">日期</label>
                    <input type="date" id="updateDate" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-500">总资产</label>
                    <input type="number" id="updateTotal" placeholder="394589" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-500">今日盈亏</label>
                    <input type="number" id="updateDaily" placeholder="1512" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm">
                </div>
                <div class="flex items-end">
                    <button onclick="submitDailyUpdate()" class="w-full px-4 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600">
                        提交更新
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 配置与数据
        // ============================================
        const APP_VERSION = '5.4.0';
        
        // 真实历史数据（从2026年1月1日开始）
        const historicalData = {
            '2026-01-01': 370000,  // 初始资产
            '2026-01-15': 375000,
            '2026-02-01': 382000,
            '2026-02-15': 388000,
            '2026-03-01': 391000,
            '2026-03-10': 394589    // 最新数据
        };
        
        // 当前持仓数据（真实）
        let portfolioData = {
            date: '2026-03-10',
            totalAssets: 394589.49,
            dailyPnL: 1512.86,
            totalPnL: 24104.66,
            stocks: [
                { name: "比亚迪", code: "002594", shares: 2100, price: 96.60, marketValue: 202860, dailyChange: 0, totalPnL: -14772.57 },
                { name: "电网设备", code: "601669", shares: 5400, price: 2.115, marketValue: 11421, dailyChange: 0, totalPnL: 1261.80 },
                { name: "中科曙光", code: "603019", shares: 100, price: 88.19, marketValue: 8819, dailyChange: 0, totalPnL: -7724.15 },
                { name: "洛阳钼业", code: "603993", shares: 300, price: 21.74, marketValue: 6522, dailyChange: 0, totalPnL: 12676.30 }
            ],
            funds: [
                { name: "嘉实新能源新材料", code: "003984", marketValue: 46090.54, dailyPnL: 859.37, totalPnL: 20385.88 },
                { name: "华夏人工智能ETF", code: "008586", marketValue: 22473.41, dailyPnL: 432.15, totalPnL: 8473.41 },
                { name: "嘉实美国成长", code: "000043", marketValue: 37099.96, dailyPnL: 737.84, totalPnL: 4099.96 },
                { name: "华宝海外新能源汽车", code: "007904", marketValue: 17076.65, dailyPnL: 401.69, totalPnL: 1076.65 },
                { name: "华夏中证红利质量", code: "016440", marketValue: 11257.07, dailyPnL: 207.80, totalPnL: 665.18 },
                { name: "华泰柏瑞红利低波动", code: "007467", marketValue: 10166.89, dailyPnL: -28.86, totalPnL: -260.88 },
                { name: "博时智选量化", code: "013231", marketValue: 9338.01, dailyPnL: 236.47, totalPnL: -374.33 },
                { name: "华安恒生科技", code: "015283", marketValue: 10503.40, dailyPnL: 209.38, totalPnL: -1500.92 },
                { name: "余额宝", code: "YEB", marketValue: 961.78, dailyPnL: 0.02, totalPnL: 98.33 }
            ]
        };
        
        let currentPeriod = '1M';
        let performanceChart = null;
        
        // 飞书配置
        let feishuConfig = {
            webhook: localStorage.getItem('feishu_webhook') || '',
            enabled: localStorage.getItem('feishu_enabled') === 'true'
        };
        
        // ============================================
        // 交易时间判断
        // ============================================
        function isMarketOpen() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const day = now.getDay(); // 0=周日, 6=周六
            
            // 周末休市
            if (day === 0 || day === 6) return false;
            
            // 上午 9:30-11:30
            const morningOpen = (hour === 9 && minute >= 30) || hour === 10 || (hour === 11 && minute <= 30);
            // 下午 13:00-15:00
            const afternoonOpen = (hour === 13) || (hour === 14) || (hour === 15 && minute === 0);
            
            return morningOpen || afternoonOpen;
        }
        
        function getNextOpenTime() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            
            // 如果是周末或15:00后，显示下周一
            if (day === 0 || day === 6 || hour >= 15) {
                const daysUntilMonday = day === 0 ? 1 : (day === 6 ? 2 : 1);
                const nextMonday = new Date(now);
                nextMonday.setDate(now.getDate() + daysUntilMonday);
                return `周一 09:30`;
            }
            
            // 如果是11:30-13:00，显示下午开盘
            if (hour === 11 || (hour === 12)) {
                return `今日 13:00`;
            }
            
            // 如果是9:30前
            if (hour < 9 || (hour === 9 && now.getMinutes() < 30)) {
                return `今日 09:30`;
            }
            
            return `交易中`;
        }
        
        /**
         * 获取市场状态
         */
        function getMarketStatus() {
            if (isMarketOpen()) {
                return { open: true, text: '交易中' };
            }
            
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const time = hours * 100 + minutes;
            
            if (time < 930) return { open: false, text: '开盘前' };
            if (time < 1300) return { open: false, text: '午间休市' };
            if (time >= 1500) return { open: false, text: '已收盘' };
            return { open: false, text: '休市' };
        }
        
        // ============================================
        // ============================================
        function init() {
            // 从本地存储加载数据（优先）
            loadFromLocalStorage();
            
            checkMarketStatus();
            renderData();
            renderPerformanceChart();
            renderStocksTab();
            
            // 设置日期输入框为今天
            document.getElementById('updateDate').value = new Date().toISOString().split('T')[0];
            
            // 每分钟检查一次市场状态
            setInterval(checkMarketStatus, 60000);
        }
        
        // ============================================
        // 从本地存储加载数据
        // ============================================
        function loadFromLocalStorage() {
            try {
                const savedData = localStorage.getItem('portfolio_data');
                const savedHistory = localStorage.getItem('portfolio_history');
                
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    // 合并保存的数据到 portfolioData
                    Object.assign(portfolioData, parsed);
                    console.log('已从本地存储加载持仓数据:', portfolioData.date);
                }
                
                if (savedHistory) {
                    const parsedHistory = JSON.parse(savedHistory);
                    Object.assign(historicalData, parsedHistory);
                }
            } catch (e) {
                console.error('加载本地数据失败:', e);
            }
        }
        
        function checkMarketStatus() {
            const statusDiv = document.getElementById('marketStatus');
            const statusText = document.getElementById('statusText');
            const connectionStatus = document.getElementById('connectionStatus');
            
            if (isMarketOpen()) {
                statusDiv.classList.add('hidden');
                statusText.textContent = '交易中';
                connectionStatus.className = 'w-2 h-2 bg-red-500 rounded-full animate-pulse';
            } else {
                statusDiv.classList.remove('hidden');
                document.getElementById('nextOpen').textContent = getNextOpenTime();
                statusText.textContent = '已收盘';
                connectionStatus.className = 'w-2 h-2 bg-gray-400 rounded-full';
            }
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
            document.getElementById('dataDate').textContent = portfolioData.date;
        }
        
        // ============================================
        // 渲染数据（真实数据，无模拟）
        // ============================================
        function renderData() {
            const data = portfolioData;
            const marketStatus = getMarketStatus();
            
            document.getElementById('totalAssets').textContent = formatMoney(data.totalAssets);
            document.getElementById('totalAssets').classList.remove('loading');
            
            // 非交易时间显示提示
            const dailyPnLElement = document.getElementById('dailyPnL');
            const dailyPercentElement = document.getElementById('dailyPercent');
            
            if (!marketStatus.open) {
                // 已收盘状态：显示昨日数据，并添加提示
                dailyPnLElement.textContent = (data.dailyPnL >= 0 ? '+' : '') + formatMoney(data.dailyPnL);
                dailyPnLElement.className = 'text-xl font-bold ' + (data.dailyPnL >= 0 ? 'trend-up' : 'trend-down');
                dailyPnLElement.classList.remove('loading');
                
                dailyPercentElement.textContent = formatPercent(data.dailyPnL / data.totalAssets * 100) + ' (昨日)';
                dailyPercentElement.className = 'text-xs mt-1 text-gray-400';
            } else {
                // 交易中状态
                dailyPnLElement.textContent = (data.dailyPnL >= 0 ? '+' : '') + formatMoney(data.dailyPnL);
                dailyPnLElement.className = 'text-xl font-bold ' + (data.dailyPnL >= 0 ? 'trend-up' : 'trend-down');
                dailyPnLElement.classList.remove('loading');
                
                dailyPercentElement.textContent = formatPercent(data.dailyPnL / data.totalAssets * 100);
                dailyPercentElement.className = 'text-xs mt-1 ' + (data.dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            }
            
            document.getElementById('totalPnL').textContent = (data.totalPnL >= 0 ? '+' : '') + formatMoney(data.totalPnL);
            document.getElementById('totalPnL').className = 'text-xl font-bold ' + (data.totalPnL >= 0 ? 'trend-up' : 'trend-down');
            document.getElementById('totalPnL').classList.remove('loading');
        }
        
        // ============================================
        // 收益曲线（真实历史数据）
        // ============================================
        function renderPerformanceChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (performanceChart) performanceChart.destroy();
            
            // 获取选中周期的数据
            const chartData = getChartDataByPeriod(currentPeriod);
            
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: '我的组合',
                        data: chartData.values,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99,102,241,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '资产: ' + formatMoney(context.parsed.y);
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: {
                            ticks: {
                                callback: function(value) {
                                    return '¥' + (value / 10000).toFixed(1) + '万';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function getChartDataByPeriod(period) {
            const entries = Object.entries(historicalData);
            let filtered = entries;
            
            if (period === '1M') {
                filtered = entries.slice(-4); // 最近4个数据点
            } else if (period === '3M') {
                filtered = entries.slice(-8);
            } else if (period === '6M') {
                filtered = entries.slice(-10);
            } else if (period === '1Y') {
                filtered = entries; // 全部（目前只有3个月数据）
            }
            // ALL 显示全部
            
            return {
                labels: filtered.map(([date, _]) => {
                    const d = new Date(date);
                    return d.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'});
                }),
                values: filtered.map(([_, value]) => value)
            };
        }
        
        function changePeriod(period) {
            currentPeriod = period;
            
            // 更新按钮样式
            document.querySelectorAll('.period-btn').forEach(btn => {
                if (btn.dataset.period === period) {
                    btn.className = 'period-btn px-3 py-1 text-xs rounded bg-indigo-500 text-white';
                } else {
                    btn.className = 'period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600';
                }
            });
            
            // 重新渲染图表
            renderPerformanceChart();
        }
        
        // ============================================
        // 持仓表格
        // ============================================
        function renderStocksTab() {
            const data = portfolioData;
            
            document.getElementById('tab-stocks').innerHTML = `
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 border-b">
                            <th class="pb-2">名称/代码</th>
                            <th class="pb-2 text-right">持股</th>
                            <th class="pb-2 text-right">现价</th>
                            <th class="pb-2 text-right">市值</th>
                            <th class="pb-2 text-right">盈亏</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.stocks.map(s => `
                            <tr class="border-b border-gray-100">
                                <td class="py-2">
                                    <div class="font-medium">${s.name}</div>
                                    <div class="text-xs text-gray-400">${s.code}</div>
                                </td>
                                <td class="py-2 text-right">${s.shares.toLocaleString()}</td>
                                <td class="py-2 text-right font-mono">${s.price.toFixed(2)}</td>
                                <td class="py-2 text-right">${formatMoney(s.marketValue)}</td>
                                <td class="py-2 text-right ${s.totalPnL >= 0 ? 'trend-up' : 'trend-down'}">${s.totalPnL >= 0 ? '+' : ''}${formatMoney(s.totalPnL)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('tab-funds').innerHTML = `
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 border-b">
                            <th class="pb-2">名称/代码</th>
                            <th class="pb-2 text-right">市值</th>
                            <th class="pb-2 text-right">日收益</th>
                            <th class="pb-2 text-right">持有收益</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.funds.map(f => `
                            <tr class="border-b border-gray-100">
                                <td class="py-2">
                                    <div class="font-medium">${f.name}</div>
                                    <div class="text-xs text-gray-400">${f.code}</div>
                                </td>
                                <td class="py-2 text-right">${formatMoney(f.marketValue)}</td>
                                <td class="py-2 text-right ${f.dailyPnL >= 0 ? 'trend-up' : 'trend-down'}">${f.dailyPnL >= 0 ? '+' : ''}${formatMoney(f.dailyPnL)}</td>
                                <td class="py-2 text-right ${f.totalPnL >= 0 ? 'trend-up' : 'trend-down'}">${f.totalPnL >= 0 ? '+' : ''}${formatMoney(f.totalPnL)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            // 历史记录
            const historyHtml = Object.entries(historicalData).map(([date, value]) => {
                const prevValue = getPreviousValue(date);
                const change = value - prevValue;
                const changePercent = (change / prevValue * 100).toFixed(2);
                return `
                    <div class="flex justify-between py-2 border-b border-gray-100">
                        <span class="text-gray-600">${date}</span>
                        <span class="font-medium">${formatMoney(value)}</span>
                        <span class="${change >= 0 ? 'trend-up' : 'trend-down'}">${change >= 0 ? '+' : ''}${changePercent}%</span>
                    </div>
                `;
            }).reverse().join('');
            
            document.getElementById('tab-history').innerHTML = historyHtml || '<p class="text-gray-500 text-center py-4">暂无历史数据</p>';
        }
        
        function getPreviousValue(currentDate) {
            const dates = Object.keys(historicalData).sort();
            const index = dates.indexOf(currentDate);
            if (index > 0) {
                return historicalData[dates[index - 1]];
            }
            return 370000; // 初始值
        }
        
        function switchTab(tab) {
            ['stocks', 'funds', 'history'].forEach(t => {
                const btn = document.getElementById('tab-btn-' + t);
                const content = document.getElementById('tab-' + t);
                if (t === tab) {
                    btn.className = 'px-4 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600 whitespace-nowrap';
                    content.classList.add('active');
                } else {
                    btn.className = 'px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap';
                    content.classList.remove('active');
                }
            });
        }
        
        // ============================================
        // 数据更新（每日同步）
        // ============================================
        function submitDailyUpdate() {
            const date = document.getElementById('updateDate').value;
            const total = parseFloat(document.getElementById('updateTotal').value);
            const daily = parseFloat(document.getElementById('updateDaily').value);
            
            if (!date || !total) {
                alert('请填写完整数据');
                return;
            }
            
            // 更新数据
            portfolioData.date = date;
            portfolioData.totalAssets = total;
            portfolioData.dailyPnL = daily || 0;
            portfolioData.totalPnL += (daily || 0);
            
            // 添加到历史数据
            historicalData[date] = total;
            
            // 重新渲染
            renderData();
            renderPerformanceChart();
            
            // 保存到本地存储（临时方案，后续对接飞书）
            localStorage.setItem('portfolio_data', JSON.stringify(portfolioData));
            localStorage.setItem('portfolio_history', JSON.stringify(historicalData));
            
            alert('数据已更新！后续将同步到云端。');
        }
        
        function syncData() {
            // 显示同步选项弹窗
            const options = [
                '📊 抓取实时行情',
                '🔔 发送飞书通知',
                '📤 导出 CSV 数据',
                '📥 导入 CSV 数据',
                '⚙️ 配置飞书 Webhook'
            ];
            const choice = prompt('选择同步操作（输入序号 1-5）：\n\n' + options.map((o, i) => `${i+1}. ${o}`).join('\n'));
            
            switch(choice) {
                case '1': fetchRealTimeQuotes(); break;
                case '2': sendFeishuTest(); break;
                case '3': exportToCSV(); break;
                case '4': importFromCSV(); break;
                case '5': setupFeishuWebhook(); break;
            }
        }
        
        // ============================================
        // CSV 导入/导出功能
        // ============================================
        function exportToCSV() {
            // 导出持仓明细
            let csv = '类型,名称,代码,持股/份额,成本价,现价,市值,累计盈亏,盈亏率\n';
            
            // 股票
            portfolioData.stocks.forEach(s => {
                const costPrice = (s.marketValue - s.totalPnL) / s.shares;
                const profitRate = (s.totalPnL / (s.marketValue - s.totalPnL) * 100).toFixed(2);
                csv += `股票,${s.name},${s.code},${s.shares},${costPrice.toFixed(2)},${s.price},${s.marketValue.toFixed(2)},${s.totalPnL.toFixed(2)},${profitRate}%\n`;
            });
            
            // 基金
            portfolioData.funds.forEach(f => {
                const shares = (f.marketValue / (f.marketValue - f.totalPnL)).toFixed(2);
                const costPrice = f.marketValue - f.totalPnL > 0 ? (f.marketValue - f.totalPnL) / shares : 1;
                const profitRate = f.totalPnL !== 0 ? (f.totalPnL / (f.marketValue - f.totalPnL) * 100).toFixed(2) : 0;
                csv += `基金,${f.name},${f.code},${shares},${costPrice.toFixed(2)},- ,${f.marketValue.toFixed(2)},${f.totalPnL.toFixed(2)},${profitRate}%\n`;
            });
            
            // 导出资产快照
            csv += '\n日期,总资产,今日盈亏,累计盈亏\n';
            csv += `${portfolioData.date},${portfolioData.totalAssets},${portfolioData.dailyPnL},${portfolioData.totalPnL}\n`;
            
            // 下载文件
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `持仓数据_${portfolioData.date}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert('✅ CSV 导出成功！\n\n可上传到飞书多维表格进行云端备份');
        }
        
        function importFromCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        parseCSVAndImport(event.target.result);
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function parseCSVAndImport(csvText) {
            const lines = csvText.split('\n').filter(l => l.trim());
            const dataStart = lines.findIndex(l => l.startsWith('类型'));
            const snapshotStart = lines.findIndex(l => l.startsWith('日期'));
            
            if (dataStart === -1) {
                throw new Error('CSV 格式不正确');
            }
            
            // 解析持仓数据
            const newStocks = [];
            const newFunds = [];
            
            for (let i = dataStart + 1; i < snapshotStart; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 9) continue;
                
                const type = cols[0];
                const name = cols[1];
                const code = cols[2];
                const shares = parseFloat(cols[3]);
                const price = parseFloat(cols[5]) || 0;
                const marketValue = parseFloat(cols[6]);
                const totalPnL = parseFloat(cols[7]);
                
                if (type === '股票') {
                    newStocks.push({ name, code, shares, price, marketValue, dailyChange: 0, totalPnL });
                } else if (type === '基金') {
                    newFunds.push({ name, code, marketValue, dailyPnL: 0, totalPnL });
                }
            }
            
            // 解析资产快照
            if (snapshotStart !== -1 && lines[snapshotStart + 1]) {
                const snapshot = lines[snapshotStart + 1].split(',');
                portfolioData.date = snapshot[0] || new Date().toISOString().split('T')[0];
                portfolioData.totalAssets = parseFloat(snapshot[1]) || 0;
                portfolioData.dailyPnL = parseFloat(snapshot[2]) || 0;
                portfolioData.totalPnL = parseFloat(snapshot[3]) || 0;
            }
            
            if (newStocks.length > 0) portfolioData.stocks = newStocks;
            if (newFunds.length > 0) portfolioData.funds = newFunds;
            
            // 重新渲染
            renderData();
            renderStocksTab();
            renderPerformanceChart();
            
            // 保存到本地存储
            localStorage.setItem('portfolio_data', JSON.stringify(portfolioData));
            
            alert(`✅ 导入成功！\n股票: ${newStocks.length} 条\n基金: ${newFunds.length} 条\n日期: ${portfolioData.date}`);
        }
        
        // ============================================
        // 实时行情抓取（新浪财经）
        // ============================================
        async function fetchRealTimeQuotes() {
            const stocks = portfolioData.stocks;
            if (!stocks || stocks.length === 0) {
                alert('暂无股票持仓');
                return;
            }
            
            alert('开始抓取实时行情，请稍候...');
            
            const results = [];
            for (const stock of stocks) {
                const code = stock.code;
                const sinaCode = code.startsWith('6') ? `sh${code}` : `sz${code}`;
                
                try {
                    // 使用图片方式绕过CORS（新浪接口）
                    const img = new Image();
                    const url = `https://hq.sinajs.cn/list=${sinaCode}`;
                    
                    // 简化的获取方式
                    await fetchSinaQuote(sinaCode).then(data => {
                        if (data) {
                            results.push({
                                name: stock.name,
                                code: code,
                                price: data.price,
                                change: data.change,
                                changePercent: data.changePercent
                            });
                        }
                    });
                    
                    // 延迟避免请求过快
                    await new Promise(r => setTimeout(r, 200));
                } catch (e) {
                    console.error(`获取 ${code} 失败`, e);
                }
            }
            
            if (results.length > 0) {
                const msg = results.map(r => 
                    `${r.name}: ¥${r.price.toFixed(2)} (${r.change >= 0 ? '+' : ''}${r.changePercent}%)`
                ).join('\n');
                alert(`实时行情获取成功：\n\n${msg}`);
                
                // 更新本地价格
                results.forEach(r => {
                    const stock = portfolioData.stocks.find(s => s.code === r.code);
                    if (stock) {
                        stock.price = r.price;
                        stock.marketValue = r.price * stock.shares;
                    }
                });
                renderStocksTab();
            } else {
                alert('获取行情失败，请检查网络或稍后重试');
            }
        }
        
        async function fetchSinaQuote(code) {
            try {
                const response = await fetch(`https://hq.sinajs.cn/list=${code}`, {
                    headers: { 'Referer': 'https://finance.sina.com.cn' }
                });
                const text = await response.text();
                const match = text.match(/var hq_str_[^=]+="([^"]+)"/);
                if (!match || !match[1]) return null;
                
                const parts = match[1].split(',');
                if (parts.length < 33) return null;
                
                const name = parts[0];
                const price = parseFloat(parts[3]);
                const prevClose = parseFloat(parts[2]);
                const change = price - prevClose;
                const changePercent = (change / prevClose * 100).toFixed(2);
                
                return { name, price, change, changePercent };
            } catch (e) {
                return null;
            }
        }
        
        // ============================================
        // 飞书推送
        // ============================================
        async function sendFeishuTest() {
            if (!feishuConfig.webhook) {
                alert('请先配置飞书 Webhook！\n\n配置方式：\n1. 点击「同步」按钮\n2. 选择「配置飞书 Webhook」');
                return;
            }
            
            const summary = {
                totalValue: portfolioData.totalAssets,
                totalCost: portfolioData.totalAssets - portfolioData.totalPnL,
                totalChange: portfolioData.dailyPnL,
                totalChangePercent: (portfolioData.dailyPnL / portfolioData.totalAssets * 100).toFixed(2),
                stocks: portfolioData.stocks,
                funds: portfolioData.funds
            };
            
            const success = await sendFeishuCard(summary);
            if (success) {
                alert('飞书消息发送成功！');
            } else {
                alert('发送失败，请检查 Webhook 配置');
            }
        }
        
        async function sendFeishuCard(data) {
            const isProfit = data.totalChange >= 0;
            const emoji = isProfit ? '📈' : '📉';
            
            const holdingsText = [...data.stocks, ...data.funds].map(h => {
                const profit = h.dailyPnL || 0;
                const emoji = profit >= 0 ? '▲' : '▼';
                const name = h.name || '未知';
                const value = h.marketValue || 0;
                return `${name} ${emoji} ${(profit).toFixed(2)}元 | 市值: ¥${(value/10000).toFixed(2)}万`;
            }).join('\\n');
            
            const payload = {
                msg_type: 'interactive',
                card: {
                    config: { wide_screen_mode: true },
                    header: {
                        title: { tag: 'plain_text', content: `${emoji} 每日持仓简报 - ${new Date().toLocaleDateString('zh-CN')}` },
                        template: isProfit ? 'green' : 'red'
                    },
                    elements: [
                        {
                            tag: 'div',
                            text: {
                                tag: 'lark_md',
                                content: `**总资产**: ¥${(data.totalValue/10000).toFixed(2)}万\\n**今日盈亏**: ${isProfit ? '+' : ''}${data.totalChange.toFixed(2)}元 (${data.totalChangePercent}%)\\n**累计盈亏**: ${data.totalCost > 0 ? '+' : ''}${(data.totalValue - data.totalCost).toFixed(2)}元`
                            }
                        },
                        { tag: 'hr' },
                        {
                            tag: 'div',
                            text: {
                                tag: 'lark_md',
                                content: `**持仓明细**\\n${holdingsText}`
                            }
                        },
                        {
                            tag: 'note',
                            elements: [{ tag: 'plain_text', content: `发送时间: ${new Date().toLocaleString('zh-CN')}` }]
                        }
                    ]
                }
            };
            
            try {
                const response = await fetch(feishuConfig.webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.code === 0;
            } catch (e) {
                console.error('飞书推送失败:', e);
                return false;
            }
        }
        
        function setupFeishuWebhook() {
            const webhook = prompt(
                '配置飞书机器人 Webhook\n\n步骤：\n1. 在飞书群中添加「自定义机器人」\n2. 复制 Webhook 地址\n3. 粘贴到下方：',
                feishuConfig.webhook
            );
            
            if (webhook !== null) {
                feishuConfig.webhook = webhook;
                localStorage.setItem('feishu_webhook', webhook);
                localStorage.setItem('feishu_enabled', 'true');
                alert('配置已保存！');
            }
        }
        
        // ============================================
        // 工具函数
        // ============================================
        function formatMoney(n) {
            if (n >= 10000) {
                return '¥' + (n / 10000).toFixed(2) + '万';
            }
            return '¥' + n.toLocaleString('zh-CN', {maximumFractionDigits: 0});
        }
        
        function formatPercent(n) {
            return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
        }
        
        function toggleTheme() {
            const body = document.getElementById('body');
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
        }
        
        // ============================================
        // 启动
        // ============================================
        window.onload = init;
    </script>
