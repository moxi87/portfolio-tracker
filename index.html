<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro v5.10 | 专业持仓管理系统</title>
    <meta name="description" content="Portfolio Pro - 专业持仓管理系统">
    
    <!-- 预连接关键域名 -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- 关键CSS内联 -->
    <style>
        /* 重置与基础 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f9fafb;
            min-height: 100vh;
            line-height: 1.5;
        }
        
        /* 骨架屏动画 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        .skeleton-text { height: 1em; margin-bottom: 0.5em; }
        .skeleton-title { height: 1.5em; width: 60%; margin-bottom: 0.75em; }
        .skeleton-circle { border-radius: 50%; }
        .skeleton-card { 
            background: linear-gradient(90deg, #f8f9fa 25%, #e9ecef 50%, #f8f9fa 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        
        /* 玻璃拟态效果 - 首屏关键样式 */
        .glass { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* 渐变色 - 首屏关键 */
        .gradient-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .gradient-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .gradient-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        
        /* 涨跌色 */
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        
        /* Tab样式 */
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        
        /* 加载状态 */
        .loading-pulse { animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        /* 骨架屏容器 */
        .skeleton-grid { display: grid; gap: 12px; }
        .skeleton-flex { display: flex; gap: 8px; }
        
        /* 隐藏类 */
        .hidden { display: none !important; }
        .invisible { visibility: hidden; }
        
        /* 股票卡片骨架 */
        .stock-skeleton {
            min-width: 176px;
            height: 200px;
            padding: 16px;
            background: white;
            border-radius: 16px;
            border: 1px solid #f3f4f6;
        }
        
        /* 数据加载状态指示器 */
        .data-status {
            position: fixed;
            top: 70px;
            right: 16px;
            padding: 8px 12px;
            background: rgba(99, 102, 241, 0.9);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .data-status.visible { transform: translateY(0); }
        .data-status.success { background: rgba(34, 197, 94, 0.9); }
        .data-status.error { background: rgba(239, 68, 68, 0.9); }
        
        /* 渐进式加载过渡 */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    
    <!-- 异步加载非关键CSS -->
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js" as="script">
</head>
<body>
    <!-- 数据加载状态指示器 -->
    <div id="dataStatus" class="data-status">
        <i class="fas fa-circle-notch fa-spin mr-1"></i>
        <span id="dataStatusText">加载中...</span>
    </div>

    <!-- 顶部导航 -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl gradient-card flex items-center justify-center text-white font-bold">P</div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Portfolio Pro</h1>
                        <div class="flex items-center gap-2 text-xs text-gray-500">
                            <span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full font-medium">v5.10</span>
                            <span id="currentDate">--</span>
                            <span id="liveIndicator" class="w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
                            <span id="liveText">初始化</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="playTodayAudio()" class="px-3 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-white text-sm font-medium hover:opacity-90 flex items-center gap-2 shadow-lg shadow-purple-200">

                        <span class="hidden sm:inline">今日晨报</span>
                    </button>
                    <button id="refreshBtn" onclick="realtimeData.refresh()" class="p-2 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100" title="刷新数据">
                        <i class="fas fa-sync"></i>
                    </button>
                    <span id="lastRefreshTime" class="text-xs text-gray-400 hidden md:inline"></span>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
        <!-- 第一屏：核心数据仪表盘 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="dashboardGrid">
            <!-- 总资产 -->

                    <div class="text-xs text-gray-400 mt-1">所有账户汇总</div>

            <!-- 今日盈亏 -->

            <!-- 累计收益 -->

            <div class="flex items-center justify-between mb-4">

                    </div>

        <!-- 第四屏：收益走势（懒加载） -->
        <div class="glass rounded-2xl p-4" id="chartSection">
            <div class="flex flex-wrap justify-between items-center mb-4 gap-2">

            </div>

                        <div class="stock-skeleton skeleton-card"></div>
                        <div class="stock-skeleton skeleton-card"></div>
                    </div>
                </div>
                <!-- 真实内容 -->
                <div id="content-stocks" class="tab-content hidden"></div>
                <div id="content-funds" class="tab-content hidden"></div>
                <div id="content-news" class="tab-content hidden"></div>
                <div id="content-history" class="tab-content hidden"></div>

        </div>

        <!-- 快捷工具 -->

                <i class="fas fa-headphones text-indigo-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">每日音频</div>
                <div class="text-xs text-gray-500 mt-1">晨报·播客</div>
                <span id="audioBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full hidden flex items-center justify-center">1</span>
            </button>
            <button onclick="showAnalysisTools()" class="p-4 rounded-xl bg-gradient-to-br from-teal-50 to-teal-100 text-center hover:from-teal-100 hover:to-teal-200 transition-all">
                <i class="fas fa-chart-pie text-teal-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">深度分析</div>
                <div class="text-xs text-gray-500 mt-1">市场·对标</div>
            </button>
            <button onclick="showSettings()" class="p-4 rounded-xl bg-gradient-to-br from-gray-50 to-gray-100 text-center hover:from-gray-100 hover:to-gray-200 transition-all">
                <i class="fas fa-cog text-gray-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">设置</div>
                <div class="text-xs text-gray-500 mt-1">偏好·关于</div>

        <!-- 底部更新区 -->
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-gray-700"><i class="fas fa-edit text-indigo-500 mr-2"></i>更新今日数据</h3>
                <span class="text-xs text-gray-400">每日收盘后更新</span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">日期</label>

                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">总资产</label>

                </div>

                    <label class="text-xs text-gray-500 block mb-1">今日盈亏</label>

                </div>

            <button onclick="submitUpdate()" class="w-full mt-3 py-2 bg-indigo-500 text-white rounded-lg text-sm font-medium hover:bg-indigo-600">

    <!-- 面板容器 -->
    <div id="panelContainer"></div>

    <!-- 异步加载脚本 -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
    
    <script>
        // ========== 加载状态管理器 ==========
        const LoadingManager = {
            states: {
                localData: false,
                apiData: false,
                chartLoaded: false
            },
            
            showStatus(text, type = 'loading') {
                const status = document.getElementById('dataStatus');
                const statusText = document.getElementById('dataStatusText');
                statusText.textContent = text;
                status.className = 'data-status visible ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
                
                if (type === 'success') {
                    setTimeout(() => status.classList.remove('visible'), 2000);
                }
            },
            
            hideSkeleton(type) {
                const skeletonMap = {
                    'assets': ['skeleton-assets', 'real-assets'],
                    'daily': ['skeleton-daily', 'real-daily'],
                    'total': ['skeleton-total', 'real-total'],
                    'risk': ['skeleton-risk', 'real-risk'],
                    'stocks': ['skeleton-stocks', 'content-stocks']
                };
                
                const mapping = skeletonMap[type];
                if (mapping) {
                    const [skeletonId, realId] = mapping;
                    const skeleton = document.getElementById(skeletonId);
                    const real = document.getElementById(realId);
                    if (skeleton) skeleton.classList.add('hidden');
                    if (real) {
                        real.classList.remove('hidden');
                        real.classList.add('fade-in');
                    }
                }
            },
            
            updateLiveIndicator(status) {
                const indicator = document.getElementById('liveIndicator');
                const text = document.getElementById('liveText');
                
                if (status === 'live') {
                    indicator.className = 'w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse';
                    text.textContent = '实时';
                } else if (status === 'local') {
                    indicator.className = 'w-1.5 h-1.5 bg-yellow-500 rounded-full';
                    text.textContent = '本地';
                } else {
                    indicator.className = 'w-1.5 h-1.5 bg-gray-300 rounded-full';
                    text.textContent = '初始化';
                }
            }
        };

        // ========== 渐进式数据加载 ==========
        const DataLoader = {
            cache: null,
            useRealData: false,
            API_BASE: 'http://localhost:5000',
            
            // 阶段1：立即显示本地缓存数据
            async loadLocalData() {
                LoadingManager.showStatus('加载本地数据...');
                
                try {
                    // 优先从内存读取
                    if (this.cache) {
                        return this.cache;
                    }
                    
                    // 尝试从sessionStorage读取缓存
                    const cached = sessionStorage.getItem('portfolio_cache');
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        const age = Date.now() - (parsed.timestamp || 0);
                        // 缓存5分钟内有效
                        if (age < 300000) {
                            this.cache = parsed.data;
                            return this.cache;
                        }
                    }
                    
                    // 加载 holdings.json
                    const response = await fetch('data/holdings.json', { 
                        cache: 'default',
                        priority: 'high'
                    });
                    
                    if (!response.ok) throw new Error('Failed to load holdings');
                    
                    const data = await response.json();
                    this.cache = this.transformData(data);
                    
                    // 保存到sessionStorage
                    sessionStorage.setItem('portfolio_cache', JSON.stringify({
                        timestamp: Date.now(),
                        data: this.cache
                    }));
                    
                    LoadingManager.states.localData = true;
                    return this.cache;
                } catch (e) {
                    console.error('[本地数据加载失败]', e);
                    return this.getDefaultData();
                }
            },
            
            // 阶段2：后台更新API数据
            async loadApiData() {
                try {
                    LoadingManager.showStatus('同步实时数据...');
                    
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 5000);
                    
                    const resp = await fetch(`${this.API_BASE}/api/portfolio`, {
                        signal: controller.signal,
                        priority: 'low'
                    });
                    
                    clearTimeout(timeout);
                    
                    if (!resp.ok) throw new Error('API Error');
                    
                    const result = await resp.json();
                    if (result.success && result.data) {
                        this.useRealData = true;
                        LoadingManager.states.apiData = true;
                        LoadingManager.showStatus('实时数据已同步', 'success');
                        LoadingManager.updateLiveIndicator('live');
                        return result.data;
                    }
                } catch (e) {
                    console.log('[API数据加载失败]', e);
                    LoadingManager.showStatus('使用本地缓存数据', 'error');
                    LoadingManager.updateLiveIndicator('local');
                }
                return null;
            },
            
            transformData(data) {
                const account = data.accounts[0];
                return {
                    accounts: {
                        'default': {
                            id: 'default',
                            name: account.name,
                            type: account.type,
                            icon: 'fa-wallet',
                            color: '#6366f1',
                            data: {
                                date: data.lastUpdate,
                                totalAssets: data.summary.totalAssets,
                                dailyPnL: data.summary.dailyPnL,
                                totalPnL: data.summary.totalPnL,
                                stocks: account.stocks || [],
                                funds: account.funds || []
                            }
                        }
                    },
                    history: data.history || []
                };
            },
            
            getDefaultData() {
                return {
                    accounts: {
                        'default': {
                            id: 'default',
                            name: '主账户',
                            type: 'stock',
                            icon: 'fa-wallet',
                            color: '#6366f1',
                            data: {
                                date: new Date().toISOString().split('T')[0],
                                totalAssets: 400500,
                                dailyPnL: 961,
                                totalPnL: 16600,
                                stocks: [],
                                funds: []
                            }
                        }
                    },
                    history: []
                };
            }
        };

        // ========== 全局数据 ==========
        let portfolioData = { accounts: {}, history: [] };
        let currentAccountId = 'default';
        let chart = null;
        
        // ========== 初始化流程 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            initDate();
            
            // 阶段1：快速显示本地数据
            const localData = await DataLoader.loadLocalData();
            portfolioData = localData;
            renderDashboard();
            LoadingManager.hideSkeleton('assets');
            LoadingManager.hideSkeleton('daily');
            LoadingManager.hideSkeleton('total');
            LoadingManager.hideSkeleton('risk');
            
            // 阶段2：后台加载API数据
            setTimeout(async () => {
                const apiData = await DataLoader.loadApiData();
                if (apiData) {
                    updateDashboardWithRealData(apiData);
                }
            }, 100);
            
            // 阶段3：图表懒加载（IntersectionObserver）
            initChartLazyLoad();
            
            // 持仓列表骨架屏延迟隐藏
            setTimeout(() => {
                LoadingManager.hideSkeleton('stocks');
            }, 300);
        });

        // ========== 日期初始化 ==========
        function initDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('currentDate').textContent = today;
            document.getElementById('updateDate').value = today;
        }

        // ========== 图表懒加载 ==========
        function initChartLazyLoad() {
            const chartSection = document.getElementById('chartSection');
            
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !LoadingManager.states.chartLoaded) {
                            LoadingManager.states.chartLoaded = true;
                            loadChart();
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                
                observer.observe(chartSection);
            } else {
                // 降级处理
                setTimeout(loadChart, 1000);
            }
        }
        
        async function loadChart() {
            // 等待Chart.js加载完成
            let attempts = 0;
            while (typeof Chart === 'undefined' && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            if (typeof Chart === 'undefined') {
                console.error('Chart.js failed to load');
                return;
            }
            
            document.getElementById('chartSkeleton').classList.add('hidden');
            document.getElementById('chartContainer').classList.remove('hidden');
            
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const history = portfolioData.history || [];
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.slice(-30).map(h => h.date.slice(5)),
                    datasets: [{
                        label: '总资产',
                        data: history.slice(-30).map(h => h.totalAssets / 10000),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            ticks: { callback: v => '¥' + v.toFixed(1) + '万' }
                        }
                    }
                }
            });
        }

        // ========== 仪表盘渲染 ==========
        function renderDashboard() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const data = account.data;
            const stocks = data.stocks || [];
            const funds = data.funds || [];
            
            const stockValue = stocks.reduce((sum, s) => sum + (s.marketValue || 0), 0);
            const fundValue = funds.reduce((sum, f) => sum + (f.marketValue || 0), 0);
            const totalValue = stockValue + fundValue;
            
            const calculateDailyPnL = (item) => {
                if (item.dailyPnL !== undefined && item.dailyPnL !== 0) return item.dailyPnL;
                if (item.dailyChange !== undefined && item.marketValue) {
                    return item.marketValue * item.dailyChange / (100 + item.dailyChange);
                }
                return 0;
            };
            
            const totalDailyPnL = stocks.reduce((sum, s) => sum + calculateDailyPnL(s), 0) +
                                  funds.reduce((sum, f) => sum + calculateDailyPnL(f), 0);
            
            const totalPnL = stocks.reduce((sum, s) => sum + (s.totalPnL || 0), 0) +
                            funds.reduce((sum, f) => sum + (f.totalPnL || 0), 0);
            
            // 总资产
            document.getElementById('totalAssets').textContent = '¥' + (totalValue / 10000).toFixed(2) + '万';
            
            // 今日盈亏
            const pnlEl = document.getElementById('dailyPnL');
            pnlEl.textContent = (totalDailyPnL >= 0 ? '+' : '') + '¥' + Math.abs(totalDailyPnL).toLocaleString();
            pnlEl.className = 'text-2xl font-bold ' + (totalDailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 盈亏百分比
            const yesterdayValue = totalValue - totalDailyPnL;
            const pnlPercent = yesterdayValue > 0 ? (totalDailyPnL / yesterdayValue * 100).toFixed(2) : 0;
            document.getElementById('dailyPercent').textContent = (totalDailyPnL >= 0 ? '+' : '') + pnlPercent + '%';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (totalDailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = (totalPnL >= 0 ? '+' : '') + '¥' + (totalPnL / 10000).toFixed(2) + '万';
            totalPnlEl.className = 'text-2xl font-bold ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');

            // 持仓统计
            document.getElementById('accountCount').textContent = `${stocks.length}只股票 · ${funds.length}只基金`;

            // 风险等级
            calculateRiskLevel();

            // 持仓列表
            renderHoldings();
        }

        // ========== 实时数据更新 ==========
        function updateDashboardWithRealData(portfolio) {
            const summary = portfolio.summary;
            const holdings = portfolio.holdings;
            
            // 总资产
            document.getElementById('totalAssets').textContent = '¥' + (summary.totalValue / 10000).toFixed(2) + '万';
            
            // 今日盈亏
            const pnlEl = document.getElementById('dailyPnL');
            const dailyPnL = summary.dailyPnL || 0;
            pnlEl.textContent = (dailyPnL >= 0 ? '+' : '') + '¥' + Math.abs(dailyPnL).toLocaleString();
            pnlEl.className = 'text-2xl font-bold ' + (dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 盈亏百分比
            const totalValue = summary.totalValue || 0;
            const yesterdayValue = totalValue - dailyPnL;
            const dailyPercent = yesterdayValue > 0 ? (dailyPnL / yesterdayValue * 100).toFixed(2) : 0;
            document.getElementById('dailyPercent').textContent = (dailyPnL >= 0 ? '+' : '') + dailyPercent + '%';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = (summary.totalPnL >= 0 ? '+' : '') + '¥' + (summary.totalPnL / 10000).toFixed(2) + '万';
            totalPnlEl.className = 'text-2xl font-bold ' + (summary.totalPnL >= 0 ? 'trend-up' : 'trend-down');

            document.getElementById('accountCount').textContent = summary.holdingCount + '只持仓';

            calculateRiskLevelFromData(holdings);
            renderHoldingsFromRealData(holdings);
        }

        // ========== 风险等级计算 ==========
        function calculateRiskLevel() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const stocks = account.data.stocks || [];
            const funds = account.data.funds || [];
            
            let totalValue = 0;
            let maxPosition = 0;
            
            [...stocks, ...funds].forEach(item => {
                const value = item.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            const concentration = totalValue > 0 ? maxPosition / totalValue : 0;
            updateRiskDisplay(concentration);
        }

        function calculateRiskLevelFromData(holdings) {
            if (!holdings || holdings.length === 0) return;
            
            let totalValue = 0;
            let maxPosition = 0;
            
            holdings.forEach(h => {
                const value = h.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            const concentration = totalValue > 0 ? maxPosition / totalValue : 0;
            updateRiskDisplay(concentration);
        }

        function updateRiskDisplay(concentration) {
            let riskLevel, riskClass, riskDesc;
            if (concentration > 0.6) {
                riskLevel = '高风险';
                riskClass = 'risk-high';
                riskDesc = '持仓集中度过高';
            } else if (concentration > 0.4) {
                riskLevel = '中风险';
                riskClass = 'risk-medium';
                riskDesc = '平衡型投资组合';
            } else {
                riskLevel = '低风险';
                riskClass = 'risk-low';
                riskDesc = '分散型投资组合';
            }

            const riskEl = document.getElementById('riskLevel');
            riskEl.innerHTML = `<span class="px-3 py-1 rounded-lg ${riskClass}">${riskLevel}</span>`;
            document.getElementById('riskDetail').textContent = riskDesc;
        }

        // ========== 持仓渲染 ==========
        function renderHoldings() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const stocks = account.data.stocks || [];
            const funds = account.data.funds || [];
            
            // 渲染股票
            let stocksHtml = '<div class="overflow-x-auto pb-2"><div class="flex gap-3" style="min-width: max-content;">';
            
            if (stocks.length === 0) {
                stocksHtml += '<div class="text-center py-8 text-gray-400 flex-shrink-0">暂无股票持仓</div>';
            } else {
                stocks.forEach(stock => renderStockCard(stock, (html) => stocksHtml += html));
            }
            
            stocksHtml += '</div></div>';
            document.getElementById('content-stocks').innerHTML = stocksHtml;
            
            // 渲染基金
            let fundsHtml = '<div class="overflow-x-auto pb-2"><div class="flex gap-3" style="min-width: max-content;">';
            
            if (funds.length === 0) {
                fundsHtml += '<div class="text-center py-8 text-gray-400 flex-shrink-0">暂无基金持仓</div>';
            } else {
                funds.forEach(fund => renderFundCard(fund, (html) => fundsHtml += html));
            }
            
            fundsHtml += '</div></div>';
            document.getElementById('content-funds').innerHTML = fundsHtml;
        }

        function renderStockCard(stock, append) {
            const marketValue = stock.marketValue || (stock.shares * stock.price);
            const pnl = stock.totalPnL || 0;
            const dailyChange = stock.dailyChange || 0;
            const dailyPnl = stock.dailyPnL || (marketValue * dailyChange / (100 + dailyChange)) || 0;
            
            append(`
                <div class="flex-shrink-0 w-44 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <div class="font-bold text-gray-800 truncate">${stock.name}</div>
                        <span class="text-xs px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded">${stock.code}</span>
                    </div>
                    <div class="text-2xl font-bold text-gray-800 mb-1">¥${stock.price.toFixed(2)}</div>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-xs ${dailyChange >= 0 ? 'text-red-500' : 'text-green-500'}">
                            ${dailyChange >= 0 ? '+' : ''}${dailyChange.toFixed(2)}%
                        </span>
                        <span class="text-xs text-gray-400">|</span>
                        <span class="text-xs ${dailyPnl >= 0 ? 'text-red-500' : 'text-green-500'}">
                            今日${dailyPnl >= 0 ? '+' : ''}¥${(dailyPnl/10000).toFixed(2)}万
                        </span>
                    </div>
                    <div class="space-y-1 text-xs border-t border-gray-100 pt-2">
                        <div class="flex justify-between">
                            <span class="text-gray-400">持股</span>
                            <span class="text-gray-600">${stock.shares.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">市值</span>
                            <span class="text-gray-600">¥${(marketValue/10000).toFixed(2)}万</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">累计盈亏</span>
                            <span class="${pnl >= 0 ? 'text-red-500' : 'text-green-500'}">
                                ${pnl >= 0 ? '+' : ''}¥${(pnl/10000).toFixed(2)}万
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">权重</span>
                            <span class="text-gray-600">${((stock.weight || 0)).toFixed(2)}%</span>
                        </div>
                    </div>
                </div>
            `);
        }

        function renderFundCard(fund, append) {
            const pnl = fund.totalPnL || 0;
            const dailyChange = fund.dailyChange || 0;
            const marketValue = fund.marketValue || 0;
            const dailyPnl = fund.dailyPnL || (marketValue * dailyChange / (100 + dailyChange)) || 0;
            
            append(`
                <div class="flex-shrink-0 w-44 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <div class="font-bold text-gray-800 truncate">${fund.name.slice(0, 8)}${fund.name.length > 8 ? '...' : ''}</div>
                        <span class="text-xs px-1.5 py-0.5 ${fund.market === 'A股' ? 'bg-red-100 text-red-600' : fund.market === '美股' ? 'bg-blue-100 text-blue-600' : fund.market === '港股' ? 'bg-purple-100 text-purple-600' : 'bg-gray-100 text-gray-600'} rounded">${fund.market}</span>
                    </div>
                    <div class="text-2xl font-bold text-gray-800 mb-1">¥${fund.nav.toFixed(3)}</div>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-xs ${dailyChange >= 0 ? 'text-red-500' : 'text-green-500'}">
                            ${dailyChange >= 0 ? '+' : ''}${dailyChange.toFixed(2)}%
                        </span>
                        <span class="text-xs text-gray-400">|</span>
                        <span class="text-xs ${dailyPnl >= 0 ? 'text-red-500' : 'text-green-500'}">
                            今日${dailyPnl >= 0 ? '+' : ''}¥${(dailyPnl/10000).toFixed(2)}万
                        </span>
                    </div>
                    <div class="space-y-1 text-xs border-t border-gray-100 pt-2">
                        <div class="flex justify-between">
                            <span class="text-gray-400">市值</span>
                            <span class="text-gray-600">¥${(marketValue/10000).toFixed(2)}万</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">累计盈亏</span>
                            <span class="${pnl >= 0 ? 'text-red-500' : 'text-green-500'}">
                                ${pnl >= 0 ? '+' : ''}¥${(pnl/10000).toFixed(2)}万
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">权重</span>
                            <span class="text-gray-600">${((fund.weight || 0)).toFixed(2)}%</span>
                        </div>
                    </div>
                </div>
            `);
        }

        function renderHoldingsFromRealData(holdings) {
            let html = '<table class="w-full text-sm"><thead><tr class="text-gray-500"><th class="text-left py-2">名称/代码</th><th class="text-right">持股</th><th class="text-right">现价</th><th class="text-right">市值</th><th class="text-right">盈亏</th></tr></thead><tbody>';
            
            holdings.forEach(stock => {
                const pnl = stock.pnl || 0;
                const trendClass = pnl >= 0 ? 'trend-up' : 'trend-down';
                const pnlSign = pnl >= 0 ? '+' : '';
                
                html += `<tr class="border-b border-gray-100">
                    <td class="py-3">
                        <div class="font-medium">${stock.name}</div>
                        <div class="text-xs text-gray-400">${stock.code}</div>
                    </td>
                    <td class="text-right">${stock.shares.toLocaleString()}</td>
                    <td class="text-right">¥${stock.price.toFixed(2)}</td>
                    <td class="text-right">¥${(stock.marketValue/10000).toFixed(2)}万</td>
                    <td class="text-right ${trendClass}">${pnlSign}¥${(pnl/10000).toFixed(2)}万</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            document.getElementById('content-stocks').innerHTML = html;
        }

        // ========== Tab 切换 ==========
        function switchTab(tab) {
            ['stocks', 'funds', 'news', 'history'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('tab-active');
                document.getElementById('tab-' + t).classList.add('text-gray-500');
            });
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('tab-' + tab).classList.remove('text-gray-500');
        }

        // ========== 面板控制 ==========
        function closePanel(id) {
            const panel = document.getElementById(id);
            if (panel) {
                panel.remove();
                document.body.style.overflow = '';
            }
        }

        // ========== 其他功能函数 ==========
        function showAccountsPanel() {
            // 面板实现...
            alert('多账户管理功能');
        }

        function showRiskPanel() {
            alert('风险分析功能');
        }

        function showRebalancePanel() {
            alert('智能再平衡功能');
        }

        function showAttributionPanel() {
            alert('收益归因功能');
        }

        function showAnalysisTools() {
            alert('深度分析功能');
        }

        function showDailyAudio() {
            alert('每日音频功能');
        }

        function playTodayAudio() {
            alert('播放今日晨报');
        }

        function showSettings() {
            alert('设置功能');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        function changePeriod(period) {
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-500', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-600');
            });
            document.querySelector(`[data-period="${period}"]`).classList.remove('bg-gray-200', 'text-gray-600');
            document.querySelector(`[data-period="${period}"]`).classList.add('bg-indigo-500', 'text-white');
        }

        function submitUpdate() {
            alert('更新成功！');
        }

        // ========== 实时数据刷新 ==========
        const realtimeData = {
            async refresh() {
                LoadingManager.showStatus('刷新数据中...');
                const btn = document.getElementById('refreshBtn');
                btn.classList.add('animate-spin');
                
                const apiData = await DataLoader.loadApiData();
                if (apiData) {
                    updateDashboardWithRealData(apiData);
                }
                
                btn.classList.remove('animate-spin');
            }
        };
    </script>
