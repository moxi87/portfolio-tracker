<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro v5.14 | 专业持仓管理系统</title>
    <meta name="description" content="Portfolio Pro - 专业持仓管理系统">
    
    <!-- 预连接关键域名 -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- 关键CSS内联 -->
    <style>
        /* 重置与基础 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f9fafb;
            min-height: 100vh;
            line-height: 1.5;
        }
        
        /* 骨架屏动画 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        .skeleton-text { height: 1em; margin-bottom: 0.5em; }
        .skeleton-title { height: 1.5em; width: 60%; margin-bottom: 0.75em; }
        .skeleton-circle { border-radius: 50%; }
        .skeleton-card { 
            background: linear-gradient(90deg, #f8f9fa 25%, #e9ecef 50%, #f8f9fa 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        
        /* 玻璃拟态效果 - 首屏关键样式 */
        .glass { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* 渐变色 - 首屏关键 */
        .gradient-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .gradient-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .gradient-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        
        /* 涨跌色 */
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        
        /* Tab样式 */
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        
        /* 加载状态 */
        .loading-pulse { animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        /* 骨架屏容器 */
        .skeleton-grid { display: grid; gap: 12px; }
        .skeleton-flex { display: flex; gap: 8px; }
        
        /* 隐藏类 */
        .hidden { display: none !important; }
        .invisible { visibility: hidden; }
        /* 移动端底部安全区域 */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
        .pb-safe { padding-bottom: max(8px, env(safe-area-inset-bottom, 8px)); }
        
        /* 移动端手势滑动指示器 */
        .swipe-indicator { display: flex; justify-content: center; gap: 6px; margin: 8px 0; }
        .swipe-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: #e5e7eb; transition: background 0.3s; }
        .swipe-indicator .dot.active { background: #6366f1; }
        
        /* 移动端触摸反馈 */
        @media (hover: none) {
            .feature-card:active, button:active { transform: scale(0.98); transition: transform 0.1s; }
        }
        
        /* 底部导航激活状态 */
        #bottomNav button.active { color: #6366f1; }
        
        /* 快速操作面板动画 */
        #quickActionPanel { transition: opacity 0.3s ease; }
        #quickActionPanel.hidden { opacity: 0; pointer-events: none; }
        #quickActionPanel > div { animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* 深色模式 */
        body.dark-mode { background: #111827; color: #f9fafb; }
        body.dark-mode .glass { background: rgba(31, 41, 55, 0.95); }
        body.dark-mode .text-gray-800 { color: #f9fafb; }
        body.dark-mode .text-gray-700 { color: #e5e7eb; }
        body.dark-mode .text-gray-600 { color: #d1d5db; }
        body.dark-mode .text-gray-500 { color: #9ca3af; }
        body.dark-mode .border-gray-200 { border-color: #374151; }
        body.dark-mode .bg-white { background: #1f2937; }
        body.dark-mode #bottomNav { background: #1f2937; border-color: #374151; }

        
        /* 股票卡片骨架 */
        .stock-skeleton {
            min-width: 176px;
            height: 200px;
            padding: 16px;
            background: white;
            border-radius: 16px;
            border: 1px solid #f3f4f6;
        }
        
        /* 数据加载状态指示器 */
        .data-status {
            position: fixed;
            top: 70px;
            right: 16px;
            padding: 8px 12px;
            background: rgba(99, 102, 241, 0.9);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            transform: translateY(-100px);
            transition: transform 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .data-status.visible { transform: translateY(0); }
        .data-status.success { background: rgba(34, 197, 94, 0.9); }
        .data-status.error { background: rgba(239, 68, 68, 0.9); }
        
        /* 渐进式加载过渡 */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    
    <!-- 异步加载非关键CSS -->
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js" as="script">
</head>
<body>
    <!-- 数据加载状态指示器 -->
    <div id="dataStatus" class="data-status">
        <i class="fas fa-circle-notch fa-spin mr-1"></i>
        <span id="dataStatusText">加载中...</span>
    </div>

    <!-- 顶部导航 -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl gradient-card flex items-center justify-center text-white font-bold">P</div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Portfolio Pro</h1>
                        <div class="flex items-center gap-2 text-xs text-gray-500">
                            <span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full font-medium">v5.14</span>
                            <span id="currentDate">--</span>
                            <span id="liveIndicator" class="w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
                            <span id="liveText">初始化</span>
                        </div>
                    </div>
                </div>
                <!-- 账户切换器 -->
                <div id="accountSwitcher" class="mr-2"></div>
                
                <div class="flex items-center gap-2">
                    <button onclick="playTodayAudio()" class="px-3 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-white text-sm font-medium hover:opacity-90 flex items-center gap-2 shadow-lg shadow-purple-200">
                        <i class="fas fa-play"></i>
                        <span class="hidden sm:inline">今日晨报</span>
                    </button>
                    <button id="refreshBtn" onclick="realtimeData.refresh()" class="p-2 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100" title="刷新数据">
                        <i class="fas fa-sync"></i>
                    </button>
                    <span id="lastRefreshTime" class="text-xs text-gray-400 hidden md:inline"></span>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
        <!-- 第一屏：核心数据仪表盘 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="dashboardGrid">
            <!-- 总资产 -->
            <div class="glass rounded-2xl p-4 feature-card" id="card-assets">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-card flex items-center justify-center text-white text-sm">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <span class="text-xs text-gray-500">总资产</span>
                </div>
                <!-- 骨架屏 -->
                <div class="skeleton-content" id="skeleton-assets">
                    <div class="skeleton skeleton-text" style="width: 80%; height: 2rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 60%;"></div>
                </div>
                <!-- 真实内容 -->
                <div class="real-content hidden" id="real-assets">
                    <div class="text-2xl font-bold text-gray-800" id="totalAssets">--</div>
                    <div class="text-xs text-gray-400 mt-1">所有账户汇总</div>
                </div>
            </div>

            <!-- 今日盈亏 -->
            <div class="glass rounded-2xl p-4 feature-card" id="card-daily">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-warning flex items-center justify-center text-white text-sm">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <span class="text-xs text-gray-500">今日盈亏</span>
                </div>
                <div class="skeleton-content" id="skeleton-daily">
                    <div class="skeleton skeleton-text" style="width: 80%; height: 2rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 50%;"></div>
                </div>
                <div class="real-content hidden" id="real-daily">
                    <div class="text-2xl font-bold" id="dailyPnL">--</div>
                    <div class="text-xs mt-1" id="dailyPercent">--</div>
                </div>
            </div>

            <!-- 累计收益 -->
            <div class="glass rounded-2xl p-4 feature-card" id="card-total">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-success flex items-center justify-center text-white text-sm">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <span class="text-xs text-gray-500">累计收益</span>
                </div>
                <div class="skeleton-content" id="skeleton-total">
                    <div class="skeleton skeleton-text" style="width: 80%; height: 2rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 60%;"></div>
                </div>
                <div class="real-content hidden" id="real-total">
                    <div class="text-2xl font-bold" id="totalPnL">--</div>
                    <div class="text-xs text-gray-400 mt-1">自开始记录</div>
                </div>
            </div>

            <!-- 风险等级 -->
            <div class="glass rounded-2xl p-4 feature-card cursor-pointer" onclick="showRiskPanel()" id="card-risk">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-info flex items-center justify-center text-white text-sm">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <span class="text-xs text-gray-500">风险等级</span>
                </div>
                <div class="skeleton-content" id="skeleton-risk">
                    <div class="skeleton skeleton-text" style="width: 60%; height: 2rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 80%;"></div>
                </div>
                <div class="real-content hidden" id="real-risk">
                    <div class="text-2xl font-bold" id="riskLevel">--</div>
                    <div class="text-xs mt-1" id="riskDetail">点击查看详情</div>
                </div>
            </div>
        </div>

        <!-- 第二屏：市场情绪、收益对标、盈亏可视化 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div id="sentiment-card"></div>
            <div id="benchmark-card"></div>
            <div id="pnl-card"></div>
        </div>

        <!-- 第三屏：核心功能区 -->
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-gray-800"><i class="fas fa-star text-yellow-500 mr-2"></i>核心功能</h2>
                <span class="text-xs text-gray-400">点击卡片进入</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <button onclick="showAccountsPanel()" class="p-4 rounded-xl bg-gradient-to-br from-indigo-50 to-indigo-100 hover:from-indigo-100 hover:to-indigo-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-indigo-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div class="font-bold text-gray-800">多账户管理</div>
                    <div class="text-xs text-gray-500 mt-1" id="accountCount">--个账户</div>
                </button>
                <button onclick="showRebalancePanel()" class="p-4 rounded-xl bg-gradient-to-br from-teal-50 to-teal-100 hover:from-teal-100 hover:to-teal-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-teal-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-balance-scale"></i>
                    </div>
                    <div class="font-bold text-gray-800">智能再平衡</div>
                    <div class="text-xs text-gray-500 mt-1" id="rebalanceStatus">查看建议</div>
                </button>
                <button onclick="showAttributionPanel()" class="p-4 rounded-xl bg-gradient-to-br from-pink-50 to-pink-100 hover:from-pink-100 hover:to-pink-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-pink-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-chart-pie"></i>
                    </div>
                    <div class="font-bold text-gray-800">收益归因</div>
                    <div class="text-xs text-gray-500 mt-1">行业/个股贡献</div>
                </button>
                <button onclick="showRiskPanel()" class="p-4 rounded-xl bg-gradient-to-br from-red-50 to-red-100 hover:from-red-100 hover:to-red-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-red-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="font-bold text-gray-800">风险分析</div>
                    <div class="text-xs text-gray-500 mt-1">VaR/夏普比率</div>
                </button>
            </div>
        </div>

        <!-- 第四屏：收益走势（懒加载） -->
        <div class="glass rounded-2xl p-4" id="chartSection">
            <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                <h2 class="font-bold text-gray-800"><i class="fas fa-chart-area text-indigo-500 mr-2"></i>收益走势</h2>
                <div class="flex gap-1">
                    <button onclick="changePeriod('1M')" class="period-btn px-3 py-1 text-xs rounded-lg bg-indigo-500 text-white" data-period="1M">1月</button>
                    <button onclick="changePeriod('3M')" class="period-btn px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600" data-period="3M">3月</button>
                    <button onclick="changePeriod('6M')" class="period-btn px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600" data-period="6M">6月</button>
                    <button onclick="changePeriod('1Y')" class="period-btn px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600" data-period="1Y">1年</button>
                </div>
            </div>
            <!-- 图表骨架屏 -->
            <div id="chartSkeleton" class="h-48 md:h-64 flex items-center justify-center">
                <div class="w-full h-full skeleton-card flex items-center justify-center">
                    <div class="text-center text-gray-400">
                        <i class="fas fa-chart-line text-4xl mb-2"></i>
                        <p class="text-sm">图表加载中...</p>
                    </div>
                </div>
            </div>
            <!-- 真实图表 -->
            <div id="chartContainer" class="h-48 md:h-64 hidden">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- 第五屏：持仓详情（带骨架屏） -->
        <div class="glass rounded-2xl overflow-hidden">
            <div class="border-b border-gray-200 flex">
                <button onclick="switchTab('stocks')" id="tab-stocks" class="flex-1 px-4 py-3 text-sm font-medium tab-active">股票</button>
                <button onclick="switchTab('funds')" id="tab-funds" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500">基金</button>
                <button onclick="switchTab('news')" id="tab-news" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500">新闻</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500">历史</button>
            </div>
            <div class="p-4">
                <!-- 股票骨架屏 -->
                <div id="skeleton-stocks" class="overflow-x-auto pb-2">
                    <div class="flex gap-3" style="min-width: max-content;">
                        <div class="stock-skeleton skeleton-card"></div>
                        <div class="stock-skeleton skeleton-card"></div>
                        <div class="stock-skeleton skeleton-card"></div>
                    </div>
                </div>
                <!-- 真实内容 -->
                <div id="content-stocks" class="tab-content hidden"></div>
                <div id="content-funds" class="tab-content hidden"></div>
                <div id="content-news" class="tab-content hidden"></div>
                <div id="content-history" class="tab-content hidden"></div>
            </div>
        </div>

        <!-- 快捷工具 -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="showDailyAudio()" class="p-4 rounded-xl bg-gradient-to-br from-indigo-50 to-indigo-100 text-center hover:from-indigo-100 hover:to-indigo-200 transition-all relative">
                <i class="fas fa-headphones text-indigo-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">每日音频</div>
                <div class="text-xs text-gray-500 mt-1">晨报·播客</div>
                <span id="audioBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full hidden flex items-center justify-center">1</span>
            </button>
            <button onclick="showAnalysisTools()" class="p-4 rounded-xl bg-gradient-to-br from-teal-50 to-teal-100 text-center hover:from-teal-100 hover:to-teal-200 transition-all">
                <i class="fas fa-chart-pie text-teal-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">深度分析</div>
                <div class="text-xs text-gray-500 mt-1">市场·对标</div>
            </button>
            <button onclick="showSettings()" class="p-4 rounded-xl bg-gradient-to-br from-gray-50 to-gray-100 text-center hover:from-gray-100 hover:to-gray-200 transition-all">
                <i class="fas fa-cog text-gray-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">设置</div>
                <div class="text-xs text-gray-500 mt-1">偏好·关于</div>
            </button>
        </div>

        <!-- 底部更新区 -->
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-gray-700"><i class="fas fa-edit text-indigo-500 mr-2"></i>更新今日数据</h3>
                <span class="text-xs text-gray-400">每日收盘后更新</span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">日期</label>
                    <input type="date" id="updateDate" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">总资产</label>
                    <input type="number" id="updateAssets" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="输入总资产">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">今日盈亏</label>
                    <input type="number" id="updatePnL" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="输入盈亏">
                </div>
            </div>
            <button onclick="submitUpdate()" class="w-full mt-3 py-2 bg-indigo-500 text-white rounded-lg text-sm font-medium hover:bg-indigo-600">
                提交更新
            </button>
        </div>
    </div>

    <!-- 面板容器 -->
    <div id="panelContainer"></div>


    <!-- 移动端优化：底部导航栏 -->
    <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 md:hidden z-50 safe-area-bottom">
        <div class="flex justify-around items-center py-2 pb-safe">
            <button onclick="scrollToSection('dashboard')" class="flex flex-col items-center p-2 text-indigo-600">
                <i class="fas fa-home text-lg"></i>
                <span class="text-xs mt-1">首页</span>
            </button>
            <button onclick="scrollToSection('holdings')" class="flex flex-col items-center p-2 text-gray-500">
                <i class="fas fa-chart-pie text-lg"></i>
                <span class="text-xs mt-1">持仓</span>
            </button>
            <button onclick="showQuickActions()" class="flex flex-col items-center p-2 -mt-4">
                <div class="w-12 h-12 rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white flex items-center justify-center shadow-lg">
                    <i class="fas fa-plus"></i>
                </div>
            </button>
                        <button onclick="showCalendarView()" class="flex flex-col items-center p-2 text-gray-500">
                <i class="fas fa-calendar-alt text-lg"></i>
                <span class="text-xs mt-1">日历</span>
            </button>
            <button onclick="showSettings()" class="flex flex-col items-center p-2 text-gray-500">
                <i class="fas fa-cog text-lg"></i>
                <span class="text-xs mt-1">设置</span>
            </button>
        </div>
    </nav>

    <!-- 移动端优化：快速操作面板 -->
    <div id="quickActionPanel" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="closeQuickActions()">
        <div class="absolute bottom-20 left-4 right-4 bg-white rounded-2xl p-4" onclick="event.stopPropagation()">
            <div class="grid grid-cols-4 gap-4">
                <button onclick="playTodayAudio(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-purple-50 to-purple-100">
                    <i class="fas fa-play text-purple-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">播放晨报</span>
                </button>
                <button onclick="showAccountsPanel(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-indigo-50 to-indigo-100">
                    <i class="fas fa-wallet text-indigo-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">账户</span>
                </button>
                <button onclick="showRebalancePanel(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-teal-50 to-teal-100">
                    <i class="fas fa-balance-scale text-teal-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">再平衡</span>
                </button>
                <button onclick="showRiskPanel(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-red-50 to-red-100">
                    <i class="fas fa-shield-alt text-red-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">风险</span>
                </button>
                
                <button onclick="showAttributionPanel(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-pink-50 to-pink-100">
                    <i class="fas fa-chart-pie text-pink-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">归因</span>
                </button>
                
                <button onclick="showCalendarView(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-orange-50 to-orange-100">
                    <i class="fas fa-calendar-alt text-orange-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">日历</span>
                </button>
                
                <!-- 导出按钮 -->
                <button onclick="showExportMenu(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-emerald-50 to-emerald-100">
                    <i class="fas fa-file-export text-emerald-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">导出</span>
                </button>
                
                <button onclick="realtimeData.refresh(); closeQuickActions()" class="flex flex-col items-center p-3 rounded-xl bg-gradient-to-br from-blue-50 to-blue-100">
                    <i class="fas fa-sync text-blue-600 text-xl mb-2"></i>
                    <span class="text-xs text-gray-700">刷新</span>
                </button>
            </div>
        </div>
    </div>
    <!-- 异步加载脚本 -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js" defer></script>
    <script src="account_manager.js"></script>
    <script src="portfolio-export.js" defer></script>
    
    <script>
        // ========== 加载状态管理器 ==========
        const LoadingManager = {
            states: {
                localData: false,
                apiData: false,
                chartLoaded: false
            },
            
            showStatus(text, type = 'loading') {
                const status = document.getElementById('dataStatus');
                const statusText = document.getElementById('dataStatusText');
                statusText.textContent = text;
                status.className = 'data-status visible ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
                
                if (type === 'success') {
                    setTimeout(() => status.classList.remove('visible'), 2000);
                }
            },
            
            hideSkeleton(type) {
                const skeletonMap = {
                    'assets': ['skeleton-assets', 'real-assets'],
                    'daily': ['skeleton-daily', 'real-daily'],
                    'total': ['skeleton-total', 'real-total'],
                    'risk': ['skeleton-risk', 'real-risk'],
                    'stocks': ['skeleton-stocks', 'content-stocks']
                };
                
                const mapping = skeletonMap[type];
                if (mapping) {
                    const [skeletonId, realId] = mapping;
                    const skeleton = document.getElementById(skeletonId);
                    const real = document.getElementById(realId);
                    if (skeleton) skeleton.classList.add('hidden');
                    if (real) {
                        real.classList.remove('hidden');
                        real.classList.add('fade-in');
                    }
                }
            },
            
            updateLiveIndicator(status) {
                const indicator = document.getElementById('liveIndicator');
                const text = document.getElementById('liveText');
                
                if (status === 'live') {
                    indicator.className = 'w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse';
                    text.textContent = '实时';
                } else if (status === 'local') {
                    indicator.className = 'w-1.5 h-1.5 bg-yellow-500 rounded-full';
                    text.textContent = '本地';
                } else {
                    indicator.className = 'w-1.5 h-1.5 bg-gray-300 rounded-full';
                    text.textContent = '初始化';
                }
            }
        };

        // ========== 渐进式数据加载 ==========
        const DataLoader = {
            cache: null,
            useRealData: false,
            // 使用config.js中的配置，支持环境覆盖
            get API_BASE() { return (typeof CONFIG !== 'undefined' && CONFIG.API && CONFIG.API.BASE) ? CONFIG.API.BASE : ''; },
            
            // 阶段1：立即显示本地缓存数据
            async loadLocalData() {
                LoadingManager.showStatus('加载本地数据...');
                
                try {
                    // 优先从内存读取
                    if (this.cache) {
                        return this.cache;
                    }
                    
                    // 尝试从sessionStorage读取缓存
                    const cached = sessionStorage.getItem('portfolio_cache');
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        const age = Date.now() - (parsed.timestamp || 0);
                        // 缓存5分钟内有效
                        if (age < 300000) {
                            this.cache = parsed.data;
                            return this.cache;
                        }
                    }
                    
                    // 加载 holdings.json
                    const response = await fetch('data/holdings.json', { 
                        cache: 'default',
                        priority: 'high'
                    });
                    
                    if (!response.ok) throw new Error('Failed to load holdings');
                    
                    const data = await response.json();
                    this.cache = this.transformData(data);
                    
                    // 保存到sessionStorage
                    sessionStorage.setItem('portfolio_cache', JSON.stringify({
                        timestamp: Date.now(),
                        data: this.cache
                    }));
                    
                    LoadingManager.states.localData = true;
                    return this.cache;
                } catch (e) {
                    console.error('[本地数据加载失败]', e);
                    return this.getDefaultData();
                }
            },
            
            // 阶段2：后台更新API数据
            async loadApiData() {
                try {
                    LoadingManager.showStatus('同步实时数据...');
                    
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 5000);
                    
                    const resp = await fetch(`${this.API_BASE}/api/portfolio`, {
                        signal: controller.signal,
                        priority: 'low'
                    });
                    
                    clearTimeout(timeout);
                    
                    if (!resp.ok) throw new Error('API Error');
                    
                    const result = await resp.json();
                    if (result.success && result.data) {
                        this.useRealData = true;
                        LoadingManager.states.apiData = true;
                        LoadingManager.showStatus('实时数据已同步', 'success');
                        LoadingManager.updateLiveIndicator('live');
                        return result.data;
                    }
                } catch (e) {
                    console.log('[API数据加载失败]', e);
                    LoadingManager.showStatus('使用本地缓存数据', 'error');
                    LoadingManager.updateLiveIndicator('local');
                }
                return null;
            },
            
            transformData(data) {
                // 使用AccountManager转换多账户格式
                const accounts = AccountManager.transformFromRaw(data);
                
                return {
                    accounts: accounts,
                    history: data.history || []
                };
            },
            
            getDefaultData() {
                return {
                    accounts: {
                        'default': {
                            id: 'default',
                            name: '主账户',
                            type: 'stock',
                            icon: 'fa-wallet',
                            color: '#6366f1',
                            data: {
                                date: new Date().toISOString().split('T')[0],
                                totalAssets: 400500,
                                dailyPnL: 961,
                                totalPnL: 16600,
                                stocks: [],
                                funds: []
                            }
                        }
                    },
                    history: []
                };
            }
        };

        // ========== 全局数据 ==========
        let portfolioData = { accounts: {}, history: [] };
        let currentAccountId = 'default';
        let chart = null;
        
        // ========== 初始化流程 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            initDate();
            
            // 阶段1：快速显示本地数据
            const localData = await DataLoader.loadLocalData();
            portfolioData = localData;
            
            // 初始化账户管理器
            if (typeof accountManager !== 'undefined') {
                accountManager.init(portfolioData.accounts);
                accountManager.onSwitch((accountId, account) => {
                    currentAccountId = accountId;
                    renderDashboard();
                });
            } else {
                currentAccountId = Object.keys(portfolioData.accounts)[0] || 'default';
            }
            
            renderDashboard();
            LoadingManager.hideSkeleton('assets');
            LoadingManager.hideSkeleton('daily');
            LoadingManager.hideSkeleton('total');
            LoadingManager.hideSkeleton('risk');
            
            // 阶段2：后台加载API数据
            setTimeout(async () => {
                const apiData = await DataLoader.loadApiData();
                if (apiData) {
                    updateDashboardWithRealData(apiData);
                }
            }, 100);
            
            // 阶段3：图表懒加载（IntersectionObserver）
            initChartLazyLoad();
            
            // 持仓列表骨架屏延迟隐藏
            setTimeout(() => {
                LoadingManager.hideSkeleton('stocks');
            }, 300);
        });

        // ========== 日期初始化 ==========
        function initDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('currentDate').textContent = today;
            document.getElementById('updateDate').value = today;
        }

        // ========== 图表懒加载 ==========
        function initChartLazyLoad() {
            const chartSection = document.getElementById('chartSection');
            
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !LoadingManager.states.chartLoaded) {
                            LoadingManager.states.chartLoaded = true;
                            loadChart();
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                
                observer.observe(chartSection);
            } else {
                // 降级处理
                setTimeout(loadChart, 1000);
            }
        }
        
        async function loadChart() {
            // 等待Chart.js加载完成
            let attempts = 0;
            while (typeof Chart === 'undefined' && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            if (typeof Chart === 'undefined') {
                console.error('Chart.js failed to load');
                return;
            }
            
            document.getElementById('chartSkeleton').classList.add('hidden');
            document.getElementById('chartContainer').classList.remove('hidden');
            
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const history = portfolioData.history || [];
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.slice(-30).map(h => h.date.slice(5)),
                    datasets: [{
                        label: '总资产',
                        data: history.slice(-30).map(h => h.totalAssets / 10000),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            ticks: { callback: v => '¥' + v.toFixed(1) + '万' }
                        }
                    }
                }
            });
        }

        // ========== 仪表盘渲染 ==========
        function renderDashboard() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) {
                renderEmptyState();
                return;
            }

            const data = account.data;
            const stocks = data.stocks || [];
            const funds = data.funds || [];
            
            // 检查是否为空持仓
            const isEmpty = stocks.length === 0 && funds.length === 0;
            if (isEmpty) {
                renderEmptyState();
                return;
            }
            
            // 正常渲染有数据的状态
            renderWithData(data, stocks, funds);
        }
        
        // 渲染空状态
        function renderEmptyState() {
            // 总资产显示提示
            document.getElementById('totalAssets').innerHTML = '<span class="text-gray-400">暂无数据</span>';
            
            // 今日盈亏显示提示
            const pnlEl = document.getElementById('dailyPnL');
            pnlEl.textContent = '--';
            pnlEl.className = 'text-2xl font-bold text-gray-400';
            document.getElementById('dailyPercent').textContent = '点击添加持仓';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 text-indigo-500 cursor-pointer';
            document.getElementById('dailyPercent').onclick = () => showAccountsPanel();
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = '--';
            totalPnlEl.className = 'text-2xl font-bold text-gray-400';

            // 持仓统计
            document.getElementById('accountCount').textContent = '0只股票 · 0只基金';

            // 风险等级
            document.getElementById('riskLevel').innerHTML = '<span class="px-3 py-1 rounded-lg bg-gray-100 text-gray-400">无数据</span>';
            document.getElementById('riskDetail').textContent = '请先添加持仓';

            // 持仓列表显示空状态
            document.getElementById('content-stocks').innerHTML = `
                <div class="text-center py-12">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-indigo-50 flex items-center justify-center">
                        <i class="fas fa-wallet text-indigo-300 text-2xl"></i>
                    </div>
                    <p class="text-gray-500 mb-2">暂无持仓数据</p>
                    <button onclick="showAccountsPanel()" class="px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600">
                        <i class="fas fa-plus mr-1"></i>添加持仓
                    </button>
                </div>
            `;
            document.getElementById('content-funds').innerHTML = `
                <div class="text-center py-12 text-gray-400">暂无基金持仓</div>
            `;
        }
        
        // 渲染有数据的状态
        function renderWithData(data, stocks, funds) {
            
            const stockValue = stocks.reduce((sum, s) => sum + (s.marketValue || 0), 0);
            const fundValue = funds.reduce((sum, f) => sum + (f.marketValue || 0), 0);
            const totalValue = stockValue + fundValue;
            
            const calculateDailyPnL = (item) => {
                if (item.dailyPnL !== undefined && item.dailyPnL !== 0) return item.dailyPnL;
                if (item.dailyChange !== undefined && item.marketValue) {
                    return item.marketValue * item.dailyChange / (100 + item.dailyChange);
                }
                return 0;
            };
            
            const totalDailyPnL = stocks.reduce((sum, s) => sum + calculateDailyPnL(s), 0) +
                                  funds.reduce((sum, f) => sum + calculateDailyPnL(f), 0);
            
            const totalPnL = stocks.reduce((sum, s) => sum + (s.totalPnL || 0), 0) +
                            funds.reduce((sum, f) => sum + (f.totalPnL || 0), 0);
            
            // 总资产
            document.getElementById('totalAssets').textContent = '¥' + (totalValue / 10000).toFixed(2) + '万';
            
            // 今日盈亏
            const pnlEl = document.getElementById('dailyPnL');
            pnlEl.textContent = (totalDailyPnL >= 0 ? '+' : '') + '¥' + Math.abs(totalDailyPnL).toLocaleString();
            pnlEl.className = 'text-2xl font-bold ' + (totalDailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 盈亏百分比
            const yesterdayValue = totalValue - totalDailyPnL;
            const pnlPercent = yesterdayValue > 0 ? (totalDailyPnL / yesterdayValue * 100).toFixed(2) : 0;
            document.getElementById('dailyPercent').textContent = (totalDailyPnL >= 0 ? '+' : '') + pnlPercent + '%';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (totalDailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = (totalPnL >= 0 ? '+' : '') + '¥' + (totalPnL / 10000).toFixed(2) + '万';
            totalPnlEl.className = 'text-2xl font-bold ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');

            // 持仓统计
            document.getElementById('accountCount').textContent = `${stocks.length}只股票 · ${funds.length}只基金`;

            // 风险等级
            calculateRiskLevel();

            // 持仓列表
            renderHoldings();
        }

        // ========== 实时数据更新 ==========
        function updateDashboardWithRealData(portfolio) {
            const summary = portfolio.summary;
            const holdings = portfolio.holdings;
            
            // 总资产
            document.getElementById('totalAssets').textContent = '¥' + (summary.totalValue / 10000).toFixed(2) + '万';
            
            // 今日盈亏
            const pnlEl = document.getElementById('dailyPnL');
            const dailyPnL = summary.dailyPnL || 0;
            pnlEl.textContent = (dailyPnL >= 0 ? '+' : '') + '¥' + Math.abs(dailyPnL).toLocaleString();
            pnlEl.className = 'text-2xl font-bold ' + (dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 盈亏百分比
            const totalValue = summary.totalValue || 0;
            const yesterdayValue = totalValue - dailyPnL;
            const dailyPercent = yesterdayValue > 0 ? (dailyPnL / yesterdayValue * 100).toFixed(2) : 0;
            document.getElementById('dailyPercent').textContent = (dailyPnL >= 0 ? '+' : '') + dailyPercent + '%';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = (summary.totalPnL >= 0 ? '+' : '') + '¥' + (summary.totalPnL / 10000).toFixed(2) + '万';
            totalPnlEl.className = 'text-2xl font-bold ' + (summary.totalPnL >= 0 ? 'trend-up' : 'trend-down');

            document.getElementById('accountCount').textContent = summary.holdingCount + '只持仓';

            calculateRiskLevelFromData(holdings);
            renderHoldingsFromRealData(holdings);
        }

        // ========== 风险等级计算 ==========
        function calculateRiskLevel() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const stocks = account.data.stocks || [];
            const funds = account.data.funds || [];
            
            let totalValue = 0;
            let maxPosition = 0;
            
            [...stocks, ...funds].forEach(item => {
                const value = item.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            const concentration = totalValue > 0 ? maxPosition / totalValue : 0;
            updateRiskDisplay(concentration);
        }

        function calculateRiskLevelFromData(holdings) {
            if (!holdings || holdings.length === 0) return;
            
            let totalValue = 0;
            let maxPosition = 0;
            
            holdings.forEach(h => {
                const value = h.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            const concentration = totalValue > 0 ? maxPosition / totalValue : 0;
            updateRiskDisplay(concentration);
        }

        function updateRiskDisplay(concentration) {
            let riskLevel, riskClass, riskDesc;
            if (concentration > 0.6) {
                riskLevel = '高风险';
                riskClass = 'risk-high';
                riskDesc = '持仓集中度过高';
            } else if (concentration > 0.4) {
                riskLevel = '中风险';
                riskClass = 'risk-medium';
                riskDesc = '平衡型投资组合';
            } else {
                riskLevel = '低风险';
                riskClass = 'risk-low';
                riskDesc = '分散型投资组合';
            }

            const riskEl = document.getElementById('riskLevel');
            riskEl.innerHTML = `<span class="px-3 py-1 rounded-lg ${riskClass}">${riskLevel}</span>`;
            document.getElementById('riskDetail').textContent = riskDesc;
        }

        // ========== 持仓渲染 ==========
        function renderHoldings() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const stocks = account.data.stocks || [];
            const funds = account.data.funds || [];
            
            // 渲染股票
            let stocksHtml = '<div class="overflow-x-auto pb-2"><div class="flex gap-3" style="min-width: max-content;">';
            
            if (stocks.length === 0) {
                stocksHtml += '<div class="text-center py-8 text-gray-400 flex-shrink-0">暂无股票持仓</div>';
            } else {
                stocks.forEach(stock => renderStockCard(stock, (html) => stocksHtml += html));
            }
            
            stocksHtml += '</div></div>';
            document.getElementById('content-stocks').innerHTML = stocksHtml;
            
            // 渲染基金
            let fundsHtml = '<div class="overflow-x-auto pb-2"><div class="flex gap-3" style="min-width: max-content;">';
            
            if (funds.length === 0) {
                fundsHtml += '<div class="text-center py-8 text-gray-400 flex-shrink-0">暂无基金持仓</div>';
            } else {
                funds.forEach(fund => renderFundCard(fund, (html) => fundsHtml += html));
            }
            
            fundsHtml += '</div></div>';
            document.getElementById('content-funds').innerHTML = fundsHtml;
        }

        function renderStockCard(stock, append) {
            const marketValue = stock.marketValue || (stock.shares * stock.price);
            const pnl = stock.totalPnL || 0;
            const dailyChange = stock.dailyChange || 0;
            const dailyPnl = stock.dailyPnL || (marketValue * dailyChange / (100 + dailyChange)) || 0;
            
            append(`
                <div class="flex-shrink-0 w-44 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <div class="font-bold text-gray-800 truncate">${stock.name}</div>
                        <span class="text-xs px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded">${stock.code}</span>
                    </div>
                    <div class="text-2xl font-bold text-gray-800 mb-1">¥${stock.price.toFixed(2)}</div>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-xs ${dailyChange >= 0 ? 'text-red-500' : 'text-green-500'}">
                            ${dailyChange >= 0 ? '+' : ''}${dailyChange.toFixed(2)}%
                        </span>
                        <span class="text-xs text-gray-400">|</span>
                        <span class="text-xs ${dailyPnl >= 0 ? 'text-red-500' : 'text-green-500'}">
                            今日${dailyPnl >= 0 ? '+' : ''}¥${(dailyPnl/10000).toFixed(2)}万
                        </span>
                    </div>
                    <div class="space-y-1 text-xs border-t border-gray-100 pt-2">
                        <div class="flex justify-between">
                            <span class="text-gray-400">持股</span>
                            <span class="text-gray-600">${stock.shares.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">市值</span>
                            <span class="text-gray-600">¥${(marketValue/10000).toFixed(2)}万</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">累计盈亏</span>
                            <span class="${pnl >= 0 ? 'text-red-500' : 'text-green-500'}">
                                ${pnl >= 0 ? '+' : ''}¥${(pnl/10000).toFixed(2)}万
                            </span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">权重</span>
                            <span class="text-gray-600">${((stock.weight || 0)).toFixed(2)}%</span>
                        </div>
                    </div>
                </div>

        // 触摸手势支持 - Tab滑动切换
        let touchStartX = 0;
        let touchEndX = 0;
        const tabs = ['stocks', 'funds', 'news', 'history'];
        let currentTabIndex = 0;
        
        function initTouchGestures() {
            const container = document.querySelector('.glass.rounded-2xl.overflow-hidden');
            if (!container) return;
            
            container.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            container.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
        }
        
        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0 && currentTabIndex < tabs.length - 1) {
                    // 向左滑，下一个tab
                    currentTabIndex++;
                    switchTab(tabs[currentTabIndex]);
                } else if (diff < 0 && currentTabIndex > 0) {
                    // 向右滑，上一个tab
                    currentTabIndex--;
                    switchTab(tabs[currentTabIndex]);
                }
            }
        }
        
        // 更新Tab切换函数以记录当前索引
        const originalSwitchTab = switchTab;
        switchTab = function(tab) {
            originalSwitchTab(tab);
            currentTabIndex = tabs.indexOf(tab);
        };
        
        // 初始化触摸手势
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(initTouchGestures, 500);

        function calculateAttribution(stocks, funds) {
            const allHoldings = [...stocks, ...funds];
            const totalValue = allHoldings.reduce((sum, h) => sum + (h.marketValue || 0), 0);
            const totalPnL = allHoldings.reduce((sum, h) => sum + (h.totalPnL || 0), 0);
            
            // 1. 资产类别归因
            const assetAttribution = {
                stocks: { value: 0, pnl: 0, weight: 0 },
                funds: { value: 0, pnl: 0, weight: 0 },
                cash: { value: 0, pnl: 0, weight: 0 }
            };
            
            stocks.forEach(s => {
                assetAttribution.stocks.value += s.marketValue || 0;
                assetAttribution.stocks.pnl += s.totalPnL || 0;
            });
            
            funds.forEach(f => {
                if (f.code === 'YEB') {
                    assetAttribution.cash.value += f.marketValue || 0;
                    assetAttribution.cash.pnl += f.totalPnL || 0;
                } else {
                    assetAttribution.funds.value += f.marketValue || 0;
                    assetAttribution.funds.pnl += f.totalPnL || 0;
                }
            });
            
            Object.keys(assetAttribution).forEach(key => {
                assetAttribution[key].weight = totalValue > 0 ? (assetAttribution[key].value / totalValue * 100).toFixed(1) : 0;
                assetAttribution[key].contribution = totalPnL !== 0 ? (assetAttribution[key].pnl / totalPnL * 100).toFixed(1) : 0;
            });
            
            // 2. 市场分布归因
            const marketAttribution = {};
            allHoldings.forEach(h => {
                const market = h.market || '其他';
                if (!marketAttribution[market]) {
                    marketAttribution[market] = { value: 0, pnl: 0, count: 0 };
                }
                marketAttribution[market].value += h.marketValue || 0;
                marketAttribution[market].pnl += h.totalPnL || 0;
                marketAttribution[market].count++;
            });
            
            Object.keys(marketAttribution).forEach(key => {
                marketAttribution[key].weight = totalValue > 0 ? (marketAttribution[key].value / totalValue * 100).toFixed(1) : 0;
                marketAttribution[key].contribution = totalPnL !== 0 ? (marketAttribution[key].pnl / totalPnL * 100).toFixed(1) : 0;
            });
            
            // 3. 个券归因（按收益贡献排序）
            const holdingAttribution = allHoldings
                .map(h => ({
                    ...h,
                    contribution: totalPnL !== 0 ? (h.totalPnL || 0) / totalPnL * 100 : 0,
                    contributionAbs: Math.abs(h.totalPnL || 0)
                }))
                .sort((a, b) => b.contributionAbs - a.contributionAbs);
            
            // 4. 盈亏分布
            const profitHoldings = allHoldings.filter(h => (h.totalPnL || 0) > 0);
            const lossHoldings = allHoldings.filter(h => (h.totalPnL || 0) < 0);
            const profitCount = profitHoldings.length;
            const lossCount = lossHoldings.length;
            const profitValue = profitHoldings.reduce((sum, h) => sum + (h.totalPnL || 0), 0);
            const lossValue = lossHoldings.reduce((sum, h) => sum + (h.totalPnL || 0), 0);
            
            return {
                totalValue,
                totalPnL,
                assetAttribution,
                marketAttribution,
                holdingAttribution,
                winLoss: {
                    profitCount,
                    lossCount,
                    profitValue,
                    lossValue,
                    winRate: allHoldings.length > 0 ? (profitCount / allHoldings.length * 100).toFixed(1) : 0
                }
            };
        }

        function generateCalendarGrid(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            let html = '';
            
            // 空白填充
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="h-10"></div>';
            }
            
            // 日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTrades = calendarTradeRecords.filter(r => r.date === dateStr);
                const hasTrade = dayTrades.length > 0;
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                
                let indicator = '';
                if (hasTrade) {
                    const buyCount = dayTrades.filter(t => t.type === 'buy').length;
                    const sellCount = dayTrades.filter(t => t.type === 'sell').length;
                    if (buyCount > 0 && sellCount > 0) {
                        indicator = '<div class="w-1.5 h-1.5 rounded-full bg-purple-500 mx-auto mt-0.5"></div>';
                    } else if (buyCount > 0) {
                        indicator = '<div class="w-1.5 h-1.5 rounded-full bg-red-500 mx-auto mt-0.5"></div>';
                    } else {
                        indicator = '<div class="w-1.5 h-1.5 rounded-full bg-green-500 mx-auto mt-0.5"></div>';
                    }
                }
                
                html += `
                    <div class="h-10 flex flex-col items-center justify-center rounded-lg ${isToday ? 'bg-orange-100' : 'hover:bg-gray-50'} cursor-pointer"
                         onclick="showDayTrades('${dateStr}')">
                        <span class="text-sm ${isToday ? 'text-orange-600 font-bold' : 'text-gray-700'}">${day}</span>
                        ${indicator}
                    </div>
                `;
            }
            
            return html;
        }
        
        function generateTradeList() {
            if (calendarTradeRecords.length === 0) {
                return `
                    <div class="text-center py-8 text-gray-400">
                        <i class="fas fa-inbox text-4xl mb-3"></i>
                        <p>暂无交易记录</p>
                        <p class="text-xs mt-2">交易数据将在同步时自动记录</p>
                    </div>
                `;
            }
            
            // 按日期分组
            const grouped = {};
            calendarTradeRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            calendarTradeRecords.forEach(r => {
                if (!grouped[r.date]) grouped[r.date] = [];
                grouped[r.date].push(r);
            });
            
            let html = '';
            Object.keys(grouped).forEach(date => {
                const trades = grouped[date];
                const dateObj = new Date(date);
                const dateStr = `${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
                
                html += `
                    <div class="mb-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded">${dateStr}</span>
                            <span class="text-xs text-gray-400">${trades.length}笔交易</span>
                        </div>
                        <div class="space-y-2">
                            ${trades.map(t => `
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                    <div class="flex items-center gap-2">
                                        <span class="w-6 h-6 rounded-full ${t.type === 'buy' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'} flex items-center justify-center text-xs">
                                            ${t.type === 'buy' ? '买' : '卖'}
                                        </span>
                                        <span class="text-sm font-medium text-gray-800">${t.name || t.code}</span>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-sm text-gray-800">${t.shares}股 @ ¥${t.price}</div>
                                        <div class="text-xs text-gray-400">¥${(t.shares * t.price).toLocaleString()}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            return html;
        }
        
        function switchCalendarView(mode) {

        function changeMonth(delta) {
            calendarCurrentDate.setMonth(calendarCurrentDate.getMonth() + delta);

        function showDayTrades(dateStr) {
            const dayTrades = calendarTradeRecords.filter(r => r.date === dateStr);
            if (dayTrades.length === 0) return;
            
            const dateObj = new Date(dateStr);
            const title = `${dateObj.getMonth() + 1}月${dateObj.getDate()}日交易记录`;
            
            const content = dayTrades.map(t => `

                        </div>
                        <div class="text-xs text-gray-400">@ ¥${t.price}</div>
                    </div>
                </div>
            `).join('');
            
            showFeaturePanel(title, content, 'fa-list');
        }
        
        function getMonthTradeCount() {
            const year = calendarCurrentDate.getFullYear();
            const month = calendarCurrentDate.getMonth();
            return calendarTradeRecords.filter(r => {

            }).length;
        }

        // Toast提示系统
        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-indigo-500'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            
            const toastId = 'toast_' + Date.now();
            const toastHtml = `
                <div id="${toastId}" class="fixed top-20 left-1/2 transform -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2 animate-fade-in"
                     style="animation: fadeIn 0.3s ease"
                >
                    <i class="fas ${icons[type]}"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', toastHtml);
            
            // 3秒后自动消失
            setTimeout(() => {
                const toast = document.getElementById(toastId);
                if (toast) {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 3000);
        }
