<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人持仓跟踪系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .positive { color: #ef4444; }
        .negative { color: #22c55e; }
        .neutral { color: #6b7280; }
        @media (max-width: 768px) { .hide-mobile { display: none; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="gradient-bg text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-chart-line text-2xl"></i>
                <h1 class="text-xl font-bold">持仓跟踪系统</h1>
            </div>
            <div class="text-sm opacity-90">
                <span id="currentDate"></span>
                <span class="ml-2 px-2 py-1 bg-white/20 rounded-full text-xs">数据更新: 每日 20:00</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4">
        <!-- 总览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card p-6">
                <div class="text-gray-500 text-sm mb-1">总资产</div>
                <div class="text-2xl font-bold text-gray-800" id="totalAssets">¥0.00</div>
                <div class="text-xs text-gray-400 mt-1">基金 + 股票</div>
            </div>
            <div class="card p-6">
                <div class="text-gray-500 text-sm mb-1">今日盈亏</div>
                <div class="text-2xl font-bold" id="dailyPnL">¥0.00</div>
                <div class="text-xs mt-1" id="dailyPnLPercent">0.00%</div>
            </div>
            <div class="card p-6">
                <div class="text-gray-500 text-sm mb-1">累计盈亏</div>
                <div class="text-2xl font-bold" id="totalPnL">¥0.00</div>
                <div class="text-xs mt-1" id="totalPnLPercent">0.00%</div>
            </div>
            <div class="card p-6">
                <div class="text-gray-500 text-sm mb-1">持仓标的</div>
                <div class="text-2xl font-bold text-gray-800" id="holdingsCount">0</div>
                <div class="text-xs text-gray-400 mt-1">基金 8 | 股票 4</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="card p-6">
                <h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-pie-chart mr-2"></i>资产配置</h3>
                <canvas id="allocationChart"></canvas>
            </div>
            <div class="card p-6">
                <h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-chart-bar mr-2"></i>分类收益</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- 基金持仓 -->
        <div class="card mb-6">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-700"><i class="fas fa-wallet mr-2 text-blue-500"></i>基金持仓</h3>
                <button onclick="toggleEdit('fund')" class="text-blue-500 hover:text-blue-700 text-sm">
                    <i class="fas fa-edit mr-1"></i>编辑
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3 text-left text-xs font-medium text-gray-500">名称</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500">市值</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500">日收益</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500 hide-mobile">持有收益</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500">收益率</th>
                            <th class="p-3 text-center text-xs font-medium text-gray-500 hide-mobile">占比</th>
                        </tr>
                    </thead>
                    <tbody id="fundTable"></tbody>
                </table>
            </div>
        </div>

        <!-- 股票持仓 -->
        <div class="card mb-6">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-700"><i class="fas fa-chart-line mr-2 text-red-500"></i>股票持仓</h3>
                <button onclick="toggleEdit('stock')" class="text-blue-500 hover:text-blue-700 text-sm">
                    <i class="fas fa-edit mr-1"></i>编辑
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-3 text-left text-xs font-medium text-gray-500">名称</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500">市值</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500 hide-mobile">持股</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500 hide-mobile">现价/成本</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500">持仓盈亏</th>
                            <th class="p-3 text-right text-xs font-medium text-gray-500">收益率</th>
                        </tr>
                    </thead>
                    <tbody id="stockTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Beta 分析 -->
        <div class="card p-6 mb-6">
            <h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-calculator mr-2 text-purple-500"></i>风险指标（Beta 值估算）</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="betaAnalysis">
                <!-- 动态生成 -->
            </div>
            <p class="text-xs text-gray-400 mt-4">* Beta 值基于标的类型和市场历史数据估算，仅供参考</p>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-lg m-4 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold" id="editTitle">编辑持仓</h3>
                <button onclick="closeEdit()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <div id="editForm"></div>
            <div class="flex gap-2 mt-4">
                <button onclick="saveEdit()" class="flex-1 bg-blue-500 text-white py-2 rounded hover:bg-blue-600">保存</button>
                <button onclick="closeEdit()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded hover:bg-gray-300">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 持仓数据 - 2026/3/10 快照
        let portfolio = {
            funds: [
                { name: "嘉实新能源新材料股票A", code: "003984", marketValue: 46090.54, dailyPnL: 859.37, holdingPnL: 20385.88, returnRate: 79.31, category: "新能源", market: "A股" },
                { name: "华夏人工智能ETF联接D", code: "008586", marketValue: 22473.41, dailyPnL: 432.15, holdingPnL: 8473.41, returnRate: 60.52, category: "科技", market: "A股" },
                { name: "嘉实美国成长股票(QDII)", code: "000043", marketValue: 37099.96, dailyPnL: 737.84, holdingPnL: 4099.96, returnRate: 12.42, category: "美股", market: "美股" },
                { name: "华宝海外新能源汽车(QDII)A", code: "007904", marketValue: 17076.65, dailyPnL: 401.69, holdingPnL: 1076.65, returnRate: 6.73, category: "新能源", market: "海外" },
                { name: "华夏中证红利质量ETF联接A", code: "016440", marketValue: 11257.07, dailyPnL: 207.80, holdingPnL: 665.18, returnRate: 6.28, category: "红利", market: "A股" },
                { name: "华泰柏瑞中证红利低波动ETF联接C", code: "007467", marketValue: 10166.89, dailyPnL: -28.86, holdingPnL: -260.88, returnRate: -2.47, category: "红利", market: "A股" },
                { name: "博时智选量化多因子股票C", code: "013231", marketValue: 9338.01, dailyPnL: 236.47, holdingPnL: -374.33, returnRate: -3.27, category: "量化", market: "A股" },
                { name: "华安恒生科技ETF联接(QDII)C", code: "015283", marketValue: 10503.40, dailyPnL: 209.38, holdingPnL: -1500.92, returnRate: -12.50, category: "科技", market: "港股" },
                { name: "余额宝", code: "YEB", marketValue: 961.78, dailyPnL: 0.02, holdingPnL: 98.33, returnRate: 0, category: "现金", market: "现金" }
            ],
            stocks: [
                { name: "比亚迪", code: "002594", marketValue: 202860.00, shares: 2100, price: 96.60, cost: 103.635, holdingPnL: -14772.57, returnRate: -6.79, category: "汽车", market: "A股" },
                { name: "电网设备", code: "601669", marketValue: 11421.00, shares: 5400, price: 2.115, cost: 1.881, holdingPnL: 1261.80, returnRate: 12.44, category: "基建", market: "A股" },
                { name: "中科曙光", code: "603019", marketValue: 8819.00, shares: 100, price: 88.19, cost: 165.432, holdingPnL: -7724.15, returnRate: -46.69, category: "科技", market: "A股" },
                { name: "洛阳钼业", code: "603993", marketValue: 6522.00, shares: 300, price: 21.74, cost: -20.514, holdingPnL: 12676.30, returnRate: 0, category: "有色", market: "A股" }
            ]
        };

        // Beta 值参考表
        const betaReference = {
            "新能源": 1.3, "科技": 1.4, "汽车": 1.2, "有色": 1.1,
            "基建": 0.9, "红利": 0.7, "量化": 0.8, "美股": 1.0,
            "港股": 1.2, "现金": 0
        };

        // 格式化金额
        function formatMoney(num) {
            return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // 格式化百分比
        function formatPercent(num) {
            return (num > 0 ? '+' : '') + num.toFixed(2) + '%';
        }

        // 渲染总览
        function renderSummary() {
            const totalFunds = portfolio.funds.reduce((sum, f) => sum + f.marketValue, 0);
            const totalStocks = portfolio.stocks.reduce((sum, s) => sum + s.marketValue, 0);
            const totalAssets = totalFunds + totalStocks;
            
            const fundDaily = portfolio.funds.reduce((sum, f) => sum + f.dailyPnL, 0);
            const fundHolding = portfolio.funds.reduce((sum, f) => sum + f.holdingPnL, 0);
            const stockDaily = -1543.00; // 股票账户今日盈亏
            const stockHolding = -8558.62; // 股票账户累计盈亏
            
            const totalDaily = fundDaily + stockDaily;
            const totalHolding = fundHolding + stockHolding;

            document.getElementById('totalAssets').textContent = formatMoney(totalAssets);
            
            const dailyEl = document.getElementById('dailyPnL');
            dailyEl.textContent = (totalDaily > 0 ? '+' : '') + formatMoney(Math.abs(totalDaily)).replace('¥', '¥');
            dailyEl.className = 'text-2xl font-bold ' + (totalDaily >= 0 ? 'positive' : 'negative');
            
            document.getElementById('dailyPnLPercent').textContent = formatPercent(totalDaily / (totalAssets - totalDaily) * 100);
            document.getElementById('dailyPnLPercent').className = 'text-xs mt-1 ' + (totalDaily >= 0 ? 'positive' : 'negative');
            
            const totalEl = document.getElementById('totalPnL');
            totalEl.textContent = (totalHolding > 0 ? '+' : '') + formatMoney(Math.abs(totalHolding)).replace('¥', '¥');
            totalEl.className = 'text-2xl font-bold ' + (totalHolding >= 0 ? 'positive' : 'negative');
            
            document.getElementById('totalPnLPercent').textContent = formatPercent(totalHolding / (totalAssets - totalHolding) * 100);
            document.getElementById('totalPnLPercent').className = 'text-xs mt-1 ' + (totalHolding >= 0 ? 'positive' : 'negative');
            
            document.getElementById('holdingsCount').textContent = portfolio.funds.length + portfolio.stocks.length;
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');
        }

        // 渲染基金表格
        function renderFunds() {
            const total = portfolio.funds.reduce((sum, f) => sum + f.marketValue, 0);
            const tbody = document.getElementById('fundTable');
            tbody.innerHTML = portfolio.funds.map(f => {
                const percent = (f.marketValue / total * 100).toFixed(2);
                return `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3">
                            <div class="font-medium text-sm">${f.name}</div>
                            <div class="text-xs text-gray-400">${f.code}</div>
                        </td>
                        <td class="p-3 text-right font-medium">${formatMoney(f.marketValue)}</td>
                        <td class="p-3 text-right ${f.dailyPnL >= 0 ? 'positive' : 'negative'}">${f.dailyPnL >= 0 ? '+' : ''}${formatMoney(f.dailyPnL)}</td>
                        <td class="p-3 text-right ${f.holdingPnL >= 0 ? 'positive' : 'negative'} hide-mobile">${f.holdingPnL >= 0 ? '+' : ''}${formatMoney(f.holdingPnL)}</td>
                        <td class="p-3 text-right ${f.returnRate >= 0 ? 'positive' : 'negative'} font-bold">${formatPercent(f.returnRate)}</td>
                        <td class="p-3 text-center hide-mobile">
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-blue-500 h-2 rounded-full" style="width: ${percent}%"></div>
                            </div>
                            <span class="text-xs text-gray-500">${percent}%</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染股票表格
        function renderStocks() {
            const tbody = document.getElementById('stockTable');
            tbody.innerHTML = portfolio.stocks.map(s => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3">
                        <div class="font-medium text-sm">${s.name}</div>
                        <div class="text-xs text-gray-400">${s.code}</div>
                    </td>
                    <td class="p-3 text-right font-medium">${formatMoney(s.marketValue)}</td>
                    <td class="p-3 text-right hide-mobile">${s.shares.toLocaleString()}</td>
                    <td class="p-3 text-right hide-mobile">
                        <div>${s.price.toFixed(3)}</div>
                        <div class="text-xs text-gray-400">${s.cost.toFixed(3)}</div>
                    </td>
                    <td class="p-3 text-right ${s.holdingPnL >= 0 ? 'positive' : 'negative'}">${s.holdingPnL >= 0 ? '+' : ''}${formatMoney(s.holdingPnL)}</td>
                    <td class="p-3 text-right ${s.returnRate >= 0 ? 'positive' : 'negative'} font-bold">${formatPercent(s.returnRate)}</td>
                </tr>
            `).join('');
        }

        // 渲染资产配置图表
        function renderAllocationChart() {
            const fundTotal = portfolio.funds.reduce((sum, f) => sum + f.marketValue, 0);
            const stockTotal = portfolio.stocks.reduce((sum, s) => sum + s.marketValue, 0);
            
            new Chart(document.getElementById('allocationChart'), {
                type: 'doughnut',
                data: {
                    labels: ['基金', '股票'],
                    datasets: [{
                        data: [fundTotal, stockTotal],
                        backgroundColor: ['#3b82f6', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // 渲染分类收益图表
        function renderCategoryChart() {
            const categories = {};
            [...portfolio.funds, ...portfolio.stocks].forEach(item => {
                if (!categories[item.category]) categories[item.category] = 0;
                categories[item.category] += item.holdingPnL || item.holdingPnL;
            });
            
            new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        label: '盈亏',
                        data: Object.values(categories),
                        backgroundColor: Object.values(categories).map(v => v >= 0 ? '#ef4444' : '#22c55e')
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // 渲染 Beta 分析
        function renderBetaAnalysis() {
            const all = [...portfolio.funds, ...portfolio.stocks];
            const total = all.reduce((sum, i) => sum + i.marketValue, 0);
            let weightedBeta = 0;
            
            const marketExposure = {};
            all.forEach(item => {
                const beta = betaReference[item.category] || 1;
                weightedBeta += beta * (item.marketValue / total);
                
                if (!marketExposure[item.market]) marketExposure[item.market] = 0;
                marketExposure[item.market] += item.marketValue;
            });

            document.getElementById('betaAnalysis').innerHTML = `
                <div class="text-center p-3 bg-purple-50 rounded">
                    <div class="text-sm text-gray-500">组合 Beta</div>
                    <div class="text-2xl font-bold text-purple-600">${weightedBeta.toFixed(2)}</div>
                </div>
                <div class="text-center p-3 bg-blue-50 rounded">
                    <div class="text-sm text-gray-500">A股占比</div>
                    <div class="text-2xl font-bold text-blue-600">${((marketExposure['A股']||0)/total*100).toFixed(1)}%</div>
                </div>
                <div class="text-center p-3 bg-red-50 rounded">
                    <div class="text-sm text-gray-500">海外占比</div>
                    <div class="text-2xl font-bold text-red-600">${(((marketExposure['美股']||0)+(marketExposure['港股']||0)+(marketExposure['海外']||0))/total*100).toFixed(1)}%</div>
                </div>
                <div class="text-center p-3 bg-green-50 rounded">
                    <div class="text-sm text-gray-500">现金占比</div>
                    <div class="text-2xl font-bold text-green-600">${((marketExposure['现金']||0)/total*100).toFixed(2)}%</div>
                </div>
            `;
        }

        // 编辑功能
        let editingType = '';
        function toggleEdit(type) {
            editingType = type;
            document.getElementById('editTitle').textContent = type === 'fund' ? '编辑基金持仓' : '编辑股票持仓';
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
            renderEditForm();
        }

        function closeEdit() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        function renderEditForm() {
            const data = editingType === 'fund' ? portfolio.funds : portfolio.stocks;
            const isFund = editingType === 'fund';
            
            document.getElementById('editForm').innerHTML = data.map((item, idx) => `
                <div class="border-b pb-3 mb-3">
                    <div class="font-medium mb-2">${item.name} (${item.code})</div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div>
                            <label class="text-gray-500">市值</label>
                            <input type="number" id="edit_${editingType}_${idx}_value" value="${item.marketValue}" class="w-full border rounded px-2 py-1">
                        </div>
                        <div>
                            <label class="text-gray-500">日收益</label>
                            <input type="number" id="edit_${editingType}_${idx}_daily" value="${item.dailyPnL || 0}" class="w-full border rounded px-2 py-1">
                        </div>
                        ${isFund ? `
                            <div>
                                <label class="text-gray-500">持有收益</label>
                                <input type="number" id="edit_${editingType}_${idx}_holding" value="${item.holdingPnL}" class="w-full border rounded px-2 py-1">
                            </div>
                            <div>
                                <label class="text-gray-500">收益率(%)</label>
                                <input type="number" step="0.01" id="edit_${editingType}_${idx}_rate" value="${item.returnRate}" class="w-full border rounded px-2 py-1">
                            </div>
                        ` : `
                            <div>
                                <label class="text-gray-500">持股数</label>
                                <input type="number" id="edit_${editingType}_${idx}_shares" value="${item.shares}" class="w-full border rounded px-2 py-1">
                            </div>
                            <div>
                                <label class="text-gray-500">现价</label>
                                <input type="number" step="0.001" id="edit_${editingType}_${idx}_price" value="${item.price}" class="w-full border rounded px-2 py-1">
                            </div>
                        `}
                    </div>
                </div>
            `).join('');
        }

        function saveEdit() {
            const data = editingType === 'fund' ? portfolio.funds : portfolio.stocks;
            const isFund = editingType === 'fund';
            
            data.forEach((item, idx) => {
                item.marketValue = parseFloat(document.getElementById(`edit_${editingType}_${idx}_value`).value);
                item.dailyPnL = parseFloat(document.getElementById(`edit_${editingType}_${idx}_daily`).value);
                if (isFund) {
                    item.holdingPnL = parseFloat(document.getElementById(`edit_${editingType}_${idx}_holding`).value);
                    item.returnRate = parseFloat(document.getElementById(`edit_${editingType}_${idx}_rate`).value);
                } else {
                    item.shares = parseInt(document.getElementById(`edit_${editingType}_${idx}_shares`).value);
                    item.price = parseFloat(document.getElementById(`edit_${editingType}_${idx}_price`).value);
                    item.marketValue = item.shares * item.price;
                }
            });
            
            closeEdit();
            init();
        }

        // 初始化
        function init() {
            renderSummary();
            renderFunds();
            renderStocks();
            renderAllocationChart();
            renderCategoryChart();
            renderBetaAnalysis();
        }

        init();
    </script>
</body>
</html>
