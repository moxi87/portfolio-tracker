        // ============================================
        // 交易时间判断
        // ============================================
        function isMarketOpen() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const day = now.getDay(); // 0=周日, 6=周六
            
            // 周末休市
            if (day === 0 || day === 6) return false;
            
            // 上午 9:30-11:30
            const morningOpen = (hour === 9 && minute >= 30) || hour === 10 || (hour === 11 && minute <= 30);
            // 下午 13:00-15:00
            const afternoonOpen = (hour === 13) || (hour === 14) || (hour === 15 && minute === 0);
            
            return morningOpen || afternoonOpen;
        }
        
        function getNextOpenTime() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            
            // 如果是周末或15:00后，显示下周一
            if (day === 0 || day === 6 || hour >= 15) {
                const daysUntilMonday = day === 0 ? 1 : (day === 6 ? 2 : 1);
                const nextMonday = new Date(now);
                nextMonday.setDate(now.getDate() + daysUntilMonday);
                return `周一 09:30`;
            }
            
            // 如果是11:30-13:00，显示下午开盘
            if (hour === 11 || (hour === 12)) {
                return `今日 13:00`;
            }
            
            // 如果是9:30前
            if (hour < 9 || (hour === 9 && now.getMinutes() < 30)) {
                return `今日 09:30`;
            }
            
            return `交易中`;
        }
        
        /**
         * 获取市场状态
         */
        function getMarketStatus() {
            if (isMarketOpen()) {
                return { open: true, text: '交易中' };
            }
            
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const time = hours * 100 + minutes;
            
            if (time < 930) return { open: false, text: '开盘前' };
            if (time < 1300) return { open: false, text: '午间休市' };
            if (time >= 1500) return { open: false, text: '已收盘' };
            return { open: false, text: '休市' };
        }

        function renderPerformanceChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (performanceChart) performanceChart.destroy();
            
            // 获取选中周期的数据
            const chartData = getChartDataByPeriod(currentPeriod);
            
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: '我的组合',
                        data: chartData.values,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99,102,241,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '资产: ' + formatMoney(context.parsed.y);
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: {
                            ticks: {
                                callback: function(value) {
                                    return '¥' + (value / 10000).toFixed(1) + '万';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function getChartDataByPeriod(period) {
            const entries = Object.entries(historicalData);
            let filtered = entries;
            
            if (period === '1M') {
                filtered = entries.slice(-4); // 最近4个数据点
            } else if (period === '3M') {
                filtered = entries.slice(-8);
            } else if (period === '6M') {
                filtered = entries.slice(-10);
            } else if (period === '1Y') {
                filtered = entries; // 全部（目前只有3个月数据）
            }
            // ALL 显示全部
            
            return {
                labels: filtered.map(([date, _]) => {
                    const d = new Date(date);
                    return d.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'});
                }),
                values: filtered.map(([_, value]) => value)
            };
        }

        }

        // ============================================
        // CSV 导入/导出功能
        // ============================================
        function exportToCSV() {
            // 导出持仓明细
            let csv = '类型,名称,代码,持股/份额,成本价,现价,市值,累计盈亏,盈亏率\n';
            
            // 股票
            portfolioData.stocks.forEach(s => {
                const costPrice = (s.marketValue - s.totalPnL) / s.shares;
                const profitRate = (s.totalPnL / (s.marketValue - s.totalPnL) * 100).toFixed(2);
                csv += `股票,${s.name},${s.code},${s.shares},${costPrice.toFixed(2)},${s.price},${s.marketValue.toFixed(2)},${s.totalPnL.toFixed(2)},${profitRate}%\n`;
            });
            
            // 基金
            portfolioData.funds.forEach(f => {
                const shares = (f.marketValue / (f.marketValue - f.totalPnL)).toFixed(2);
                const costPrice = f.marketValue - f.totalPnL > 0 ? (f.marketValue - f.totalPnL) / shares : 1;
                const profitRate = f.totalPnL !== 0 ? (f.totalPnL / (f.marketValue - f.totalPnL) * 100).toFixed(2) : 0;
                csv += `基金,${f.name},${f.code},${shares},${costPrice.toFixed(2)},- ,${f.marketValue.toFixed(2)},${f.totalPnL.toFixed(2)},${profitRate}%\n`;
            });
            
            // 导出资产快照
            csv += '\n日期,总资产,今日盈亏,累计盈亏\n';
            csv += `${portfolioData.date},${portfolioData.totalAssets},${portfolioData.dailyPnL},${portfolioData.totalPnL}\n`;
            
            // 下载文件
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `持仓数据_${portfolioData.date}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert('✅ CSV 导出成功！\n\n可上传到飞书多维表格进行云端备份');
        }
        
        function importFromCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        parseCSVAndImport(event.target.result);
                    } catch (err) {

        function parseCSVAndImport(csvText) {
            const lines = csvText.split('\n').filter(l => l.trim());
            const dataStart = lines.findIndex(l => l.startsWith('类型'));
            const snapshotStart = lines.findIndex(l => l.startsWith('日期'));
            
            if (dataStart === -1) {
                throw new Error('CSV 格式不正确');
            }
            
            // 解析持仓数据
            const newStocks = [];
            const newFunds = [];
            
            for (let i = dataStart + 1; i < snapshotStart; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 9) continue;
                
                const type = cols[0];
                const name = cols[1];
                const code = cols[2];
                const shares = parseFloat(cols[3]);
                const price = parseFloat(cols[5]) || 0;
                const marketValue = parseFloat(cols[6]);
                const totalPnL = parseFloat(cols[7]);
                
                if (type === '股票') {
                    newStocks.push({ name, code, shares, price, marketValue, dailyChange: 0, totalPnL });
                } else if (type === '基金') {
                    newFunds.push({ name, code, marketValue, dailyPnL: 0, totalPnL });
                }
            }
            
            // 解析资产快照
            if (snapshotStart !== -1 && lines[snapshotStart + 1]) {
                const snapshot = lines[snapshotStart + 1].split(',');
                portfolioData.date = snapshot[0] || new Date().toISOString().split('T')[0];
                portfolioData.totalAssets = parseFloat(snapshot[1]) || 0;
                portfolioData.dailyPnL = parseFloat(snapshot[2]) || 0;
                portfolioData.totalPnL = parseFloat(snapshot[3]) || 0;
            }
            
            if (newStocks.length > 0) portfolioData.stocks = newStocks;
            if (newFunds.length > 0) portfolioData.funds = newFunds;
            
            // 重新渲染
            renderData();
            renderStocksTab();
            renderPerformanceChart();
            
            // 保存到本地存储
            localStorage.setItem('portfolio_data', JSON.stringify(portfolioData));
            
            alert(`✅ 导入成功！\n股票: ${newStocks.length} 条\n基金: ${newFunds.length} 条\n日期: ${portfolioData.date}`);
        }

        async function fetchSinaQuote(code) {
            try {
                const response = await fetch(`https://hq.sinajs.cn/list=${code}`, {
                    headers: { 'Referer': 'https://finance.sina.com.cn' }
                });
                const text = await response.text();
                const match = text.match(/var hq_str_[^=]+="([^"]+)"/);
                if (!match || !match[1]) return null;
                
                const parts = match[1].split(',');
                if (parts.length < 33) return null;
                
                const name = parts[0];
                const price = parseFloat(parts[3]);
                const prevClose = parseFloat(parts[2]);
                const change = price - prevClose;
                const changePercent = (change / prevClose * 100).toFixed(2);
                
                return { name, price, change, changePercent };
            } catch (e) {
                return null;
            }
        }

                return `${name} ${emoji} ${(profit).toFixed(2)}元 | 市值: ¥${(value/10000).toFixed(2)}万`;
            }).join('\\n');
            
            const payload = {
                msg_type: 'interactive',
                card: {
                    config: { wide_screen_mode: true },
                    header: {

                            }

                        {
                            tag: 'div',
                            text: {
                                tag: 'lark_md',
                                content: `**持仓明细**\\n${holdingsText}`
                            }
                        },
                        {
                            tag: 'note',
                            elements: [{ tag: 'plain_text', content: `发送时间: ${new Date().toLocaleString('zh-CN')}` }]
                        }
                    ]
                }
            };
            
            try {
                const response = await fetch(feishuConfig.webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.code === 0;
            } catch (e) {

            // 目前使用模拟数据展示功能
            
            const days = period === '1M' ? 30 : period === '3M' ? 90 : period === '6M' ? 180 : 365;
            const currentPrice = currentHolding.price || currentHolding.marketValue / (currentHolding.shares || 1);
            
            // 生成模拟历史数据
            const labels = [];
            const prices = [];
            let high = currentPrice;
            let low = currentPrice;
            
            for (let i = days; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
                
                // 模拟价格波动（随机游走）
                const volatility = 0.02; // 2% 日波动
                const change = (Math.random() - 0.5) * 2 * volatility;
                const price = currentPrice * (1 + change * (i / days));
                prices.push(price);
                
                if (price > high) high = price;
                if (price < low) low = price;
            }
            
            const startPrice = prices[0];
            const changePercent = ((currentPrice - startPrice) / startPrice) * 100;
            
            return {
                labels,
                prices,
                high,
                low,
                changePercent
            };
        }
        
        // ============================================
        // 启动
        // ============================================
        window.onload = init;
    </script>
</body>
</html>
