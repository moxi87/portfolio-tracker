<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro | 专业持仓分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        .risk-high { border-left: 4px solid #ef4444; }
        .risk-medium { border-left: 4px solid #f59e0b; }
        .risk-low { border-left: 4px solid #22c55e; }
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        .dark-mode { background: #0f172a; color: #e2e8f0; }
        .dark-mode .glass { background: rgba(30,41,59,0.9); }
        .dark-mode .bg-white { background: #1e293b; }
        .dark-mode .text-gray-800 { color: #e2e8f0; }
        .dark-mode .text-gray-600 { color: #94a3b8; }
        .dark-mode .border-gray-200 { border-color: #334155; }
        .dark-mode .bg-gray-50 { background: #1e293b; }
        @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-in { animation: slide-in 0.3s ease; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen transition-colors duration-300" id="body">
    <!-- 顶部导航 -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg">P</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">Portfolio Pro</h1>
                        <p class="text-xs text-gray-500">专业持仓分析系统</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="refreshQuotes()" class="px-3 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600 transition flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i>
                        <span class="hidden sm:inline">刷新行情</span>
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-moon text-gray-600" id="themeIcon"></i>
                    </button>
                    <div class="text-right hidden sm:block">
                        <div class="text-xs text-gray-500">数据更新</div>
                        <div class="text-sm font-medium" id="lastUpdate">2026-03-10</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 资产总览卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="glass rounded-2xl p-4 md:p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs md:text-sm text-gray-500">总资产</span>
                    <i class="fas fa-wallet text-indigo-500"></i>
                </div>
                <div class="text-lg md:text-2xl font-bold text-gray-800" id="totalAssets">¥0.00</div>
                <div class="text-xs text-gray-400 mt-1">基金 + 股票</div>
            </div>
            
            <div class="glass rounded-2xl p-4 md:p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs md:text-sm text-gray-500">今日盈亏</span>
                    <i class="fas fa-chart-line" id="dailyIcon"></i>
                </div>
                <div class="text-lg md:text-2xl font-bold" id="dailyPnL">¥0.00</div>
                <div class="text-xs mt-1" id="dailyPercent">0.00%</div>
            </div>
            
            <div class="glass rounded-2xl p-4 md:p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs md:text-sm text-gray-500">累计收益</span>
                    <i class="fas fa-trophy text-yellow-500"></i>
                </div>
                <div class="text-lg md:text-2xl font-bold" id="totalPnL">¥0.00</div>
                <div class="text-xs mt-1" id="totalReturn">0.00%</div>
            </div>
            
            <div class="glass rounded-2xl p-4 md:p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs md:text-sm text-gray-500">风险等级</span>
                    <i class="fas fa-shield-alt text-orange-500"></i>
                </div>
                <div class="text-lg md:text-2xl font-bold text-orange-500">中高</div>
                <div class="text-xs text-gray-400 mt-1">β ≈ 1.08</div>
            </div>
        </div>

        <!-- 预警面板 -->
        <div class="glass rounded-2xl p-6 mb-6" id="alertPanel">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-bell text-red-500"></i>
                预警中心
            </h3>
            <div class="space-y-3" id="alertsContainer">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 调仓模拟器 -->
        <div class="glass rounded-2xl p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    <i class="fas fa-calculator text-indigo-500"></i>
                    调仓模拟器
                </h3>
                <button onclick="toggleSimulator()" class="text-sm text-indigo-500 hover:text-indigo-700">
                    <span id="simToggleText">展开</span> <i class="fas fa-chevron-down"></i>
                </button>
            </div>
            
            <div id="simulatorContent" class="hidden">
                <p class="text-sm text-gray-500 mb-4">选择调仓方案，预览对组合的影响：</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="rebalanceScenarios">
                    <!-- 动态生成 -->
                </div>
                
                <div id="simulationResult" class="mt-4 hidden">
                    <div class="p-4 bg-gray-50 rounded-xl">
                        <h4 class="font-bold text-gray-700 mb-3">模拟结果</h4>
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div>
                                <div class="text-xs text-gray-500">资产变化</div>
                                <div class="text-lg font-bold" id="simAssetChange">--</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500">风险变化</div>
                                <div class="text-lg font-bold" id="simRiskChange">--</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500">集中度变化</div>
                                <div class="text-lg font-bold" id="simConcChange">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 指数对比 -->
        <div class="glass rounded-2xl p-6 mb-6">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-trophy text-yellow-500"></i>
                跑赢市场了吗？
            </h3>
            <div id="indexComparison">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            <div class="glass rounded-2xl p-6 lg:col-span-1">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-pie-chart text-indigo-500"></i>
                    资产配置
                </h3>
                <canvas id="allocationChart" height="200"></canvas>
            </div>
            
            <div class="glass rounded-2xl p-6 lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-chart-area text-indigo-500"></i>
                        资产走势
                    </h3>
                </div>
                <canvas id="trendChart" height="100"></canvas>
            </div>
        </div>

        <!-- 持仓详情 -->
        <div class="glass rounded-2xl overflow-hidden">
            <div class="border-b border-gray-200">
                <div class="flex overflow-x-auto">
                    <button onclick="switchTab('funds')" id="tab-btn-funds" class="px-6 py-4 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600 whitespace-nowrap">
                        <i class="fas fa-wallet mr-2"></i>基金持仓
                    </button>
                    <button onclick="switchTab('stocks')" id="tab-btn-stocks" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">
                        <i class="fas fa-chart-line mr-2"></i>股票持仓
                    </button>
                    <button onclick="switchTab('analysis')" id="tab-btn-analysis" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">
                        <i class="fas fa-brain mr-2"></i>智能分析
                    </button>
                </div>
            </div>
            
            <div class="p-4 md:p-6">
                <div id="tab-funds" class="tab-content active"></div>
                <div id="tab-stocks" class="tab-content"></div>
                <div id="tab-analysis" class="tab-content"></div>
            </div>
        </div>
    </div>

    <script>
        // 持仓数据
        const portfolio = {
            funds: [
                { name: "嘉实新能源新材料", code: "003984", value: 46090.54, daily: 859.37, total: 20385.88, return: 79.31, sector: "新能源", market: "A股" },
                { name: "华夏人工智能ETF", code: "008586", value: 22473.41, daily: 432.15, total: 8473.41, return: 60.52, sector: "科技", market: "A股" },
                { name: "嘉实美国成长", code: "000043", value: 37099.96, daily: 737.84, total: 4099.96, return: 12.42, sector: "美股", market: "美股" },
                { name: "华宝海外新能源汽车", code: "007904", value: 17076.65, daily: 401.69, total: 1076.65, return: 6.73, sector: "新能源", market: "海外" },
                { name: "华夏中证红利质量", code: "016440", value: 11257.07, daily: 207.80, total: 665.18, return: 6.28, sector: "红利", market: "A股" },
                { name: "华泰柏瑞红利低波动", code: "007467", value: 10166.89, daily: -28.86, total: -260.88, return: -2.47, sector: "红利", market: "A股" },
                { name: "博时智选量化", code: "013231", value: 9338.01, daily: 236.47, total: -374.33, return: -3.27, sector: "量化", market: "A股" },
                { name: "华安恒生科技", code: "015283", value: 10503.40, daily: 209.38, total: -1500.92, return: -12.50, sector: "科技", market: "港股" },
                { name: "余额宝", code: "YEB", value: 961.78, daily: 0.02, total: 98.33, return: 0, sector: "现金", market: "现金" }
            ],
            stocks: [
                { name: "比亚迪", code: "002594", value: 202860, shares: 2100, price: 96.60, cost: 103.635, total: -14772.57, return: -6.79, sector: "汽车", market: "A股", risk: "high" },
                { name: "电网设备", code: "601669", value: 11421, shares: 5400, price: 2.115, cost: 1.881, total: 1261.80, return: 12.44, sector: "基建", market: "A股", risk: "low" },
                { name: "中科曙光", code: "603019", value: 8819, shares: 100, price: 88.19, cost: 165.432, total: -7724.15, return: -46.69, sector: "科技", market: "A股", risk: "high" },
                { name: "洛阳钼业", code: "603993", value: 6522, shares: 300, price: 21.74, cost: -20.514, total: 12676.30, return: 0, sector: "有色", market: "A股", risk: "medium" }
            ]
        };

        // 计算汇总
        const fundTotal = portfolio.funds.reduce((s, f) => s + f.value, 0);
        const stockTotal = portfolio.stocks.reduce((s, s2) => s + s2.value, 0);
        const totalAssets = fundTotal + stockTotal;
        const fundDaily = portfolio.funds.reduce((s, f) => s + f.daily, 0);
        const fundPnL = portfolio.funds.reduce((s, f) => s + f.total, 0);
        const stockDaily = -1543;
        const stockPnL = -8558.62;
        const totalDaily = fundDaily + stockDaily;
        const totalPnL = fundPnL + stockPnL;

        // 格式化
        const formatMoney = (n) => '¥' + Math.abs(n).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const formatPercent = (n) => (n > 0 ? '+' : '') + n.toFixed(2) + '%';

        // 初始化
        function init() {
            document.getElementById('totalAssets').textContent = formatMoney(totalAssets);
            
            const dailyEl = document.getElementById('dailyPnL');
            dailyEl.textContent = (totalDaily >= 0 ? '+' : '-') + formatMoney(totalDaily);
            dailyEl.className = 'text-lg md:text-2xl font-bold ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            document.getElementById('dailyIcon').className = 'fas fa-chart-line ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            
            const dailyPct = document.getElementById('dailyPercent');
            dailyPct.textContent = formatPercent(totalDaily / (totalAssets - totalDaily) * 100);
            dailyPct.className = 'text-xs mt-1 ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            
            const totalEl = document.getElementById('totalPnL');
            totalEl.textContent = (totalPnL >= 0 ? '+' : '-') + formatMoney(totalPnL);
            totalEl.className = 'text-lg md:text-2xl font-bold ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');
            
            document.getElementById('totalReturn').textContent = formatPercent(totalPnL / (totalAssets - totalPnL) * 100);
            document.getElementById('totalReturn').className = 'text-xs mt-1 ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');

            renderAlerts();
            renderRebalanceScenarios();
            renderIndexComparison();
            renderCharts();
            switchTab('funds');
        }

        // 预警系统
        function renderAlerts() {
            const alerts = [];
            
            // 比亚迪集中度预警
            const byd = portfolio.stocks.find(s => s.code === '002594');
            if (byd && byd.value / stockTotal > 0.5) {
                alerts.push({
                    type: 'risk',
                    level: 'high',
                    title: '持仓集中度过高',
                    message: `比亚迪占股票仓位 ${(byd.value / stockTotal * 100).toFixed(1)}%，占总投资 ${(byd.value / totalAssets * 100).toFixed(1)}%`,
                    action: '建议减仓至30%以下'
                });
            }
            
            // 中科曙光止损预警
            const zk = portfolio.stocks.find(s => s.code === '603019');
            if (zk && zk.return < -40) {
                alerts.push({
                    type: 'stoploss',
                    level: 'high',
                    title: '深套股票预警',
                    message: `中科曙光浮亏 ${zk.return}%，深度被套`,
                    action: '建议设定止损线或补仓'
                });
            }
            
            // 恒生科技预警
            const hs = portfolio.funds.find(f => f.code === '015283');
            if (hs && hs.return < -10) {
                alerts.push({
                    type: 'market',
                    level: 'medium',
                    title: '港股科技持续走弱',
                    message: `华安恒生科技浮亏 ${hs.return}%`,
                    action: '可关注支撑位，考虑定投摊薄'
                });
            }
            
            const container = document.getElementById('alertsContainer');
            if (alerts.length === 0) {
                container.innerHTML = `
                    <div class="p-4 bg-green-50 rounded-xl border border-green-100 flex items-center gap-3">
                        <i class="fas fa-check-circle text-green-500 text-xl"></i>
                        <div>
                            <div class="font-bold text-green-800">暂无预警</div>
                            <div class="text-sm text-green-600">所有风险指标正常</div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = alerts.map(alert => `
                    <div class="p-4 ${alert.level === 'high' ? 'bg-red-50 border-red-100' : 'bg-yellow-50 border-yellow-100'} rounded-xl border">
                        <div class="flex items-start gap-3">
                            <i class="fas ${alert.type === 'risk' ? 'fa-exclamation-triangle' : alert.type === 'stoploss' ? 'fa-hand-paper' : 'fa-chart-line'} ${alert.level === 'high' ? 'text-red-500' : 'text-yellow-500'} text-xl mt-0.5"></i>
                            <div class="flex-1">
                                <div class="font-bold ${alert.level === 'high' ? 'text-red-800' : 'text-yellow-800'}">${alert.title}</div>
                                <div class="text-sm ${alert.level === 'high' ? 'text-red-600' : 'text-yellow-600'} mt-1">${alert.message}</div>
                                <div class="text-xs text-gray-500 mt-2 font-medium">💡 ${alert.action}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 调仓模拟器
        function renderRebalanceScenarios() {
            const scenarios = [
                {
                    name: '方案A：减仓比亚迪',
                    desc: '卖出700股，释放约6.8万',
                    impact: { asset: -210, risk: -0.15, concentration: -15 },
                    color: 'blue'
                },
                {
                    name: '方案B：止损中科曙光',
                    desc: '清仓，止损7700元',
                    impact: { asset: 0, risk: -0.08, concentration: 0 },
                    color: 'red'
                },
                {
                    name: '方案C：加仓红利',
                    desc: '减仓比亚迪+加仓红利',
                    impact: { asset: 0, risk: -0.25, concentration: -20 },
                    color: 'green'
                }
            ];
            
            document.getElementById('rebalanceScenarios').innerHTML = scenarios.map((s, i) => `
                <div class="p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition"
                     onclick="runSimulation(${i})">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-8 h-8 rounded-full bg-${s.color}-100 text-${s.color}-600 flex items-center justify-center font-bold text-sm">${String.fromCharCode(65+i)}</div>
                        <span class="font-bold text-gray-800">${s.name}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3">${s.desc}</p>
                    <div class="flex gap-2">
                        <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">风险↓${Math.abs(s.impact.risk)}</span>
                        <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">集中度↓${Math.abs(s.impact.concentration)}%</span>
                    </div>
                </div>
            `).join('');
        }

        function toggleSimulator() {
            const content = document.getElementById('simulatorContent');
            const text = document.getElementById('simToggleText');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                text.textContent = '收起';
            } else {
                content.classList.add('hidden');
                text.textContent = '展开';
            }
        }

        function runSimulation(index) {
            const impacts = [
                { asset: -210, risk: -0.15, concentration: -15 },
                { asset: 0, risk: -0.08, concentration: 0 },
                { asset: 0, risk: -0.25, concentration: -20 }
            ];
            const impact = impacts[index];
            
            document.getElementById('simulationResult').classList.remove('hidden');
            document.getElementById('simAssetChange').textContent = impact.asset >= 0 ? '+' + impact.asset : impact.asset;
            document.getElementById('simAssetChange').className = 'text-lg font-bold ' + (impact.asset >= 0 ? 'text-red-500' : 'text-green-500');
            
            document.getElementById('simRiskChange').textContent = (impact.risk > 0 ? '+' : '') + impact.risk;
            document.getElementById('simRiskChange').className = 'text-lg font-bold text-green-500';
            
            document.getElementById('simConcChange').textContent = (impact.concentration > 0 ? '+' : '') + impact.concentration + '%';
            document.getElementById('simConcChange').className = 'text-lg font-bold text-green-500';
        }

        // 指数对比
        function renderIndexComparison() {
            const myReturn = 6.11;
            const indices = [
                { name: '沪深300', return: -2.3 },
                { name: '创业板指', return: -5.1 },
                { name: '上证指数', return: -1.8 },
                { name: '恒生指数', return: -8.2 }
            ];
            
            document.getElementById('indexComparison').innerHTML = `
                <div class="flex items-center justify-between p-4 bg-indigo-50 rounded-xl border border-indigo-100 mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold">我</div>
                        <div>
                            <div class="font-bold text-indigo-800">我的组合</div>
                            <div class="text-xs text-indigo-600">今年以来</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-bold text-red-500">+${myReturn}%</div>
                        <div class="text-xs text-indigo-500">跑赢 ${indices.filter(i => myReturn > i.return).length}/4 大盘指数 🏆</div>
                    </div>
                </div>
                
                <div class="space-y-2">
                    ${indices.map(idx => {
                        const beat = myReturn > idx.return;
                        return `
                            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                <span class="font-medium text-gray-700">${idx.name}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-sm ${idx.return >= 0 ? 'text-red-500' : 'text-green-500'}">${idx.return > 0 ? '+' : ''}${idx.return}%</span>
                                    <span class="text-xs ${beat ? 'text-green-500 font-medium' : 'text-gray-400'}">${beat ? '✓ 跑赢' : '✗ 跑输'}</span>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // 图表渲染
        function renderCharts() {
            // 资产配置饼图
            new Chart(document.getElementById('allocationChart'), {
                type: 'doughnut',
                data: {
                    labels: ['基金', '股票', '现金'],
                    datasets: [{
                        data: [fundTotal, stockTotal, 961.78],
                        backgroundColor: ['#6366f1', '#ef4444', '#22c55e'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15 } }
                    }
                }
            });

            // 资产走势
            const dates = [];
            const values = [];
            let current = totalAssets - totalPnL;
            
            for (let i = 30; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                dates.push(date.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'}));
                const volatility = 0.008;
                const change = (Math.random() - 0.48) * current * volatility;
                current += change;
                if (i === 0) current = totalAssets;
                values.push(current);
            }

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '总资产',
                        data: values,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
                        y: { display: false }
                    }
                }
            });
        }

        // 标签页切换
        function switchTab(tabName) {
            // 更新按钮样式
            ['funds', 'stocks', 'analysis'].forEach(t => {
                const btn = document.getElementById('tab-btn-' + t);
                const content = document.getElementById('tab-' + t);
                if (t === tabName) {
                    btn.className = 'px-6 py-4 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600 whitespace-nowrap';
                    content.classList.add('active');
                } else {
                    btn.className = 'px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap';
                    content.classList.remove('active');
                }
            });
            
            // 渲染内容
            if (tabName === 'funds') renderFundsTab();
            else if (tabName === 'stocks') renderStocksTab();
            else renderAnalysisTab();
        }

        // 刷新行情（模拟）
        function refreshQuotes() {
            showNotification('行情数据已更新', 'success');
            // 实际项目中这里会调用 API 获取最新数据
        }

        // 通知系统
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-20 right-4 p-4 rounded-xl shadow-lg z-50 animate-slide-in ${
                type === 'success' ? 'bg-green-500 text-white' : type === 'error' ? 'bg-red-500 text-white' : 'bg-indigo-500 text-white'
            }`;
            notification.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fas ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-times' : 'fa-info-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // 主题切换
        let darkMode = false;
        function toggleTheme() {
            darkMode = !darkMode;
            document.body.className = darkMode ? 'bg-gray-900 min-h-screen transition-colors duration-300 dark-mode' : 'bg-gray-50 min-h-screen transition-colors duration-300';
            document.getElementById('themeIcon').className = darkMode ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
        }

        // 页面加载时初始化
        window.onload = init;
