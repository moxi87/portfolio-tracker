<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro | 专业持仓分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        .risk-high { border-left: 4px solid #ef4444; }
        .risk-medium { border-left: 4px solid #f59e0b; }
        .risk-low { border-left: 4px solid #22c55e; }
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        .dark-mode { background: #0f172a; color: #e2e8f0; }
        .dark-mode .glass { background: rgba(30,41,59,0.9); }
        .dark-mode .bg-white { background: #1e293b; }
        .dark-mode .text-gray-800 { color: #e2e8f0; }
        .dark-mode .text-gray-600 { color: #94a3b8; }
        .dark-mode .border-gray-200 { border-color: #334155; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen transition-colors duration-300" id="body">
    <!-- 顶部导航 -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg">
                        P
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">Portfolio Pro</h1>
                        <p class="text-xs text-gray-500">专业持仓分析系统</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-moon text-gray-600" id="themeIcon"></i>
                    </button>
                    <div class="text-right">
                        <div class="text-xs text-gray-500">数据更新</div>
                        <div class="text-sm font-medium" id="lastUpdate">2026-03-10</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 资产总览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="glass rounded-2xl p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-500">总资产</span>
                    <i class="fas fa-wallet text-indigo-500"></i>
                </div>
                <div class="text-2xl font-bold text-gray-800" id="totalAssets">¥0.00</div>
                <div class="text-xs text-gray-400 mt-1">基金 + 股票</div>
            </div>
            
            <div class="glass rounded-2xl p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-500">今日盈亏</span>
                    <i class="fas fa-chart-line" id="dailyIcon"></i>
                </div>
                <div class="text-2xl font-bold" id="dailyPnL">¥0.00</div>
                <div class="text-xs mt-1 flex items-center gap-1">
                    <span id="dailyPercent">0.00%</span>
                    <span class="text-gray-400">|</span>
                    <span id="dailyLabel" class="text-gray-400">较昨日</span>
                </div>
            </div>
            
            <div class="glass rounded-2xl p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-500">累计收益</span>
                    <i class="fas fa-trophy text-yellow-500"></i>
                </div>
                <div class="text-2xl font-bold" id="totalPnL">¥0.00</div>
                <div class="text-xs mt-1" id="totalReturn">0.00%</div>
            </div>
            
            <div class="glass rounded-2xl p-6 card-hover">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-500">风险等级</span>
                    <i class="fas fa-shield-alt text-green-500"></i>
                </div>
                <div class="text-2xl font-bold text-orange-500">中等偏高</div>
                <div class="text-xs text-gray-400 mt-1">β ≈ 1.08</div>
            </div>
        </div>

        <!-- 风险警告面板 -->
        <div class="glass rounded-2xl p-6 mb-6 risk-high bg-red-50" id="riskPanel">
            <div class="flex items-start gap-4">
                <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-exclamation-triangle text-red-500 text-xl"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-red-800 mb-2">⚠️ 持仓集中度过高风险</h3>
                    <p class="text-sm text-red-700 mb-3">
                        比亚迪占股票仓位 <strong>88.4%</strong>，占总投资 <strong>51.4%</strong>。
                        单票集中度过高，若比亚迪下跌 20%，整体组合将亏损约 <strong>¥40,000</strong>。
                    </p>
                    <div class="flex gap-2">
                        <span class="px-3 py-1 bg-red-200 text-red-800 rounded-full text-xs font-medium">建议减仓</span>
                        <span class="px-3 py-1 bg-orange-200 text-orange-800 rounded-full text-xs font-medium">或设置止损</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            <div class="glass rounded-2xl p-6 lg:col-span-1">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-pie-chart text-indigo-500"></i>
                    资产配置
                </h3>
                <canvas id="allocationChart" height="200"></canvas>
                <div class="mt-4 space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-500">基金占比</span>
                        <span class="font-medium" id="fundRatio">41.8%</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">股票占比</span>
                        <span class="font-medium" id="stockRatio">58.2%</span>
                    </div>
                </div>
            </div>
            
            <div class="glass rounded-2xl p-6 lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-chart-area text-indigo-500"></i>
                        资产走势
                    </h3>
                    <div class="flex gap-2">
                        <button onclick="changeTimeRange('1M')" class="px-3 py-1 text-xs rounded-lg bg-indigo-500 text-white">1月</button>
                        <button onclick="changeTimeRange('3M')" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">3月</button>
                        <button onclick="changeTimeRange('6M')" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">6月</button>
                        <button onclick="changeTimeRange('1Y')" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600 hover:bg-gray-300">1年</button>
                    </div>
                </div>
                <canvas id="trendChart" height="100"></canvas>
            </div>
        </div>

        <!-- 行业分布与收益归因 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
            <div class="glass rounded-2xl p-6">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-industry text-indigo-500"></i>
                    行业分布
                </h3>
                <canvas id="sectorChart" height="150"></canvas>
            </div>
            
            <div class="glass rounded-2xl p-6">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-trophy text-yellow-500"></i>
                    收益贡献 Top 5
                </h3>
                <div class="space-y-3" id="topContributors">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 持仓详情标签页 -->
        <div class="glass rounded-2xl overflow-hidden mb-6">
            <div class="border-b border-gray-200">
                <div class="flex">
                    <button onclick="switchTab('funds')" id="tab-funds" class="px-6 py-4 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600">
                        <i class="fas fa-wallet mr-2"></i>基金持仓
                    </button>
                    <button onclick="switchTab('stocks')" id="tab-stocks" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        <i class="fas fa-chart-line mr-2"></i>股票持仓
                    </button>
                    <button onclick="switchTab('analysis')" id="tab-analysis" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        <i class="fas fa-brain mr-2"></i>智能分析
                    </button>
                </div>
            </div>
            
            <div class="p-6" id="tab-content">
                <!-- 动态内容 -->
            </div>
        </div>

        <!-- 投资建议 -->
        <div class="glass rounded-2xl p-6 mb-6">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-lightbulb text-yellow-500"></i>
                投资建议
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="recommendations">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 持仓数据
        const portfolio = {
            funds: [
                { name: "嘉实新能源新材料", code: "003984", value: 46090.54, daily: 859.37, total: 20385.88, return: 79.31, sector: "新能源", market: "A股" },
                { name: "华夏人工智能ETF", code: "008586", value: 22473.41, daily: 432.15, total: 8473.41, return: 60.52, sector: "科技", market: "A股" },
                { name: "嘉实美国成长", code: "000043", value: 37099.96, daily: 737.84, total: 4099.96, return: 12.42, sector: "美股", market: "美股" },
                { name: "华宝海外新能源汽车", code: "007904", value: 17076.65, daily: 401.69, total: 1076.65, return: 6.73, sector: "新能源", market: "海外" },
                { name: "华夏中证红利质量", code: "016440", value: 11257.07, daily: 207.80, total: 665.18, return: 6.28, sector: "红利", market: "A股" },
                { name: "华泰柏瑞红利低波动", code: "007467", value: 10166.89, daily: -28.86, total: -260.88, return: -2.47, sector: "红利", market: "A股" },
                { name: "博时智选量化", code: "013231", value: 9338.01, daily: 236.47, total: -374.33, return: -3.27, sector: "量化", market: "A股" },
                { name: "华安恒生科技", code: "015283", value: 10503.40, daily: 209.38, total: -1500.92, return: -12.50, sector: "科技", market: "港股" },
                { name: "余额宝", code: "YEB", value: 961.78, daily: 0.02, total: 98.33, return: 0, sector: "现金", market: "现金" }
            ],
            stocks: [
                { name: "比亚迪", code: "002594", value: 202860, shares: 2100, price: 96.60, cost: 103.635, total: -14772.57, return: -6.79, sector: "汽车", market: "A股", risk: "high" },
                { name: "电网设备", code: "601669", value: 11421, shares: 5400, price: 2.115, cost: 1.881, total: 1261.80, return: 12.44, sector: "基建", market: "A股", risk: "low" },
                { name: "中科曙光", code: "603019", value: 8819, shares: 100, price: 88.19, cost: 165.432, total: -7724.15, return: -46.69, sector: "科技", market: "A股", risk: "high" },
                { name: "洛阳钼业", code: "603993", value: 6522, shares: 300, price: 21.74, cost: -20.514, total: 12676.30, return: 0, sector: "有色", market: "A股", risk: "medium" }
            ]
        };

        // 计算汇总
        const fundTotal = portfolio.funds.reduce((s, f) => s + f.value, 0);
        const stockTotal = portfolio.stocks.reduce((s, s2) => s + s2.value, 0);
        const totalAssets = fundTotal + stockTotal;
        const fundDaily = portfolio.funds.reduce((s, f) => s + f.daily, 0);
        const fundPnL = portfolio.funds.reduce((s, f) => s + f.total, 0);
        const stockDaily = -1543;
        const stockPnL = -8558.62;
        const totalDaily = fundDaily + stockDaily;
        const totalPnL = fundPnL + stockPnL;

        // 格式化
        const formatMoney = (n) => '¥' + Math.abs(n).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const formatPercent = (n) => (n > 0 ? '+' : '') + n.toFixed(2) + '%';

        // 初始化页面
        function init() {
            // 总览数据
            document.getElementById('totalAssets').textContent = formatMoney(totalAssets);
            
            const dailyEl = document.getElementById('dailyPnL');
            dailyEl.textContent = (totalDaily >= 0 ? '+' : '-') + formatMoney(totalDaily);
            dailyEl.className = 'text-2xl font-bold ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            document.getElementById('dailyIcon').className = 'fas fa-chart-line ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            
            const dailyPct = document.getElementById('dailyPercent');
            dailyPct.textContent = formatPercent(totalDaily / (totalAssets - totalDaily) * 100);
            dailyPct.className = totalDaily >= 0 ? 'trend-up' : 'trend-down';
            
            const totalEl = document.getElementById('totalPnL');
            totalEl.textContent = (totalPnL >= 0 ? '+' : '-') + formatMoney(totalPnL);
            totalEl.className = 'text-2xl font-bold ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');
            
            document.getElementById('totalReturn').textContent = formatPercent(totalPnL / (totalAssets - totalPnL) * 100);
            document.getElementById('totalReturn').className = 'text-xs mt-1 ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');
            
            document.getElementById('fundRatio').textContent = (fundTotal / totalAssets * 100).toFixed(1) + '%';
            document.getElementById('stockRatio').textContent = (stockTotal / totalAssets * 100).toFixed(1) + '%';

            // 渲染图表
            renderAllocationChart();
            renderTrendChart();
            renderSectorChart();
            renderTopContributors();
            renderRecommendations();
            
            // 默认显示基金
            switchTab('funds');
        }

        // 资产配置饼图
        function renderAllocationChart() {
            new Chart(document.getElementById('allocationChart'), {
                type: 'doughnut',
                data: {
                    labels: ['基金', '股票', '现金'],
                    datasets: [{
                        data: [fundTotal, stockTotal, 961.78],
                        backgroundColor: ['#6366f1', '#ef4444', '#22c55e'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                    }
                }
            });
        }

        // 资产走势（模拟历史数据）
        function renderTrendChart() {
            const dates = [];
            const values = [];
            let current = totalAssets - totalPnL;
            
            for (let i = 30; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                dates.push(date.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'}));
                
                // 模拟波动
                const volatility = 0.008;
                const change = (Math.random() - 0.48) * current * volatility;
                current += change;
                if (i === 0) current = totalAssets;
                values.push(current);
            }

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '总资产',
                        data: values,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
                        y: { display: false }
                    }
                }
            });
        }

        // 行业分布
        function renderSectorChart() {
            const sectors = {};
            [...portfolio.funds, ...portfolio.stocks].forEach(item => {
                sectors[item.sector] = (sectors[item.sector] || 0) + item.value;
            });
            
            new Chart(document.getElementById('sectorChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(sectors),
                    datasets: [{
                        data: Object.values(sectors),
                        backgroundColor: ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#22c55e', '#3b82f6'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { display: false }
                    }
                }
            });
        }

        // 收益贡献 Top 5
        function renderTopContributors() {
            const all = [...portfolio.funds, ...portfolio.stocks]
                .sort((a, b) => b.total - a.total)
                .slice(0, 5);
            
            document.getElementById('topContributors').innerHTML = all.map((item, i) => `
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 rounded-full ${i < 3 ? 'bg-yellow-100 text-yellow-600' : 'bg-gray-100 text-gray-500'} flex items-center justify-center text-xs font-bold">
                        ${i + 1}
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-sm">${item.name}</span>
                            <span class="font-bold text-sm ${item.total >= 0 ? 'trend-up' : 'trend-down'}">${item.total >= 0 ? '+' : ''}${formatMoney(item.total)}</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-1.5 mt-1">
                            <div class="h-1.5 rounded-full ${item.total >= 0 ? 'bg-red-500' : 'bg-green-500'}" style="width: ${Math.min(Math.abs(item.total) / 20000 * 100, 100)}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 投资建议
        function renderRecommendations() {
            document.getElementById('recommendations').innerHTML = `
                <div class="p-4 bg-red-50 rounded-xl border border-red-100">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fas fa-exclamation-circle text-red-500"></i>
                        <span class="font-bold text-red-800">减仓建议</span>
                    </div>
                    <p class="text-sm text-red-700">比亚迪占仓位过高，建议减仓至 30% 以下，分散风险。</p>
                </div>
                <div class="p-4 bg-yellow-50 rounded-xl border border-yellow-100">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fas fa-hand-holding-usd text-yellow-600"></i>
                        <span class="font-bold text-yellow-800">止损策略</span>
                    </div>
                    <p class="text-sm text-yellow-700">中科曙光浮亏 -47%，建议设定止损线或考虑补仓摊薄成本。</p>
                </div>
                <div class="p-4 bg-green-50 rounded-xl border border-green-100">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fas fa-check-circle text-green-500"></i>
                        <span class="font-bold text-green-800">配置良好</span>
                    </div>
                    <p class="text-sm text-green-700">新能源和科技基金表现优异，建议继续持有核心仓位。</p>
                </div>
            `;
        }

        // 标签页切换
        function switchTab(tab) {
            // 更新按钮样式
            ['funds', 'stocks', 'analysis'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                if (t === tab) {
                    btn.className = 'px-6 py-4 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600';
                } else {
                    btn.className = 'px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700';
                }
            });

            // 渲染内容
            const content = document.getElementById('tab-content');
            if (tab === 'funds') {
                content.innerHTML = renderFundsTable();
            } else if (tab === 'stocks') {
                content.innerHTML = renderStocksTable();
            } else {
                content.innerHTML = renderAnalysis();
            }
        }

        function renderFundsTable() {
            return `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-xs text-gray-500 border-b border-gray-200">
                                <th class="pb-3 font-medium">名称/代码</th>
                                <th class="pb-3 font-medium text-right">市值</th>
                                <th class="pb-3 font-medium text-right">日收益</th>
                                <th class="pb-3 font-medium text-right hidden md:table-cell">持有收益</th>
                                <th class="pb-3 font-medium text-right">收益率</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${portfolio.funds.map(f => `
                                <tr class="border-b border-gray-100 hover:bg-gray-50">
                                    <td class="py-3">
                                        <div class="font-medium text-sm">${f.name}</div>
                                        <div class="text-xs text-gray-400">${f.code} · ${f.market}</div>
                                    </td>
                                    <td class="py-3 text-right font-medium">${formatMoney(f.value)}</td>
                                    <td class="py-3 text-right ${f.daily >= 0 ? 'trend-up' : 'trend-down'}">${f.daily >= 0 ? '+' : ''}${formatMoney(f.daily)}</td>
                                    <td class="py-3 text-right ${f.total >= 0 ? 'trend-up' : 'trend-down'} hidden md:table-cell">${f.total >= 0 ? '+' : ''}${formatMoney(f.total)}</td>
                                    <td class="py-3 text-right">
                                        <span class="px-2 py-1 rounded-full text-xs font-medium ${f.return >= 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${formatPercent(f.return)}</span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
