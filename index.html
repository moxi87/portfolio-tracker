<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro | 专业交易终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        .dark-mode { background: #0f172a; color: #e2e8f0; }
        .dark-mode .glass { background: rgba(30,41,59,0.9); }
        .dark-mode .bg-white { background: #1e293b; }
        .dark-mode .text-gray-800 { color: #e2e8f0; }
        .dark-mode .text-gray-600 { color: #94a3b8; }
        .dark-mode .border-gray-200 { border-color: #334155; }
        .dark-mode .bg-gray-50 { background: #1e293b; }
        @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-in { animation: slide-in 0.3s ease; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } }
        .price-up { animation: pulse-red 1s infinite; }
        .price-down { animation: pulse-green 1s infinite; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen transition-colors duration-300" id="body">
    <!-- 顶部导航 -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold">P</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">Portfolio Pro</h1>
                        <div class="flex items-center gap-2 text-xs">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-gray-500">实时连接中</span>
                            <span class="text-gray-400">|</span>
                            <span class="text-gray-500" id="lastUpdate">--:--:--</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleSound()" id="soundBtn" class="p-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-volume-up text-gray-600"></i>
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-moon text-gray-600" id="themeIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-4">
        <!-- 实时行情跑马灯 -->
        <div class="glass rounded-xl p-3 mb-4 overflow-hidden">
            <div class="flex items-center gap-4 text-sm whitespace-nowrap overflow-x-auto scroll-hide" id="tickerTape">
                <span class="text-gray-500 font-medium"><i class="fas fa-bolt text-yellow-500 mr-1"></i>实时行情:</span>
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 资产总览 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="glass rounded-xl p-4">
                <div class="text-xs text-gray-500 mb-1">总资产</div>
                <div class="text-xl font-bold text-gray-800" id="totalAssets">--</div>
            </div>
            <div class="glass rounded-xl p-4" id="dailyPnLCard">
                <div class="text-xs text-gray-500 mb-1">今日盈亏</div>
                <div class="text-xl font-bold" id="dailyPnL">--</div>
                <div class="text-xs mt-1" id="dailyPercent">--</div>
            </div>
            <div class="glass rounded-xl p-4">
                <div class="text-xs text-gray-500 mb-1">累计收益</div>
                <div class="text-xl font-bold" id="totalPnL">--</div>
            </div>
            <div class="glass rounded-xl p-4">
                <div class="text-xs text-gray-500 mb-1">跑赢大盘</div>
                <div class="text-xl font-bold text-green-600">+8.3%</div>
                <div class="text-xs text-gray-400">vs 沪深300</div>
            </div>
        </div>

        <!-- 情绪仪表盘 -->
        <div class="glass rounded-xl p-4 mb-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-700"><i class="fas fa-heartbeat text-red-500 mr-2"></i>市场情绪仪表盘</h3>
                <span class="text-xs text-gray-400">实时</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3" id="sentimentDashboard">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 收益曲线 vs 对标 -->
        <div class="glass rounded-xl p-4 mb-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-700"><i class="fas fa-chart-line text-indigo-500 mr-2"></i>收益曲线</h3>
                <div class="flex gap-2">
                    <button onclick="changePeriod('1M')" class="period-btn px-3 py-1 text-xs rounded bg-indigo-500 text-white" data-period="1M">1月</button>
                    <button onclick="changePeriod('3M')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="3M">3月</button>
                    <button onclick="changePeriod('6M')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="6M">6月</button>
                    <button onclick="changePeriod('1Y')" class="period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600" data-period="1Y">1年</button>
                </div>
            </div>
            <div class="h-64">
                <canvas id="performanceChart"></canvas>
            </div>
            <div class="flex justify-center gap-4 mt-2 text-xs">
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-indigo-500 rounded"></span>
                    <span>我的组合</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-gray-400 rounded"></span>
                    <span>沪深300</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-red-400 rounded"></span>
                    <span>创业板指</span>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- 左侧：持仓 + 新闻 -->
            <div class="lg:col-span-2 space-y-4">
                <!-- 持仓标签页 -->
                <div class="glass rounded-xl overflow-hidden">
                    <div class="border-b border-gray-200 flex overflow-x-auto scroll-hide">
                        <button onclick="switchTab('stocks')" id="tab-btn-stocks" class="px-4 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600 whitespace-nowrap">股票持仓</button>
                        <button onclick="switchTab('funds')" id="tab-btn-funds" class="px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap">基金持仓</button>
                        <button onclick="switchTab('news')" id="tab-btn-news" class="px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap">舆情监控</button>
                    </div>
                    <div class="p-4">
                        <div id="tab-stocks" class="tab-content active"></div>
                        <div id="tab-funds" class="tab-content"></div>
                        <div id="tab-news" class="tab-content"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：交易日志 -->
            <div class="lg:col-span-1">
                <div class="glass rounded-xl p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-gray-700"><i class="fas fa-history mr-2"></i>交易日志</h3>
                        <button onclick="addTrade()" class="text-xs bg-indigo-500 text-white px-2 py-1 rounded">+记录</button>
                    </div>
                    <div class="space-y-2 max-h-96 overflow-y-auto scroll-hide" id="tradeLog">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据
        let portfolio = {
            stocks: [
                { name: "比亚迪", code: "002594", shares: 2100, cost: 103.635, basePrice: 96.60, price: 96.60, change: 0, changePercent: 0, marketValue: 202860, total: -14772.57, return: -6.79 },
                { name: "电网设备", code: "601669", shares: 5400, cost: 1.881, basePrice: 2.115, price: 2.115, change: 0, changePercent: 0, marketValue: 11421, total: 1261.80, return: 12.44 },
                { name: "中科曙光", code: "603019", shares: 100, cost: 165.432, basePrice: 88.19, price: 88.19, change: 0, changePercent: 0, marketValue: 8819, total: -7724.15, return: -46.69 },
                { name: "洛阳钼业", code: "603993", shares: 300, cost: -20.514, basePrice: 21.74, price: 21.74, change: 0, changePercent: 0, marketValue: 6522, total: 12676.30, return: 0 }
            ],
            funds: [
                { name: "嘉实新能源", code: "003984", value: 46090.54, daily: 859.37, total: 20385.88, return: 79.31 },
                { name: "华夏AI ETF", code: "008586", value: 22473.41, daily: 432.15, total: 8473.41, return: 60.52 },
                { name: "嘉实美成长", code: "000043", value: 37099.96, daily: 737.84, total: 4099.96, return: 12.42 },
                { name: "华宝新能源", code: "007904", value: 17076.65, daily: 401.69, total: 1076.65, return: 6.73 },
                { name: "华安恒科技", code: "015283", value: 10503.40, daily: 209.38, total: -1500.92, return: -12.50 }
            ]
        };

        let tradeLogs = [
            { date: '2026-03-10', action: '买入', name: '比亚迪', shares: 100, price: 96.50, reason: '突破5日线', result: '持有中' },
            { date: '2026-03-08', action: '定投', name: '嘉实新能源', amount: 1000, reason: '长期看好', result: '持续定投' }
        ];

        let soundEnabled = true;
        let darkMode = false;

        // 初始化
        function init() {
            updateDisplay();
            renderSentimentDashboard();
            renderPerformanceChart();
            renderStocksTab();
            renderTradeLog();
            startRealtimeUpdate();
            startClock();
        }

        // 时钟
        function startClock() {
            setInterval(() => {
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            }, 1000);
        }

        // 实时更新（模拟）
        function startRealtimeUpdate() {
            updateTicker();
            setInterval(() => {
                simulatePriceChange();
                updateDisplay();
                updateTicker();
            }, 3000);
        }

        // 模拟价格变动
        function simulatePriceChange() {
            portfolio.stocks.forEach(stock => {
                const volatility = 0.002;
                const change = (Math.random() - 0.5) * stock.basePrice * volatility;
                stock.price = Math.max(stock.basePrice * 0.95, Math.min(stock.basePrice * 1.05, stock.price + change));
                stock.change = stock.price - stock.basePrice;
                stock.changePercent = (stock.change / stock.basePrice * 100);
                stock.marketValue = stock.shares * stock.price;
                
                // 预警检查
                if (Math.abs(stock.changePercent) > 2 && soundEnabled) {
                    speak(`${stock.name}${stock.change > 0 ? '上涨' : '下跌'}${Math.abs(stock.changePercent).toFixed(2)}%，现价${stock.price.toFixed(2)}元`);
                }
            });
        }

        // 更新显示
        function updateDisplay() {
            const stockTotal = portfolio.stocks.reduce((s, st) => s + st.marketValue, 0);
            const fundTotal = portfolio.funds.reduce((s, f) => s + f.value, 0);
            const totalAssets = stockTotal + fundTotal;
            
            const stockDaily = portfolio.stocks.reduce((s, st) => s + st.change * st.shares, 0);
            const fundDaily = portfolio.funds.reduce((s, f) => s + f.daily, 0);
            const totalDaily = stockDaily + fundDaily;
            
            const totalPnL = portfolio.stocks.reduce((s, st) => s + st.total, 0) + 
                            portfolio.funds.reduce((s, f) => s + f.total, 0);

            document.getElementById('totalAssets').textContent = formatMoney(totalAssets);
            
            const dailyEl = document.getElementById('dailyPnL');
            dailyEl.textContent = (totalDaily >= 0 ? '+' : '') + formatMoney(totalDaily);
            dailyEl.className = 'text-xl font-bold ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            
            const dailyCard = document.getElementById('dailyPnLCard');
            dailyCard.className = 'glass rounded-xl p-4 ' + (totalDaily >= 0 ? 'price-up' : 'price-down');
            
            document.getElementById('dailyPercent').textContent = formatPercent(totalDaily / totalAssets * 100);
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (totalDaily >= 0 ? 'trend-up' : 'trend-down');
            
            document.getElementById('totalPnL').textContent = (totalPnL >= 0 ? '+' : '') + formatMoney(totalPnL);
            document.getElementById('totalPnL').className = 'text-xl font-bold ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');
        }

        // 跑马灯
        function updateTicker() {
            const html = portfolio.stocks.map(s => `
                <span class="${s.change >= 0 ? 'trend-up' : 'trend-down'}">
                    ${s.name} ${s.price.toFixed(2)} ${s.change >= 0 ? '▲' : '▼'}${Math.abs(s.changePercent).toFixed(2)}%
                </span>
            `).join('<span class="text-gray-300"> | </span>');
            document.getElementById('tickerTape').innerHTML = `<span class="text-gray-500 font-medium"><i class="fas fa-bolt text-yellow-500 mr-1"></i>实时行情:</span>` + html;
        }

        // 情绪仪表盘
        function renderSentimentDashboard() {
            const indicators = [
                { name: '恐慌指数', value: 34, status: '贪婪', color: 'green' },
                { name: '北向资金', value: '+12.5亿', status: '流入', color: 'red' },
                { name: '两融余额', value: '+8.3亿', status: '加仓', color: 'red' },
                { name: '期权PCR', value: '0.85', status: '偏多', color: 'red' },
                { name: '涨跌比', value: '3:2', status: '偏多', color: 'red' }
            ];
            
            document.getElementById('sentimentDashboard').innerHTML = indicators.map(ind => `
                <div class="text-center p-3 bg-gray-50 rounded-lg">
                    <div class="text-xs text-gray-500 mb-1">${ind.name}</div>
                    <div class="text-lg font-bold ${ind.color === 'red' ? 'trend-up' : 'trend-down'}">${ind.value}</div>
                    <div class="text-xs text-gray-400">${ind.status}</div>
                </div>
            `).join('');
        }

        // 收益曲线
        function renderPerformanceChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            // 生成历史数据
            const days = 30;
            const labels = [];
            const myData = [];
            const hs300 = [];
            const cyb = [];
            
            let myValue = 370000;
            let hsValue = 4000;
            let cybValue = 2200;
            
            for (let i = days; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'}));
                
                myValue *= (1 + (Math.random() - 0.45) * 0.02);
                hsValue *= (1 + (Math.random() - 0.48) * 0.015);
                cybValue *= (1 + (Math.random() - 0.50) * 0.025);
                
                if (i === 0) myValue = 394589;
                
                myData.push(((myValue / 370000 - 1) * 100).toFixed(2));
                hs300.push(((hsValue / 4000 - 1) * 100).toFixed(2));
                cyb.push(((cybValue / 2200 - 1) * 100).toFixed(2));
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '我的组合', data: myData, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.1)', fill: true, tension: 0.4, pointRadius: 0 },
                        { label: '沪深300', data: hs300, borderColor: '#9ca3af', borderDash: [5,5], tension: 0.4, pointRadius: 0 },
                        { label: '创业板', data: cyb, borderColor: '#f87171', borderDash: [5,5], tension: 0.4, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
                        y: { ticks: { callback: v => v + '%' } }
                    }
                }
            });
        }

        // 切换时间周期
        function changePeriod(period) {
            document.querySelectorAll('.period-btn').forEach(btn => {
                if (btn.dataset.period === period) {
                    btn.className = 'period-btn px-3 py-1 text-xs rounded bg-indigo-500 text-white';
                } else {
                    btn.className = 'period-btn px-3 py-1 text-xs rounded bg-gray-200 text-gray-600';
                }
            });
            renderPerformanceChart();
        }

        // 标签页
        function switchTab(tab) {
            ['stocks', 'funds', 'news'].forEach(t => {
                const btn = document.getElementById('tab-btn-' + t);
                const content = document.getElementById('tab-' + t);
                if (t === tab) {
                    btn.className = 'px-4 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-600 whitespace-nowrap';
                    content.classList.add('active');
                } else {
                    btn.className = 'px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 whitespace-nowrap';
                    content.classList.remove('active');
                }
            });
            
            if (tab === 'stocks') renderStocksTab();
            else if (tab === 'funds') renderFundsTab();
            else renderNewsTab();
        }

        function renderStocksTab() {
            document.getElementById('tab-stocks').innerHTML = `
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 border-b">
                            <th class="pb-2">名称</th>
                            <th class="pb-2 text-right">现价</th>
                            <th class="pb-2 text-right">涨跌</th>
                            <th class="pb-2 text-right hidden md:table-cell">市值</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${portfolio.stocks.map(s => `
                            <tr class="border-b border-gray-100">
                                <td class="py-2">
                                    <div class="font-medium">${s.name}</div>
                                    <div class="text-xs text-gray-400">${s.code}</div>
                                </td>
                                <td class="py-2 text-right font-mono ${s.change >= 0 ? 'trend-up' : 'trend-down'}">${s.price.toFixed(2)}</td>
                                <td class="py-2 text-right">
                                    <span class="${s.change >= 0 ? 'trend-up' : 'trend-down'}">${s.change >= 0 ? '+' : ''}${s.changePercent.toFixed(2)}%</span>
                                </td>
                                <td class="py-2 text-right hidden md:table-cell">${formatMoney(s.marketValue)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderFundsTab() {
            document.getElementById('tab-funds').innerHTML = `
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 border-b">
                            <th class="pb-2">名称</th>
                            <th class="pb-2 text-right">市值</th>
                            <th class="pb-2 text-right">日收益</th>
                            <th class="pb-2 text-right">收益率</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${portfolio.funds.map(f => `
                            <tr class="border-b border-gray-100">
                                <td class="py-2">
                                    <div class="font-medium">${f.name}</div>
                                    <div class="text-xs text-gray-400">${f.code}</div>
                                </td>
                                <td class="py-2 text-right">${formatMoney(f.value)}</td>
                                <td class="py-2 text-right ${f.daily >= 0 ? 'trend-up' : 'trend-down'}">${f.daily >= 0 ? '+' : ''}${formatMoney(f.daily)}</td>
                                <td class="py-2 text-right">
                                    <span class="${f.return >= 0 ? 'text-red-600' : 'text-green-600'}">${f.return}%</span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderNewsTab() {
            const news = [
                { title: '比亚迪2月销量增长55%', sentiment: 'positive', time: '2小时前' },
                { title: '中科曙光AI订单饱满', sentiment: 'positive', time: '4小时前' },
                { title: 'AI概念股估值偏高需警惕', sentiment: 'negative', time: '8小时前' }
            ];
            
            document.getElementById('tab-news').innerHTML = news.map(n => `
                <div class="p-3 mb-2 rounded-lg ${n.sentiment === 'positive' ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'}">
                    <div class="flex justify-between">
                        <span class="font-medium text-sm">${n.title}</span>
                        <span class="text-xs text-gray-400">${n.time}</span>
                    </div>
                </div>
            `).join('');
        }

        // 交易日志
        function renderTradeLog() {
            document.getElementById('tradeLog').innerHTML = tradeLogs.map(log => `
                <div class="p-3 bg-gray-50 rounded-lg text-sm">
                    <div class="flex justify-between mb-1">
                        <span class="font-medium">${log.date} ${log.action} ${log.name}</span>
                        <span class="text-gray-400">${log.shares ? log.shares + '股 @¥' + log.price : '¥' + log.amount}</span>
                    </div>
                    <div class="text-xs text-gray-500">理由: ${log.reason} | ${log.result}</div>
                </div>
            `).join('');
        }

        function addTrade() {
            const name = prompt('股票名称:');
            if (name) {
                tradeLogs.unshift({
                    date: new Date().toLocaleDateString('zh-CN'),
                    action: '买入',
                    name: name,
                    shares: 100,
                    price: 100,
                    reason: '用户记录',
                    result: '持有中'
                });
                renderTradeLog();
            }
        }

        // 语音播报
        function speak(text) {
            if (!soundEnabled) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.2;
            speechSynthesis.speak(utterance);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').innerHTML = `<i class="fas ${soundEnabled ? 'fa-volume-up' : 'fa-volume-mute'} text-gray-600"></i>`;
        }

        function toggleTheme() {
            darkMode = !darkMode;
            document.body.className = darkMode ? 'bg-gray-900 min-h-screen transition-colors duration-300 dark-mode' : 'bg-gray-50 min-h-screen transition-colors duration-300';
            document.getElementById('themeIcon').className = darkMode ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-gray-600';
        }

        // 格式化
        function formatMoney(n) {
            return '¥' + Math.abs(n).toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 0});
        }
        function formatPercent(n) {
            return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
