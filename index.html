<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro v5.10 | 专业持仓管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600,700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .gradient-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .gradient-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .gradient-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .trend-up { color: #ef4444; }
        .trend-down { color: #22c55e; }
        .dark-mode { background: #0f172a; color: #e2e8f0; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .feature-card { transition: all 0.3s ease; }
        .feature-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .risk-low { background: #dcfce7; color: #166534; }
        .risk-medium { background: #fef3c7; color: #92400e; }
        .risk-high { background: #fee2e2; color: #991b1b; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        /* 横向滚动条样式 */
        .overflow-x-auto::-webkit-scrollbar { height: 4px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 2px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 2px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 - 永远可见版本和日期 -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl gradient-card flex items-center justify-center text-white font-bold">P</div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Portfolio Pro</h1>
                        <div class="flex items-center gap-2 text-xs text-gray-500">
                            <span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full font-medium">v5.10</span>
                            <span id="currentDate">--</span>
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                            <span>实时</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <!-- 今日晨报按钮 - 新增 -->
                    <button onclick="playTodayAudio()" class="px-3 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-white text-sm font-medium hover:opacity-90 flex items-center gap-2 shadow-lg shadow-purple-200">
                        <i class="fas fa-play"></i>
                        <span class="hidden sm:inline">今日晨报</span>
                    </button>
                    
                    <button id="refreshBtn" onclick="realtimeData.refresh()" class="p-2 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100" title="刷新数据">
                        <i class="fas fa-sync"></i>
                    </button>
                    <span id="lastRefreshTime" class="text-xs text-gray-400 hidden md:inline"></span>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
        <!-- 第一屏：核心数据仪表盘 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <!-- 总资产 -->
            <div class="glass rounded-2xl p-4 feature-card">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-card flex items-center justify-center text-white text-sm">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <span class="text-xs text-gray-500">总资产</span>
                </div>
                <div class="text-2xl font-bold text-gray-800" id="totalAssets">--</div>
                <div class="text-xs text-gray-400 mt-1">所有账户汇总</div>
            </div>

            <!-- 今日盈亏 -->
            <div class="glass rounded-2xl p-4 feature-card">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-warning flex items-center justify-center text-white text-sm">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <span class="text-xs text-gray-500">今日盈亏</span>
                </div>
                <div class="text-2xl font-bold" id="dailyPnL">--</div>
                <div class="text-xs mt-1" id="dailyPercent">--</div>
            </div>

            <!-- 累计收益 -->
            <div class="glass rounded-2xl p-4 feature-card">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-success flex items-center justify-center text-white text-sm">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <span class="text-xs text-gray-500">累计收益</span>
                </div>
                <div class="text-2xl font-bold" id="totalPnL">--</div>
                <div class="text-xs text-gray-400 mt-1">自开始记录</div>
            </div>

            <!-- 风险等级 - 新增，直接可见 -->
            <div class="glass rounded-2xl p-4 feature-card" onclick="showRiskPanel()">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-8 rounded-lg gradient-info flex items-center justify-center text-white text-sm">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <span class="text-xs text-gray-500">风险等级</span>
                </div>
                <div class="text-2xl font-bold" id="riskLevel">--</div>
                <div class="text-xs mt-1" id="riskDetail">点击查看详情</div>
            </div>
        </div>

        <!-- 第二屏：市场情绪、收益对标、盈亏可视化 - 新增 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- 市场情绪卡片 -->
            <div id="sentiment-card"></div>
            
            <!-- 收益对标卡片 -->
            <div id="benchmark-card"></div>
            
            <!-- 盈亏可视化卡片 - 新增 -->
            <div id="pnl-card"></div>
        </div>

        <!-- 第三屏：核心功能区 - 平铺展示，不隐藏 -->
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-gray-800"><i class="fas fa-star text-yellow-500 mr-2"></i>核心功能</h2>
                <span class="text-xs text-gray-400">点击卡片进入</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <!-- 多账户 -->
                <button onclick="showAccountsPanel()" class="p-4 rounded-xl bg-gradient-to-br from-indigo-50 to-indigo-100 hover:from-indigo-100 hover:to-indigo-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-indigo-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div class="font-bold text-gray-800">多账户管理</div>
                    <div class="text-xs text-gray-500 mt-1" id="accountCount">--个账户</div>
                </button>

                <!-- 再平衡 -->
                <button onclick="showRebalancePanel()" class="p-4 rounded-xl bg-gradient-to-br from-teal-50 to-teal-100 hover:from-teal-100 hover:to-teal-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-teal-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-balance-scale"></i>
                    </div>
                    <div class="font-bold text-gray-800">智能再平衡</div>
                    <div class="text-xs text-gray-500 mt-1" id="rebalanceStatus">查看建议</div>
                </button>

                <!-- 归因分析 -->
                <button onclick="showAttributionPanel()" class="p-4 rounded-xl bg-gradient-to-br from-pink-50 to-pink-100 hover:from-pink-100 hover:to-pink-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-pink-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-chart-pie"></i>
                    </div>
                    <div class="font-bold text-gray-800">收益归因</div>
                    <div class="text-xs text-gray-500 mt-1">行业/个股贡献</div>
                </button>

                <!-- 风险分析 -->
                <button onclick="showRiskPanel()" class="p-4 rounded-xl bg-gradient-to-br from-red-50 to-red-100 hover:from-red-100 hover:to-red-200 text-left transition-all">
                    <div class="w-10 h-10 rounded-lg bg-red-500 text-white flex items-center justify-center mb-2">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="font-bold text-gray-800">风险分析</div>
                    <div class="text-xs text-gray-500 mt-1">VaR/夏普比率</div>
                </button>
            </div>
        </div>

        <!-- 第三屏：收益曲线 -->
        <div class="glass rounded-2xl p-4">
            <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                <h2 class="font-bold text-gray-800"><i class="fas fa-chart-area text-indigo-500 mr-2"></i>收益走势</h2>
                <div class="flex gap-1">
                    <button onclick="changePeriod('1M')" class="period-btn px-3 py-1 text-xs rounded-lg bg-indigo-500 text-white" data-period="1M">1月</button>
                    <button onclick="changePeriod('3M')" class="period-btn px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600" data-period="3M">3月</button>
                    <button onclick="changePeriod('6M')" class="period-btn px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600" data-period="6M">6月</button>
                    <button onclick="changePeriod('1Y')" class="period-btn px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-600" data-period="1Y">1年</button>
                </div>
            </div>
            <div class="h-48 md:h-64">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- 第四屏：持仓详情 -->
        <div class="glass rounded-2xl overflow-hidden">
            <div class="border-b border-gray-200 flex">
                <button onclick="switchTab('stocks')" id="tab-stocks" class="flex-1 px-4 py-3 text-sm font-medium tab-active">股票</button>
                <button onclick="switchTab('funds')" id="tab-funds" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500">基金</button>
                <button onclick="switchTab('news')" id="tab-news" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500">新闻</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500">历史</button>
            </div>
            <div class="p-4">
                <div id="content-stocks" class="tab-content"></div>
                <div id="content-funds" class="tab-content hidden"></div>
                <div id="content-news" class="tab-content hidden"></div>
                <div id="content-history" class="tab-content hidden"></div>
            </div>
        </div>

        <!-- 第五屏：快捷工具 - 精简为3个核心入口 -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="showDailyAudio()" class="p-4 rounded-xl bg-gradient-to-br from-indigo-50 to-indigo-100 text-center hover:from-indigo-100 hover:to-indigo-200 transition-all relative">
                <i class="fas fa-headphones text-indigo-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">每日音频</div>
                <div class="text-xs text-gray-500 mt-1">晨报·播客</div>
                <span id="audioBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full hidden flex items-center justify-center">1</span>
            </button>
            <button onclick="showAnalysisTools()" class="p-4 rounded-xl bg-gradient-to-br from-teal-50 to-teal-100 text-center hover:from-teal-100 hover:to-teal-200 transition-all">
                <i class="fas fa-chart-pie text-teal-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">深度分析</div>
                <div class="text-xs text-gray-500 mt-1">市场·对标</div>
            </button>
            <button onclick="showSettings()" class="p-4 rounded-xl bg-gradient-to-br from-gray-50 to-gray-100 text-center hover:from-gray-100 hover:to-gray-200 transition-all">
                <i class="fas fa-cog text-gray-600 text-lg mb-2"></i>
                <div class="text-sm font-medium text-gray-800">设置</div>
                <div class="text-xs text-gray-500 mt-1">偏好·关于</div>
            </button>
        </div>

        <!-- 底部更新区 -->
        <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-gray-700"><i class="fas fa-edit text-indigo-500 mr-2"></i>更新今日数据</h3>
                <span class="text-xs text-gray-400">每日收盘后更新</span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">日期</label>
                    <input type="date" id="updateDate" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">总资产</label>
                    <input type="number" id="updateAssets" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="输入总资产">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">今日盈亏</label>
                    <input type="number" id="updatePnL" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="输入盈亏">
                </div>
            </div>
            <button onclick="submitUpdate()" class="w-full mt-3 py-2 bg-indigo-500 text-white rounded-lg text-sm font-medium hover:bg-indigo-600">
                提交更新
            </button>
        </div>
    </div>

    <!-- 多账户管理面板 -->
    <div id="accountsPanel" class="fixed inset-0 bg-black/50 z-50 hidden">
        <div class="absolute inset-x-0 bottom-0 md:relative md:inset-0 md:flex md:items-center md:justify-center">
            <div class="bg-white rounded-t-2xl md:rounded-2xl w-full md:w-[600px] md:max-h-[80vh] overflow-hidden">
                <div class="p-4 border-b flex justify-between items-center">
                    <h3 class="font-bold text-lg"><i class="fas fa-wallet text-indigo-500 mr-2"></i>多账户管理</h3>
                    <button onclick="closePanel('accountsPanel')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="p-4 overflow-y-auto max-h-[60vh]">
                    <div id="accountsList" class="space-y-3"></div>
                    <button onclick="addNewAccount()" class="w-full mt-4 py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-indigo-500 hover:text-indigo-500">
                        <i class="fas fa-plus mr-2"></i>添加新账户
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 风险分析面板 -->
    <div id="riskPanel" class="fixed inset-0 bg-black/50 z-50 hidden">
        <div class="absolute inset-x-0 bottom-0 md:relative md:inset-0 md:flex md:items-center md:justify-center">
            <div class="bg-white rounded-t-2xl md:rounded-2xl w-full md:w-[600px] md:max-h-[80vh] overflow-hidden">
                <div class="p-4 border-b flex justify-between items-center">
                    <h3 class="font-bold text-lg"><i class="fas fa-shield-alt text-red-500 mr-2"></i>风险分析</h3>
                    <button onclick="closePanel('riskPanel')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="p-4 overflow-y-auto max-h-[60vh]" id="riskContent">
                    <!-- 动态生成风险指标 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 再平衡面板 -->
    <div id="rebalancePanel" class="fixed inset-0 bg-black/50 z-50 hidden">
        <div class="absolute inset-x-0 bottom-0 md:relative md:inset-0 md:flex md:items-center md:justify-center">
            <div class="bg-white rounded-t-2xl md:rounded-2xl w-full md:w-[600px] md:max-h-[80vh] overflow-hidden">
                <div class="p-4 border-b flex justify-between items-center">
                    <h3 class="font-bold text-lg"><i class="fas fa-balance-scale text-teal-500 mr-2"></i>智能再平衡</h3>
                    <button onclick="closePanel('rebalancePanel')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="p-4 overflow-y-auto max-h-[60vh]" id="rebalanceContent">
                    <!-- 动态生成再平衡建议 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局数据 ==========
        let portfolioData = { accounts: {}, history: [] };
        let currentAccountId = 'default';
        let chart = null;
        
        // API 配置
        const API_BASE = 'http://localhost:5000';  // 本地API服务
        let useRealData = false;  // 是否使用真实数据

        // ========== API 调用函数 ==========
        async function fetchFromAPI(endpoint) {
            try {
                const resp = await fetch(`${API_BASE}${endpoint}`, { timeout: 5000 });
                if (!resp.ok) throw new Error('API Error');
                const data = await resp.json();
                return data.success ? data.data : null;
            } catch (e) {
                console.log('API fetch failed:', e);
                return null;
            }
        }

        async function loadRealTimeData() {
            // 尝试从API加载实时数据
            const portfolio = await fetchFromAPI('/api/portfolio');
            if (portfolio) {
                useRealData = true;
                updateDashboardWithRealData(portfolio);
                return true;
            }
            return false;
        }

        function updateDashboardWithRealData(portfolio) {
            // 用真实数据更新仪表盘
            const summary = portfolio.summary;
            const holdings = portfolio.holdings;
            
            // 总资产
            document.getElementById('totalAssets').textContent = '¥' + (summary.totalValue / 10000).toFixed(2) + '万';
            
            // 今日盈亏
            const pnlEl = document.getElementById('dailyPnL');
            const dailyPnL = summary.dailyPnL || 0;
            pnlEl.textContent = (dailyPnL >= 0 ? '+' : '') + '¥' + Math.abs(dailyPnL).toLocaleString();
            pnlEl.className = 'text-2xl font-bold ' + (dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 盈亏百分比（修正：使用昨日总市值作为分母）
            const totalValue = summary.totalValue || 0;
            const yesterdayValue = totalValue - dailyPnL;
            const dailyPercent = yesterdayValue > 0 ? (dailyPnL / yesterdayValue * 100).toFixed(2) : 0;
            document.getElementById('dailyPercent').textContent = (dailyPnL >= 0 ? '+' : '') + dailyPercent + '%';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (dailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = (summary.totalPnL >= 0 ? '+' : '') + '¥' + (summary.totalPnL / 10000).toFixed(2) + '万';
            totalPnlEl.className = 'text-2xl font-bold ' + (summary.totalPnL >= 0 ? 'trend-up' : 'trend-down');

            // 账户数量
            document.getElementById('accountCount').textContent = summary.holdingCount + '只持仓';

            // 风险等级（基于真实数据计算）
            calculateRiskLevelFromData(holdings);

            // 持仓列表
            renderHoldingsFromRealData(holdings);
            
            // 添加数据来源标识
            const dataStatus = summary.dataValidated ? '✓ 已交叉验证' : '? 单数据源';
            console.log(`[数据更新] ${summary.updateTime} - ${dataStatus}`);
        }

        function calculateRiskLevelFromData(holdings) {
            // 基于真实持仓计算风险等级
            if (!holdings || holdings.length === 0) return;
            
            let totalValue = 0;
            let maxPosition = 0;
            
            holdings.forEach(h => {
                const value = h.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            const concentration = totalValue > 0 ? maxPosition / totalValue : 0;
            
            let riskLevel, riskClass, riskDesc;
            if (concentration > 0.6) {
                riskLevel = '高风险';
                riskClass = 'risk-high';
                riskDesc = '持仓集中度过高';
            } else if (concentration > 0.4) {
                riskLevel = '中风险';
                riskClass = 'risk-medium';
                riskDesc = '平衡型投资组合';
            } else {
                riskLevel = '低风险';
                riskClass = 'risk-low';
                riskDesc = '分散型投资组合';
            }

            const riskEl = document.getElementById('riskLevel');
            riskEl.innerHTML = `<span class="px-3 py-1 rounded-lg ${riskClass}">${riskLevel}</span>`;
            document.getElementById('riskDetail').textContent = riskDesc;
        }

        function renderHoldingsFromRealData(holdings) {
            // 用真实数据渲染持仓列表
            let html = '<table class="w-full text-sm"><thead><tr class="text-gray-500"><th class="text-left py-2">名称/代码</th><th class="text-right">持股</th><th class="text-right">现价</th><th class="text-right">市值</th><th class="text-right">盈亏</th></tr></thead><tbody>';
            
            holdings.forEach(stock => {
                const pnl = stock.pnl || 0;
                const pnlPercent = stock.pnlPercent || 0;
                const trendClass = pnl >= 0 ? 'trend-up' : 'trend-down';
                const pnlSign = pnl >= 0 ? '+' : '';
                
                html += `<tr class="border-b border-gray-100">
                    <td class="py-3">
                        <div class="font-medium">${stock.name}</div>
                        <div class="text-xs text-gray-400">${stock.code}</div>
                        ${stock.crossValidated ? '' : '<span class="text-xs text-yellow-500">待验证</span>'}
                    </td>

        // ========== 仪表盘渲染 ==========
        function renderDashboard() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const data = account.data;
            const stocks = data.stocks || [];
            const funds = data.funds || [];
            
            // 计算汇总数据（修正：从dailyChange计算dailyPnL）
            const stockValue = stocks.reduce((sum, s) => sum + (s.marketValue || 0), 0);
            const fundValue = funds.reduce((sum, f) => sum + (f.marketValue || 0), 0);
            const totalValue = stockValue + fundValue;
            
            // 修正：如果dailyPnL不存在，从dailyChange计算
            const calculateDailyPnL = (item) => {
                if (item.dailyPnL !== undefined && item.dailyPnL !== 0) return item.dailyPnL;
                if (item.dailyChange !== undefined && item.marketValue) {
                    // 公式: 当日盈亏 = 市值 * 涨跌幅 / (100 + 涨跌幅)
                    return item.marketValue * item.dailyChange / (100 + item.dailyChange);
                }
                return 0;
            };
            
            const stockDailyPnL = stocks.reduce((sum, s) => sum + calculateDailyPnL(s), 0);
            const fundDailyPnL = funds.reduce((sum, f) => sum + calculateDailyPnL(f), 0);
            const totalDailyPnL = stockDailyPnL + fundDailyPnL;
            
            const stockTotalPnL = stocks.reduce((sum, s) => sum + (s.totalPnL || 0), 0);
            const fundTotalPnL = funds.reduce((sum, f) => sum + (f.totalPnL || 0), 0);
            const totalPnL = stockTotalPnL + fundTotalPnL;
            
            // 总资产
            document.getElementById('totalAssets').textContent = '¥' + (totalValue / 10000).toFixed(2) + '万';
            
            // 今日盈亏
            const pnlEl = document.getElementById('dailyPnL');
            pnlEl.textContent = (totalDailyPnL >= 0 ? '+' : '') + '¥' + Math.abs(totalDailyPnL).toLocaleString();
            pnlEl.className = 'text-2xl font-bold ' + (totalDailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 盈亏百分比（修正：使用昨日总市值作为分母）
            const yesterdayValue = totalValue - totalDailyPnL;
            const pnlPercent = yesterdayValue > 0 ? (totalDailyPnL / yesterdayValue * 100).toFixed(2) : 0;
            document.getElementById('dailyPercent').textContent = (totalDailyPnL >= 0 ? '+' : '') + pnlPercent + '%';
            document.getElementById('dailyPercent').className = 'text-xs mt-1 ' + (totalDailyPnL >= 0 ? 'trend-up' : 'trend-down');
            
            // 累计收益
            const totalPnlEl = document.getElementById('totalPnL');
            totalPnlEl.textContent = (totalPnL >= 0 ? '+' : '') + '¥' + (totalPnL / 10000).toFixed(2) + '万';
            totalPnlEl.className = 'text-2xl font-bold ' + (totalPnL >= 0 ? 'trend-up' : 'trend-down');

            // 持仓统计
            document.getElementById('accountCount').textContent = `${stocks.length}只股票 · ${funds.length}只基金`;

            // 风险等级计算
            calculateRiskLevel();

            // 持仓列表
            renderHoldings();
        }

        // ========== 风险等级计算 ==========
        function calculateRiskLevel() {
            const account = portfolioData.accounts[currentAccountId];
            if (!account) return;

            const stocks = account.data.stocks || [];
            const funds = account.data.funds || [];
            
            let totalValue = 0;
            let maxPosition = 0;
            
            // 计算股票集中度
            stocks.forEach(s => {
                const value = s.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            // 计算基金集中度
            funds.forEach(f => {
                const value = f.marketValue || 0;
                totalValue += value;
                if (value > maxPosition) maxPosition = value;
            });
            
            const concentration = totalValue > 0 ? maxPosition / totalValue : 0;
            
            // 计算海外资产占比
            const overseasFunds = funds.filter(f => f.market === '美股' || f.market === '港股' || f.market === '海外');
            const overseasValue = overseasFunds.reduce((sum, f) => sum + (f.marketValue || 0), 0);
            const overseasRatio = totalValue > 0 ? overseasValue / totalValue : 0;
            
            let riskLevel, riskClass, riskDesc;
            if (concentration > 0.5) {
                riskLevel = '高风险';
                riskClass = 'risk-high';
                riskDesc = `比亚迪占比过高(${((maxPosition/totalValue)*100).toFixed(1)}%)`;
            } else if (concentration > 0.35 || overseasRatio > 0.4) {
                riskLevel = '中风险';
                riskClass = 'risk-medium';
                riskDesc = overseasRatio > 0.4 ? `海外资产占比${(overseasRatio*100).toFixed(0)}%` : '持仓集中度偏高';
            } else {
                riskLevel = '低风险';
                riskClass = 'risk-low';
                riskDesc = '分散型投资组合';
            }

            const riskEl = document.getElementById('riskLevel');
            riskEl.innerHTML = `<span class="px-3 py-1 rounded-lg ${riskClass}">${riskLevel}</span>`;
            document.getElementById('riskDetail').textContent = riskDesc;
        }

        // ========== 数据更新 ==========
        function submitUpdate() {
            const date = document.getElementById('updateDate').value;
            const assets = parseFloat(document.getElementById('updateAssets').value);
            const pnl = parseFloat(document.getElementById('updatePnL').value);

            if (!date || isNaN(assets)) {
                alert('请填写完整信息');
                return;
            }

            const account = portfolioData.accounts[currentAccountId];
            account.data.date = date;
            account.data.totalAssets = assets;
            account.data.dailyPnL = pnl || 0;
            account.data.totalPnL += pnl || 0;

            // 添加到历史
            portfolioData.history.push({
                date: date,
                totalAssets: assets,
                dailyPnL: pnl || 0
            });

            saveData();
            renderDashboard();
            
            // 更新图表
            if (chart) {
                chart.data.labels.push(date.slice(5));
                chart.data.datasets[0].data.push(assets / 10000);
                chart.update();
            }

            alert('更新成功！');
        }

        function updateTrendChart(code) {
            if (!code) return;
            
            const container = document.getElementById('trendChartContainer');
            const statsDiv = document.getElementById('trendStats');
            
            // 模拟历史数据
            const mockData = Array.from({length: 30}, () => Math.random() * 20 - 5);
            const currentPrice = mockData[mockData.length - 1];
            const price1mAgo = mockData[0];
            const change1m = ((currentPrice - price1mAgo) / Math.abs(price1mAgo) * 100).toFixed(2);
            
            container.innerHTML = '<canvas id="trendCanvas"></canvas>';
            statsDiv.classList.remove('hidden');
            
            document.getElementById('trend1m').innerHTML = `<span class="${change1m >= 0 ? 'text-red-500' : 'text-green-500'}">${change1m >= 0 ? '+' : ''}${change1m}%</span>`;
            document.getElementById('trend3m').innerHTML = '<span class="text-red-500">+12.5%</span>';
            document.getElementById('trend1y').innerHTML = '<span class="text-red-500">+35.8%</span>';
            
            setTimeout(() => {
                new Chart(document.getElementById('trendCanvas'), {
                    type: 'line',
                    data: {
                        labels: Array.from({length: 30}, (_, i) => `${i + 1}日`),
                        datasets: [{
                            label: '价格走势',

                            tension: 0.4

                        plugins: { legend: { display: false } },
                        scales: {

                        }
                    }
                });
            }, 100);

        function addTrade() {
            const type = document.getElementById('tradeType').value;
            const code = document.getElementById('tradeCode').value.trim();
            const name = document.getElementById('tradeName').value.trim();
            const date = document.getElementById('tradeDate').value;
            const shares = parseInt(document.getElementById('tradeShares').value);
            const price = parseFloat(document.getElementById('tradePrice').value);
            
            if (!code || !name || !date || !shares || !price) {
                alert('请填写完整信息');
                return;
            }
            
            tradeHistory.push({ type, code, name, date, shares, price, id: Date.now() });
            localStorage.setItem('portfolio_trades', JSON.stringify(tradeHistory));
            
            document.getElementById('addTradeForm').remove();
            document.getElementById('tradeList').innerHTML = renderTradeList();

            if (confirm('确定删除这条记录？')) {
                tradeHistory.splice(index, 1);

                document.getElementById('tradeList').innerHTML = renderTradeList();
            }

        function exportTrades() {
            if (tradeHistory.length === 0) {
                alert('暂无交易记录可导出');
                return;
            }
            const csv = '类型,代码,名称,日期,数量,价格,金额\n' + 
                tradeHistory.map(t => `${t.type},${t.code},${t.name},${t.date},${t.shares},${t.price},${t.price * t.shares}`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `交易记录_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();

        async function loadAudioManifest() {
            // 加载音频清单

                    audioManifest = await resp.json();
                    updateAudioBadge();

                audioManifest = [];

            // 更新音频未读标记

            const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const hasToday = audioManifest.some(a => a.date === today && !a.played);
            badge.classList.toggle('hidden', !hasToday);
        }

        async function deleteAudio(file, index) {
            // 删除音频
            if (!confirm('确定删除这条音频？\n' + file)) {
                return;
            }
            
            // 从清单中移除
            audioManifest = audioManifest.filter(a => a.file !== file);
            
            // 更新本地显示
            document.getElementById('audioList').innerHTML = renderAudioList();
            updateAudioBadge();
            
            // 显示提示
            if (typeof realtimeData !== 'undefined') {
                realtimeData.showToast('音频已从列表移除', 'success');

                alert('音频已从列表移除');

            console.log('音频删除:', file);

        function playAudio(file, btn) {
            // 播放音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                document.querySelectorAll('#audioList button').forEach(b => {
                    b.innerHTML = '<i class="fas fa-play"></i> 播放';
                    b.classList.remove('bg-red-500');
                    b.classList.add('bg-indigo-500');
                });
            }
            
            currentAudio = new Audio(`./audio/${file}`);
            currentAudio.play();
            btn.innerHTML = '<i class="fas fa-stop"></i> 停止';
            btn.classList.remove('bg-indigo-500');
            btn.classList.add('bg-red-500');
            
            currentAudio.onended = () => {
                btn.innerHTML = '<i class="fas fa-play"></i> 播放';
                btn.classList.remove('bg-red-500');
                btn.classList.add('bg-indigo-500');
                currentAudio = null;
            };
        }

                                                        <div class="text-xs text-red-400">+${c.returnRate.toFixed(2)}%</div>
                                                    </div>
                                                </div>
                                                <div class="mt-2 h-1.5 bg-red-200 rounded-full overflow-hidden">
                                                    <div class="h-full bg-red-500 rounded-full" style="width: ${Math.min(c.returnRate, 100)}%"></div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                ` : ''}
                                
                                <!-- 负贡献 -->
                                ${negative.length > 0 ? `
                                <div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                                        <span class="font-bold text-gray-700">亏损贡献</span>
                                        <span class="text-xs text-gray-400">(${negative.length}只)</span>
                                    </div>
                                    <div class="space-y-2">
                                        ${negative.map(c => `
                                            <div class="p-3 bg-green-50 rounded-xl">
                                                <div class="flex justify-between items-center">
                                                    <div>
                                                        <div class="font-medium text-gray-800">${c.name}</div>
                                                        <div class="text-xs text-gray-500">${c.type} · 权重${c.weight.toFixed(1)}%</div>
                                                    </div>
                                                    <div class="text-right">
                                                        <div class="font-bold text-green-500">¥${(c.pnl/10000).toFixed(2)}万</div>
                                                        <div class="text-xs text-green-400">${c.returnRate.toFixed(2)}%</div>
                                                    </div>
                                                </div>
                                                <div class="mt-2 h-1.5 bg-green-200 rounded-full overflow-hidden">
                                                    <div class="h-full bg-green-500 rounded-full" style="width: ${Math.min(Math.abs(c.returnRate), 100)}%"></div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', html);
            document.body.style.overflow = 'hidden';
        }
        function changePeriod(p) { 
            document.querySelectorAll('.period-btn').forEach(b => {
                b.classList.remove('bg-indigo-500', 'text-white');
                b.classList.add('bg-gray-200', 'text-gray-600');
            });
            event.target.classList.remove('bg-gray-200', 'text-gray-600');
            event.target.classList.add('bg-indigo-500', 'text-white');
        }
        // 播放今日晨报音频 - 修复版
        function playTodayAudio() {
            const date = new Date().toISOString().split('T')[0].replace(/-/g, '');
            
            // 先从manifest中查找今日音频
            const todayAudio = audioManifest.find(a => a.date === date);
            
            if (!todayAudio) {
                if (typeof realtimeData !== 'undefined') {
                    realtimeData.showToast('今日音频尚未生成', 'info');
                } else {
                    alert('今日音频尚未生成');
                }
                return;
            }
            
            // 创建或获取音频播放器
            let player = document.getElementById('globalAudioPlayer');
            if (!player) {
                player = document.createElement('audio');
                player.id = 'globalAudioPlayer';
                player.style.display = 'none';
                document.body.appendChild(player);
            }
            
            // 如果正在播放，暂停
            if (!player.paused) {
                player.pause();
                if (typeof realtimeData !== 'undefined') {
                    realtimeData.showToast('已暂停播放', 'info');
                }
                return;
            }
            
            // 使用本地音频文件
            const audioUrl = `./audio/${todayAudio.file}`;
            player.src = audioUrl;
            player.play().then(() => {
                if (typeof realtimeData !== 'undefined') {
                    realtimeData.showToast(`开始播放: ${todayAudio.title}`, 'success');
                }
            }).catch(e => {
                console.error('音频播放失败:', e);
                if (typeof realtimeData !== 'undefined') {
                    realtimeData.showToast('音频加载失败，请检查文件是否存在', 'error');
                } else {
                    alert('音频加载失败，请检查文件是否存在');
                }
            });
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }
    </script>

    <script>
        // 初始化新模块
        document.addEventListener('DOMContentLoaded', async function() {
            // 初始化用户设置
            if (typeof userSettings !== 'undefined') {
                userSettings.init();
            }
            
            // 加载市场情绪
            if (typeof marketSentiment !== 'undefined') {
                await marketSentiment.fetchData();
                marketSentiment.renderCard('sentiment-card');
            }
            
            // 加载收益对标
            if (typeof benchmark !== 'undefined') {
                const report = await benchmark.generateReport(portfolioData);
                benchmark.renderCard('benchmark-card', report);
            }
            
            // 加载盈亏可视化
            if (typeof pnlVisualization !== 'undefined') {
                pnlVisualization.renderWaterfall('pnl-card');
            }
            
            // 加载持仓新闻
            if (typeof positionNews !== 'undefined') {
                const news = await positionNews.fetchAllPositionNews(portfolioData);
                positionNews.renderNewsList('content-news', news);
            }
            
            // 更新标签切换函数
            const originalSwitchTab = switchTab;
            switchTab = function(tab) {
                originalSwitchTab(tab);
                
                // 如果切换到新闻标签，重新加载新闻
                if (tab === 'news' && typeof positionNews !== 'undefined') {
                    positionNews.fetchAllPositionNews(portfolioData).then(news => {
                        positionNews.renderNewsList('content-news', news);
                    });
                }
            };
        });
    </script>
